id: list-routines
name: List Routines
description: List all smart home routines

input:
  - id: limit
    type: number
    required: false

nodes:
  - id: query-routines
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      resource: query
      operation: query
      params:
        collection: "smart_home_routines"
        limit: "{{habits.input.limit}}"
        sort: '{"createdAt": -1}'

edges: []

output:
  routines: "{{query-routines.results}}"
  count: "{{query-routines.count}}"
