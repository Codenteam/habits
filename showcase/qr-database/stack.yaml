version: "1.0"
workflows:
  - id: create-qr
    path: ./create-qr.yaml
    enabled: true
  - id: scan-qr
    path: ./scan-qr.yaml
    enabled: true
  - id: list-qrs
    path: ./list-qrs.yaml
    enabled: true
  - id: get-qr
    path: ./get-qr.yaml
    enabled: true
  - id: delete-qr
    path: ./delete-qr.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
