# Tests for AI Podcast Episode Generator
# Workflow: habits/generate-episode.yaml - Generates podcast episodes
workflow: ./habits/generate-episode.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully generates podcast episode"
    trigger:
      body:
        topic: "The Future of Space Exploration"
        format: "educational"
        duration: 20
        podcastName: "Tech Horizons"
        hostName: "Alex Morgan"
    context:
      habits:
        input:
          topic: "The Future of Space Exploration"
          format: "educational"
          duration: 20
          podcastName: "Tech Horizons"
          hostName: "Alex Morgan"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock research generation
        - bit: "openai"
          action: chat
          response: "Space exploration is entering a new era with private companies like SpaceX leading innovation. Key developments include reusable rockets and plans for Mars colonization."
        # Mock intro generation
        - bit: "openai"
          action: chat
          response: "Welcome to Tech Horizons! Today we're exploring the final frontier and discussing the incredible future of space exploration."
        # Mock full script generation
        - bit: "openai"
          action: chat
          response: "**Full Episode Script**\n\nIntro: Welcome to Tech Horizons...\nSegment 1: The history of space exploration...\nConclusion: Thanks for listening!"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
