id: generate-episode
name: Generate Podcast Episode
description: Generate a complete podcast episode from a topic

input:
  - id: topic
    type: string
    required: true
    description: Main topic for the episode
  - id: format
    type: string
    required: false
    description: solo, interview, debate, educational, storytelling
  - id: duration
    type: number
    required: false
    description: Target duration in minutes (10, 20, 30, 45, 60)
  - id: podcastName
    type: string
    required: false
    description: Name of the podcast
  - id: hostName
    type: string
    required: false
    description: Name of the host
  - id: guestName
    type: string
    required: false
    description: Name of the guest (for interview format)
  - id: notes
    type: string
    required: false
    description: Additional context or notes

nodes:
  # Research and outline
  - id: generate-research
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.6
        maxTokens: 800
        prompt: |
          Research the topic "{{habits.input.topic}}" for a podcast episode.
          
          Provide:
          1. Key facts and statistics to mention
          2. Common misconceptions to address
          3. Interesting angles and perspectives
          4. Related subtopics to explore
          5. Potential controversy or debate points
          6. Real-world examples and case studies
          7. Expert opinions or quotes to reference
          
          Make it podcast-ready with conversation starters.

  # Generate intro hook
  - id: generate-intro
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.8
        maxTokens: 400
        systemMessage: You are a charismatic podcast host who knows how to hook listeners in the first 30 seconds.
        prompt: |
          Write a compelling podcast intro for topic: {{habits.input.topic}}
          
          Podcast: {{habits.input.podcastName}}
          Host: {{habits.input.hostName}}
          Format: {{habits.input.format}}
          
          Include:
          - A hook that grabs attention
          - Episode title (catchy, intriguing)
          - Brief tease of what listeners will learn
          - Intro music cue note
          
          Make it energetic and conversational!

  # Generate full script
  - id: generate-script
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.7
        maxTokens: 3000
        systemMessage: You are a professional podcast scriptwriter who creates engaging, conversational content.
        prompt: |
          Write a complete {{habits.input.duration}}-minute podcast script.
          
          Topic: {{habits.input.topic}}
          Format: {{habits.input.format}}
          Host: {{habits.input.hostName}}
          Guest: {{habits.input.guestName}}
          
          Research to include:
          {{generate-research}}
          
          Intro to use:
          {{generate-intro}}
          
          Structure:
          1. Cold open hook (30 sec)
          2. Intro + episode preview (1-2 min)
          3. Main content segments (divided logically)
          4. Key takeaways
          5. Outro with CTA
          
          Style notes:
          - Write it conversationally (how people talk)
          - Include [PAUSE], [MUSIC], [SOUND EFFECT] cues
          - Add natural transitions
          - Include rhetorical questions to engage listeners
          - For interview format, write both HOST and GUEST lines
          
          Additional notes: {{habits.input.notes}}

  # Generate timestamps/chapters
  - id: generate-chapters
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.4
        maxTokens: 300
        prompt: |
          Create YouTube-style timestamps/chapters for this podcast:
          
          Duration: {{habits.input.duration}} minutes
          Script outline: {{generate-script}}
          
          Format as:
          0:00 - Hook
          0:30 - Introduction
          (continue...)
          
          Make chapter titles clickable and intriguing.

  # Generate show notes
  - id: generate-shownotes
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.5
        maxTokens: 500
        prompt: |
          Create podcast show notes for: {{habits.input.topic}}
          
          Based on script: {{generate-script}}
          
          Include:
          1. Episode summary (2-3 sentences)
          2. Key points (bullet list)
          3. Notable quotes
          4. Resources mentioned (placeholder links)
          5. Connect with host links
          6. Sponsor credits (placeholder)

  # Generate social posts
  - id: generate-social
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      resource: ask_chatgpt
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.8
        maxTokens: 400
        prompt: |
          Create social media promotional posts for this podcast episode:
          
          Topic: {{habits.input.topic}}
          Podcast: {{habits.input.podcastName}}
          
          Return JSON:
          {
            "twitter": "Tweet to promote episode",
            "linkedin": "LinkedIn post (professional tone)",
            "instagram": "Instagram caption with emojis",
            "audiogram": "30-second pull quote for audiogram"
          }

  # Save episode
  - id: save-episode
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      resource: insert
      operation: insert
      params:
        collection: "episodes"
        document:
          topic: "{{habits.input.topic}}"
          format: "{{habits.input.format}}"
          duration: "{{habits.input.duration}}"
          podcastName: "{{habits.input.podcastName}}"
          hostName: "{{habits.input.hostName}}"
          guestName: "{{habits.input.guestName}}"
          intro: "{{generate-intro}}"
          script: "{{generate-script}}"
          chapters: "{{generate-chapters}}"
          shownotes: "{{generate-shownotes}}"
          social: "{{generate-social}}"
          createdAt: "{{habits.now}}"

edges:
  - source: generate-research
    target: generate-script
  - source: generate-intro
    target: generate-script
  - source: generate-script
    target: generate-chapters
  - source: generate-script
    target: generate-shownotes
  - source: generate-script
    target: generate-social
  - source: generate-chapters
    target: save-episode
  - source: generate-shownotes
    target: save-episode
  - source: generate-social
    target: save-episode

output:
  episodeId: "{{save-episode.id}}"
  intro: "{{generate-intro}}"
  script: "{{generate-script}}"
  chapters: "{{generate-chapters}}"
  shownotes: "{{generate-shownotes}}"
  social: "{{generate-social}}"
