# Tests for Support Ticket Router
# Workflow: habits/submit-ticket.yaml - Classifies and routes support tickets
workflow: ./habits/submit-ticket.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully classifies and routes support ticket"
    trigger:
      body:
        customerName: "John Smith"
        customerEmail: "john@example.com"
        subject: "Cannot login to my account"
        message: "I've been trying to login for the past hour but keep getting an error"
    context:
      habits:
        input:
          customerName: "John Smith"
          customerEmail: "john@example.com"
          subject: "Cannot login to my account"
          message: "I've been trying to login for the past hour but keep getting an error"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock ticket classification
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            category: "technical"
            subcategory: "authentication"
            priority: "high"
            sentiment: "frustrated"
            department: "engineering"
            escalationNeeded: false
            keyIssues: ["login_failure"]
            suggestedTags: ["auth", "bug"]
            estimatedResolutionTime: "2 hours"
            reasoning: "Login issues require urgent technical attention"
        # Mock auto-response generation
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            greeting: "Hi John"
            acknowledgment: "We understand login issues are frustrating"
            immediateHelp: "Try clearing browser cache"
            nextSteps: "Our team will investigate"
            estimatedResponse: "within 2 hours"
            signature: "Support Team"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
