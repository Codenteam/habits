<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geofence SMS Alert - Demo UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; }
  </style>
</head>
<body class="min-h-screen text-white p-4">
  <div class="max-w-md mx-auto">
    <!-- Header -->
    <div class="text-center mb-8 pt-8">
      <div class="text-6xl mb-4">📍</div>
      <h1 class="text-2xl font-bold">Geofence SMS Alert</h1>
      <p class="text-slate-400 mt-2">Automatic SMS when entering/leaving locations</p>
    </div>

    <!-- Status Card -->
    <div class="bg-slate-800 rounded-2xl p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-400">Location Status</span>
        <span id="location-status" class="text-amber-400">● Monitoring</span>
      </div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-slate-400">Geofence Status</span>
        <span id="geofence-status" class="text-slate-300">Outside zone</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-slate-400">Last SMS Sent</span>
        <span id="last-sms" class="text-slate-300">-</span>
      </div>
    </div>

    <!-- Configuration -->
    <div class="bg-slate-800 rounded-2xl p-6 mb-4">
      <h2 class="font-semibold mb-4">Alert Configuration</h2>
      
      <div class="space-y-4">
        <div>
          <label class="text-slate-400 text-sm">Location Name</label>
          <input type="text" id="location-name" value="Work" 
                 class="w-full bg-slate-700 rounded-lg px-4 py-2 mt-1 text-white">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-slate-400 text-sm">Latitude</label>
            <input type="number" id="latitude" value="37.7749" step="0.0001"
                   class="w-full bg-slate-700 rounded-lg px-4 py-2 mt-1 text-white">
          </div>
          <div>
            <label class="text-slate-400 text-sm">Longitude</label>
            <input type="number" id="longitude" value="-122.4194" step="0.0001"
                   class="w-full bg-slate-700 rounded-lg px-4 py-2 mt-1 text-white">
          </div>
        </div>
        <div>
          <label class="text-slate-400 text-sm">Geofence Radius (m)</label>
          <input type="number" id="radius" value="100" 
                 class="w-full bg-slate-700 rounded-lg px-4 py-2 mt-1 text-white">
        </div>
        <div>
          <label class="text-slate-400 text-sm">Recipient Phone Number</label>
          <input type="tel" id="phone-number" value="+1234567890" 
                 class="w-full bg-slate-700 rounded-lg px-4 py-2 mt-1 text-white">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="space-y-3">
      <button onclick="simulateArrival()" 
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-xl transition">
        📍 Simulate Arrival → Send SMS
      </button>
      <button onclick="simulateDeparture()" 
              class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-6 rounded-xl transition">
        🚗 Simulate Departure → Send SMS
      </button>
      <button onclick="useCurrentLocation()"
              class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-xl transition">
        📍 Use Current Location
      </button>
    </div>

    <!-- Message Preview -->
    <div class="bg-slate-800 rounded-2xl p-6 mt-4">
      <h2 class="font-semibold mb-4">SMS Preview</h2>
      <div class="bg-slate-900 rounded-xl p-4">
        <div class="text-slate-400 text-sm mb-2">To: <span id="preview-recipient">+1234567890</span></div>
        <div id="preview-message" class="text-white">
          📍 Arrival Alert: I have arrived at Work. Time: 12:00 PM
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="bg-slate-800 rounded-2xl p-6 mt-4">
      <h2 class="font-semibold mb-4">Activity Log</h2>
      <div id="log" class="text-sm text-slate-400 space-y-2 max-h-48 overflow-y-auto">
        <div>Ready to monitor location...</div>
      </div>
    </div>
  </div>

  <script>
    // Update preview when inputs change
    document.getElementById('phone-number').addEventListener('input', updatePreview);
    document.getElementById('location-name').addEventListener('input', updatePreview);

    function updatePreview() {
      const phone = document.getElementById('phone-number').value;
      const location = document.getElementById('location-name').value;
      document.getElementById('preview-recipient').textContent = phone;
      document.getElementById('preview-message').textContent = 
        `📍 Arrival Alert: I have arrived at ${location}. Time: ${new Date().toLocaleTimeString()}`;
    }

    function log(message) {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.textContent = `[${time}] ${message}`;
      logDiv.insertBefore(entry, logDiv.firstChild);
    }

    async function simulateArrival() {
      const location = document.getElementById('location-name').value;
      const phone = document.getElementById('phone-number').value;
      
      document.getElementById('geofence-status').textContent = 'Inside zone';
      document.getElementById('geofence-status').className = 'text-green-400';
      document.getElementById('last-sms').textContent = 'Arrival - ' + new Date().toLocaleTimeString();
      
      log('📍 Entered geofence: ' + location);
      log('📱 Sending arrival SMS to ' + phone + '...');
      
      // Call the workflow
      try {
        const response = await fetch('/api/geofence-arrival-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            config: {
              location_name: location,
              target_latitude: parseFloat(document.getElementById('latitude').value),
              target_longitude: parseFloat(document.getElementById('longitude').value),
              geofence_radius: parseInt(document.getElementById('radius').value),
              recipient_phone: phone
            }
          })
        });
        const data = await response.json();
        log('✅ SMS sent: ' + (data.sms?.success ? 'Success' : 'Simulated'));
      } catch (e) {
        log('⚠️ Demo mode - SMS simulated');
      }
    }

    async function simulateDeparture() {
      const location = document.getElementById('location-name').value;
      const phone = document.getElementById('phone-number').value;
      
      document.getElementById('geofence-status').textContent = 'Outside zone';
      document.getElementById('geofence-status').className = 'text-slate-300';
      document.getElementById('last-sms').textContent = 'Departure - ' + new Date().toLocaleTimeString();
      
      log('📍 Exited geofence: ' + location);
      log('📱 Sending departure SMS to ' + phone + '...');
      
      // Call the workflow
      try {
        const response = await fetch('/api/geofence-departure-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            config: {
              location_name: location,
              target_latitude: parseFloat(document.getElementById('latitude').value),
              target_longitude: parseFloat(document.getElementById('longitude').value),
              geofence_radius: parseInt(document.getElementById('radius').value),
              recipient_phone: phone
            }
          })
        });
        const data = await response.json();
        log('✅ SMS sent: ' + (data.sms?.success ? 'Success' : 'Simulated'));
      } catch (e) {
        log('⚠️ Demo mode - SMS simulated');
      }
    }

    function useCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            document.getElementById('latitude').value = position.coords.latitude.toFixed(6);
            document.getElementById('longitude').value = position.coords.longitude.toFixed(6);
            log('📍 Location set to current position');
          },
          (error) => {
            log('❌ Could not get location: ' + error.message);
          }
        );
      } else {
        log('❌ Geolocation not supported');
      }
    }

    updatePreview();
    log('📍 Geofence SMS Alert ready');
  </script>
</body>
</html>
