# Tests for OpenClaw Chat
# Workflow: habits/chat.yaml - AI chat with memory
workflow: ./habits/chat.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully processes chat message with memory"
    trigger:
      body:
        message: "What's the weather like?"
        userId: "user123"
        channel: "telegram"
    context:
      habits:
        input:
          message: "What's the weather like?"
          userId: "user123"
          channel: "telegram"
        env:
          INTERSECT_HOST: "https://api.intersect.ai"
          INTERSECT_API_KEY: "mock-api-key"
          ASSISTANT_NAME: "Assistant"
          ASSISTANT_PERSONALITY: "helpful AI assistant"
    mocks:
      bits:
        # Mock database query for memory context
        - bit: "@ha-bits/bit-database"
          action: query
          response:
            results:
              - id: "mem1"
                userId: "user123"
                content: "User prefers detailed answers"
                createdAt: "2024-01-10T09:00:00Z"
        # Mock Intersect chat completion
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response: "I don't have real-time weather data, but you can check weather.com for current conditions in your area."
        # Mock database insert for conversation
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            success: true
            id: "conv123"
