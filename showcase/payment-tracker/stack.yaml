version: "1.0"

workflows:
  - id: log-stripe-payment
    path: ./habits/log-stripe-payment.yaml
    enabled: true

  - id: log-wise-payment
    path: ./habits/log-wise-payment.yaml
    enabled: true

  - id: smart-conversion
    path: ./habits/smart-conversion.yaml
    enabled: true

  - id: manual-invoice
    path: ./habits/manual-invoice.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  openapi: true

# Environment variables required:
# STRIPE_SECRET_KEY - Stripe API secret key
# STRIPE_WEBHOOK_SECRET - Stripe webhook signing secret
# WISE_API_TOKEN - Wise API token
# WISE_PROFILE_ID - Wise profile ID
# GOOGLE_SHEETS_ACCESS_TOKEN - Google OAuth access token
# GOOGLE_SPREADSHEET_ID - Target spreadsheet ID
# WISE_SOURCE_CURRENCY - Source currency for conversion (e.g., USD)
# WISE_TARGET_CURRENCY - Target currency for conversion (e.g., EUR)

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
