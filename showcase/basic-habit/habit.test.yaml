# Tests for Basic Habit Code Demo
# Workflow: habit.yaml - Demonstrates script nodes with if conditions, loops, and string utilities
# Note: Script nodes with async/await need to be mocked in workflow tests
workflow: ./habit.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully processes data with conditions and loops"
    trigger:
      body: {}
    mocks:
      bits:
        - bit: "create-data"
          response:
            result:
              name: "habits demo"
              items: "apple,banana,cherry,date"
              count: 4
              isValid: true
        - bit: "check-valid"
          response:
            result:
              passed: true
              message: "Data validation passed"
              branch: "trueBranch"
        - bit: "string-utils"
          response:
            result:
              original: "habits demo"
              uppercase: "HABITS DEMO"
              lowercase: "habits demo"
    expectSteps:
      create-data:
        result:
          name: "habits demo"
          count: 4
