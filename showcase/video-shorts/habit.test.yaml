# Tests for Video Shorts Script Generator
# Workflow: habits/generate-short.yaml - Generates short video scripts
workflow: ./habits/generate-short.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully generates viral video script"
    trigger:
      body:
        topic: "5 productivity hacks"
        platform: "tiktok"
        duration: 30
        style: "educational"
        targetAudience: "professionals"
    context:
      habits:
        input:
          topic: "5 productivity hacks"
          platform: "tiktok"
          duration: 30
          style: "educational"
          targetAudience: "professionals"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock hook generation
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response: "Hook 1: Stop wasting 3 hours a day... Hook 2: Your to-do list is broken..."
        # Mock script generation
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response: "HOOK (0-3s): Stop wasting 3 hours a day\nBUILD: Here are 5 hacks that changed my life\nPEAK: Number 1 will shock you\nCTA: Follow for more tips"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
