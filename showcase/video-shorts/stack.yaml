version: "1.0"

workflows:
  - id: generate-short
    path: ./habits/generate-short.yaml
    enabled: true

  - id: list-shorts
    path: ./habits/list-shorts.yaml
    enabled: true

  - id: get-short
    path: ./habits/get-short.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
