id: list-shorts
name: List Shorts
description: Get all generated video shorts

input:
  - id: limit
    type: number
    required: false

nodes:
  - id: query-shorts
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      resource: query
      operation: query
      params:
        collection: "shorts"
        limit: "{{habits.input.limit}}"
        sort: '{"createdAt": -1}'

edges: []

output:
  shorts: "{{query-shorts.results}}"
  count: "{{query-shorts.count}}"
