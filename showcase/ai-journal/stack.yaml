version: "1.0"
name: "AI Journal"

workflows:
  - id: save-entry
    path: ./habits/save-entry.yaml
    enabled: true

  - id: get-entries
    path: ./habits/get-entries.yaml
    enabled: true

  - id: weekly-insights
    path: ./habits/weekly-insights.yaml
    enabled: true

  - id: get-entry
    path: ./habits/get-entry.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
