<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filesystem Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    h1 .icon {
      font-size: 32px;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .hint {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 25px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      text-align: center;
    }
    .hint strong {
      color: #4ade80;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      margin-bottom: 8px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      outline: none;
      transition: all 0.3s ease;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      border-color: #22c55e;
      background: rgba(255, 255, 255, 0.15);
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .btn {
      width: 100%;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(34, 197, 94, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 25px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result-title {
      color: #22c55e;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .result-content {
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .tech-badges {
      text-align: center;
      margin-bottom: 20px;
    }
    .tech-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      margin: 0 5px 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">📁</span> Filesystem Demo</h1>
    <p class="subtitle">File Operations with bit-filesystem</p>
    
    <div class="tech-badges">
      <span class="tech-badge">📄 File I/O</span>
      <span class="tech-badge">📂 Directory Ops</span>
      <span class="tech-badge">🔒 Path Safe</span>
    </div>

    <div class="hint">
      This demo writes a file with your message and verifies it exists.<br>
      Works in both <strong>Node.js</strong> and <strong>Tauri desktop apps</strong>.
    </div>

    <form id="demoForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label for="message">Message to Write</label>
        <textarea id="message" name="message" placeholder="Enter a message to write to the file" required></textarea>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        Write File
      </button>
    </form>

    <div class="result" id="result">
      <div class="result-title">Results</div>
      <div class="result-content" id="resultContent"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('demoForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');
    const resultContent = document.getElementById('resultContent');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const message = document.getElementById('message').value;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"><span class="spinner"></span> Writing file...</span>';
      resultDiv.classList.remove('show');
      
      try {
        const response = await fetch('/api/fs-demo', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, message }),
        });
        
        const data = await response.json();
        
        resultDiv.classList.add('show');
        resultContent.textContent = JSON.stringify(data, null, 2);
        
      } catch (error) {
        resultDiv.classList.add('show');
        resultContent.textContent = `Error: ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Write File';
      }
    });
  </script>
</body>
</html>
