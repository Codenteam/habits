<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Filesystem Demo</title>
 <style>
 :root {
 /* ha-bits Design Tokens — shared palette */
 --ha-bg-base: #0f172a;
 --ha-bg-surface: #1e293b;
 --ha-bg-elevated: #334155;
 --ha-bg-hover: #475569;
 --ha-border: #334155;
 --ha-border-subtle: #1e293b;
 --ha-text-primary: #ffffff;
 --ha-text-body: #cbd5e1;
 --ha-text-muted: #94a3b8;
 --ha-text-disabled: #64748b;
 --ha-accent-blue: #3b82f6;
 --ha-accent-blue-hover: #2563eb;
 --ha-accent-sky: #38bdf8;
 --ha-accent-emerald: #34d399;
 --ha-accent-emerald-dim: rgba(52, 211, 153, 0.15);
 --ha-accent-cyan: #22d3ee;
 --ha-accent-cyan-dim: rgba(34, 211, 238, 0.15);
 --ha-accent-purple: #c084fc;
 --ha-accent-purple-dim: rgba(192, 132, 252, 0.15);
 --ha-status-running: #fbbf24;
 --ha-status-success: #4ade80;
 --ha-status-success-dim: rgba(74, 222, 128, 0.15);
 --ha-status-error: #f87171;
 --ha-status-error-dim: rgba(248, 113, 113, 0.15);
 --ha-status-pending: #60a5fa;
 --ha-status-skipped: #a78bfa;
 --ha-warn: #f59e0b;
 --ha-danger: #ef4444;
 --ha-danger-hover: #dc2626;
 --ha-danger-surface: #7f1d1d;
 --ha-radius-sm: 4px;
 --ha-radius-md: 6px;
 --ha-radius-lg: 8px;
 --ha-radius-xl: 12px;
 --ha-radius-pill: 9999px;
 }
 </style>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--ha-bg-base);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }
 .container {
 background: rgba(255, 255, 255, 0.05);
 backdrop-filter: blur(10px);
 border-radius: 20px;
 padding: 40px;
 max-width: 700px;
 width: 100%;
 box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 h1 {
 color: var(--ha-bg-base);
 font-size: 28px;
 margin-bottom: 10px;
 text-align: center;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 }
 h1 .icon {
 font-size: 32px;
 }
 .subtitle {
 color: rgba(255, 255, 255, 0.6);
 text-align: center;
 margin-bottom: 30px;
 font-size: 14px;
 }
 .hint {
 background: rgba(59, 130, 246, 0.1);
 border: 1px solid rgba(59, 130, 246, 0.2);
 border-radius: 10px;
 padding: 15px;
 margin-bottom: 25px;
 color: rgba(255, 255, 255, 0.8);
 font-size: 13px;
 text-align: center;
 }
 .hint strong {
 color: var(--ha-accent-blue);
 }
 .form-group {
 margin-bottom: 20px;
 }
 label {
 display: block;
 color: rgba(255, 255, 255, 0.8);
 font-size: 14px;
 margin-bottom: 8px;
 }
 input, textarea {
 width: 100%;
 padding: 12px 16px;
 font-size: 16px;
 color: var(--ha-bg-base);
 background: rgba(255, 255, 255, 0.1);
 border: 1px solid rgba(255, 255, 255, 0.2);
 border-radius: 10px;
 outline: none;
 transition: all 0.3s ease;
 }
 textarea {
 resize: vertical;
 min-height: 100px;
 font-family: inherit;
 }
 input:focus, textarea:focus {
 border-color: var(--ha-accent-blue);
 background: rgba(255, 255, 255, 0.15);
 }
 input::placeholder, textarea::placeholder {
 color: rgba(255, 255, 255, 0.4);
 }
 .btn {
 width: 100%;
 padding: 15px 30px;
 font-size: 16px;
 font-weight: 600;
 color: #fff;
 background: var(--ha-accent-blue);
 border: none;
 border-radius: 12px;
 cursor: pointer;
 transition: all 0.3s ease;
 }
 .btn:hover {
 transform: translateY(-2px);
 box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
 }
 .btn:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 transform: none;
 }
 .result {
 margin-top: 25px;
 padding: 20px;
 background: rgba(0, 0, 0, 0.3);
 border-radius: 12px;
 display: none;
 }
 .result.show {
 display: block;
 }
 .result-title {
 color: var(--ha-status-success);
 font-size: 14px;
 font-weight: 600;
 margin-bottom: 10px;
 }
 .result-content {
 color: rgba(255, 255, 255, 0.9);
 font-family: 'Monaco', 'Menlo', monospace;
 font-size: 11px;
 white-space: pre-wrap;
 word-break: break-all;
 max-height: 400px;
 overflow-y: auto;
 }
 .loading {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 8px;
 color: rgba(255, 255, 255, 0.8);
 }
 .spinner {
 width: 20px;
 height: 20px;
 border: 2px solid rgba(255, 255, 255, 0.3);
 border-top-color: var(--ha-accent-blue);
 border-radius: 50%;
 animation: spin 1s linear infinite;
 }
 @keyframes spin {
 to { transform: rotate(360deg); }
 }
 .tech-badges {
 text-align: center;
 margin-bottom: 20px;
 }
 .tech-badge {
 display: inline-flex;
 align-items: center;
 gap: 6px;
 padding: 6px 12px;
 background: rgba(255, 255, 255, 0.1);
 border-radius: 20px;
 font-size: 12px;
 color: rgba(255, 255, 255, 0.8);
 margin: 0 5px 10px;
 }
 </style>
</head>
<body>
 <div class="container">
 <h1><span class="icon" style="color:white;"></span> Filesystem Demo</h1>
 <p class="subtitle">File Operations with bit-filesystem</p>
 
 <div class="tech-badges">
 <span class="tech-badge"> File I/O</span>
 <span class="tech-badge"> Directory Ops</span>
 <span class="tech-badge"> Path Safe</span>
 </div>

 <div class="hint">
 This demo writes a file with your message and verifies it exists.<br>
 Works in both <strong>Node.js</strong> and <strong>Tauri desktop apps</strong>.
 </div>

 <form id="demoForm">
 <div class="form-group">
 <label for="name">Your Name</label>
 <input type="text" id="name" name="name" placeholder="Enter your name" required>
 </div>
 <div class="form-group">
 <label for="message">Message to Write</label>
 <textarea id="message" name="message" placeholder="Enter a message to write to the file" required></textarea>
 </div>
 <button type="submit" class="btn" id="submitBtn">
 Write File
 </button>
 </form>

 <div class="result" id="result">
 <div class="result-title">Results</div>
 <div class="result-content" id="resultContent"></div>
 </div>
 </div>

 <script>
 const form = document.getElementById('demoForm');
 const submitBtn = document.getElementById('submitBtn');
 const resultDiv = document.getElementById('result');
 const resultContent = document.getElementById('resultContent');

 form.addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const name = document.getElementById('name').value;
 const message = document.getElementById('message').value;
 
 submitBtn.disabled = true;
 submitBtn.innerHTML = '<span class="loading"><span class="spinner"></span> Writing file...</span>';
 resultDiv.classList.remove('show');
 
 try {
 const response = await fetch('/api/fs-demo', {
 method: 'POST',
 headers: {
 'Content-Type': 'application/json',
 },
 body: JSON.stringify({ name, message }),
 });
 
 const data = await response.json();
 
 resultDiv.classList.add('show');
 resultContent.textContent = JSON.stringify(data, null, 2);
 
 } catch (error) {
 resultDiv.classList.add('show');
 resultContent.textContent = `Error: ${error.message}`;
 } finally {
 submitBtn.disabled = false;
 submitBtn.textContent = 'Write File';
 }
 });
 </script>
</body>
</html>
