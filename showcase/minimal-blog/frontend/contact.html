<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog - Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --neon-cyan: #00f5ff;
      --neon-magenta: #ff00ff;
      --neon-purple: #b026ff;
      --neon-green: #00ff88;
      --dark-bg: #0a0a0f;
      --card-bg: rgba(15, 15, 25, 0.8);
      --glass-border: rgba(0, 245, 255, 0.2);
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark-bg);
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }
    
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(ellipse at 30% 70%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(176, 38, 255, 0.05) 0%, transparent 70%);
    }
    
    .circuit-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.3;
      background-image: 
        linear-gradient(90deg, transparent 49%, rgba(0, 245, 255, 0.1) 50%, transparent 51%),
        linear-gradient(transparent 49%, rgba(0, 245, 255, 0.1) 50%, transparent 51%);
      background-size: 100px 100px;
    }
    
    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
    }
    
    header {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
    }
    
    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--neon-cyan), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }
    
    nav {
      display: flex;
      gap: 10px;
    }
    
    nav a {
      color: var(--neon-cyan);
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      padding: 10px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    nav a:hover {
      background: rgba(0, 245, 255, 0.1);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
    }
    
    .form-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 50px;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.6s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .form-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan), var(--neon-purple));
    }
    
    .form-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .form-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .form-header p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      letter-spacing: 1px;
    }
    
    .form-group {
      margin-bottom: 25px;
      position: relative;
    }
    
    label {
      display: block;
      color: var(--neon-cyan);
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    input, textarea {
      width: 100%;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid var(--glass-border);
      border-radius: 10px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.2), inset 0 0 20px rgba(0, 245, 255, 0.05);
    }
    
    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    button {
      width: 100%;
      padding: 18px 30px;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 245, 255, 0.2));
      border: 2px solid var(--neon-green);
      border-radius: 10px;
      color: var(--neon-green);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.3), transparent);
      transition: left 0.5s;
    }
    
    button:hover::before {
      left: 100%;
    }
    
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 245, 255, 0.3));
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.4), inset 0 0 30px rgba(0, 255, 136, 0.1);
      transform: translateY(-3px);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 25px;
      padding: 20px;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-align: center;
      display: none;
    }
    
    .status.loading {
      display: block;
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: var(--neon-cyan);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    .status.success {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: var(--neon-green);
    }
    
    .status.error {
      display: block;
      background: rgba(255, 50, 100, 0.1);
      border: 1px solid rgba(255, 50, 100, 0.3);
      color: #ff6b9d;
    }
    
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="circuit-lines"></div>
  
  <div class="container">
    <header>
      <a href="/" class="logo">
        <div class="logo-icon">⬡</div>
        <h1>MY BLOG</h1>
      </a>
      <nav>
        <a href="/">Home</a>
        <a href="/contact.html">Contact</a>
        <a href="/admin/">Admin</a>
      </nav>
    </header>
    
    <div class="form-container">
      <div class="form-header">
        <h2>Contact Me</h2>
        <p>Send me a message</p>
      </div>
      
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" required placeholder="Enter your name...">
        </div>
        
        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" name="email" required placeholder="your.email@example.com">
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Write your message..."></textarea>
        </div>
        
        <button type="submit" id="submit-btn">Send Message</button>
      </form>
      
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      
      if (!name || !email || !message) {
        showStatus('All fields are required', 'error');
        return;
      }
      
      submitBtn.disabled = true;
      showStatus('Sending message...', 'loading');
      
      try {
        const response = await fetch('/api/send-contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });
        
        const data = await response.json();
        
        if (data.status === 'error') {
          showStatus(`Failed to send: ${data.error || 'Unknown error'}`, 'error');
        } else if (data.output?.success) {
          showStatus('Message sent successfully!', 'success');
          form.reset();
        } else {
          showStatus('Message queued (SMTP config pending)', 'success');
          form.reset();
        }
        
      } catch (error) {
        showStatus(`Connection error: ${error.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
    
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }
  </script>
</body>
</html>
