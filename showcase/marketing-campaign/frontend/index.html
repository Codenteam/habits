<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intersect AI - Campaign Generator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00f0ff;
      --secondary: #7b2ff7;
      --accent: #f72585;
      --dark: #0a0a1a;
      --darker: #050510;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--darker);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(247, 37, 133, 0.08) 0%, transparent 40%);
      animation: rotate 30s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Main container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px rgba(0, 240, 255, 0.5);
      letter-spacing: 4px;
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(123, 47, 247, 0.8)); }
    }

    .subtitle {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 10px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    /* Input section */
    .input-section {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    .input-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--accent), transparent);
    }

    .input-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-label::before {
      content: '◆';
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .prompt-textarea {
      width: 100%;
      height: 200px;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(0, 240, 255, 0.2);
      border-radius: 16px;
      padding: 25px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      color: #fff;
      resize: vertical;
      transition: all 0.3s ease;
      line-height: 1.6;
    }

    .prompt-textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .prompt-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 
        0 0 30px rgba(0, 240, 255, 0.2),
        inset 0 0 30px rgba(0, 240, 255, 0.05);
    }

    /* Send button */
    .btn-container {
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    .send-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 18px 60px;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .send-btn:hover::before {
      left: 100%;
    }

    .send-btn:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 10px 40px rgba(123, 47, 247, 0.4),
        0 0 80px rgba(247, 37, 133, 0.2);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn.loading {
      pointer-events: none;
    }

    .send-btn.loading::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* Results section */
    .results-section {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .results-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--secondary), var(--primary), transparent);
    }

    .results-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: white;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-header span {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .results-header span::before {
      content: '◈';
      animation: pulse 2s infinite;
    }

    .results-count {
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .results-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .results-list::-webkit-scrollbar {
      width: 6px;
    }

    .results-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .results-list::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--primary), var(--secondary));
      border-radius: 3px;
    }

    .result-item {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 240, 255, 0.1);
      border-radius: 16px;
      padding: 0;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .result-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .result-item:hover {
      border-color: var(--primary);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
    }

    .result-item-header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px 25px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }

    .result-item-header:hover {
      background: rgba(0, 240, 255, 0.05);
    }

    .expand-icon {
      font-size: 1rem;
      color: var(--primary);
      transition: transform 0.3s ease;
      margin-left: auto;
    }

    .result-item.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .result-index {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      color: var(--primary);
      background: rgba(0, 240, 255, 0.1);
      padding: 8px 14px;
      border-radius: 8px;
      min-width: 45px;
      text-align: center;
    }

    .result-type {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      background: rgba(247, 37, 133, 0.15);
      padding: 6px 12px;
      border-radius: 6px;
      flex: 1;
    }

    .status-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      padding: 6px 12px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge.status-completed {
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
    }

    .status-badge.status-failed {
      background: rgba(255, 68, 68, 0.15);
      color: #ff4444;
    }

    .status-badge.status-running {
      background: rgba(0, 240, 255, 0.15);
      color: var(--primary);
      animation: pulse 1s infinite;
    }

    .status-badge.status-pending {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
    }

    .duration-badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(123, 47, 247, 0.2);
      color: var(--secondary);
    }

    .result-item.status-completed::before {
      background: linear-gradient(180deg, #00ff88, #00cc6a);
    }

    .result-item.status-failed::before {
      background: linear-gradient(180deg, #ff4444, #cc2222);
    }

    .result-item.status-running::before {
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      animation: pulse 1s infinite;
    }

    .error-inline {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: #ff6666;
      font-size: 0.9rem;
    }

    .result-content {
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      font-size: 1rem;
      padding: 0 25px 20px 25px;
      display: none;
      border-top: 1px solid rgba(0, 240, 255, 0.1);
      margin-top: 0;
      animation: slideDown 0.3s ease;
    }

    .result-item.expanded .result-content {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-content-inner {
      padding-top: 20px;
    }

    .result-content pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .result-image {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 15px;
      border: 2px solid rgba(0, 240, 255, 0.2);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 1.2rem;
      letter-spacing: 2px;
    }

    /* Error state */
    .error-message {
      background: rgba(247, 37, 133, 0.15);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 20px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .error-message::before {
      content: '⚠';
      font-size: 1.5rem;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, 
        rgba(255, 255, 255, 0.05) 0%, 
        rgba(255, 255, 255, 0.1) 50%, 
        rgba(255, 255, 255, 0.05) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      height: 80px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      animation: float 15s infinite;
      opacity: 0.3;
    }

    .particle:nth-child(2n) { background: var(--secondary); animation-delay: -2s; }
    .particle:nth-child(3n) { background: var(--accent); animation-delay: -4s; }

    @keyframes float {
      0%, 100% { 
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { 
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo { font-size: 2rem; }
      .subtitle { font-size: 0.9rem; letter-spacing: 4px; }
      .input-section, .results-section { padding: 25px; }
      .prompt-textarea { height: 150px; font-size: 1rem; }
      .send-btn { padding: 15px 40px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <header class="header">
      <h1 class="logo">INTERSECT</h1>
      <p class="subtitle">AI Campaign Generator</p>
    </header>

    <section class="input-section">
      <label class="input-label" for="prompt">Enter Your Campaign Prompt</label>
      <textarea 
        id="prompt" 
        class="prompt-textarea" 
        placeholder="Describe your marketing campaign... e.g., 'Launch campaign for a new eco-friendly water bottle with vibrant summer vibes'"
      ></textarea>
      <div class="btn-container">
        <button id="sendBtn" class="send-btn">Generate Campaign</button>
      </div>
    </section>

    <section class="results-section">
      <div class="results-header">
        <span>Generated Results</span>
        <span class="results-count" id="resultsCount" style="display: none;">0 items</span>
      </div>
      <div id="resultsContainer">
        <div class="empty-state">
          <div class="empty-state-icon">◇</div>
          <div class="empty-state-text">Enter a prompt and click Generate to see results</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Create floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (10 + Math.random() * 20) + 's';
      particle.style.animationDelay = -Math.random() * 20 + 's';
      particlesContainer.appendChild(particle);
    }

    // Main functionality
    const promptTextarea = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsCount = document.getElementById('resultsCount');

    const WORKFLOW_NAME = 'marketing-campaign';

    sendBtn.addEventListener('click', async () => {
      const prompt = promptTextarea.value.trim();
      
      if (!prompt) {
        showError('Please enter a prompt before generating.');
        return;
      }

      setLoading(true);
      initStreamingResults();
      
      try {
        const response = await fetch(`/api/marketing-campaign?stream=true`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ prompt }),
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        // Handle streaming NDJSON response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          
          // Process complete lines
          const lines = buffer.split('\n');
          buffer = lines.pop(); // Keep incomplete line in buffer
          
          for (const line of lines) {
            if (line.trim()) {
              try {
                const event = JSON.parse(line);
                handleStreamEvent(event);
              } catch (e) {
                console.warn('Failed to parse line:', line, e);
              }
            }
          }
        }
        
        // Process any remaining buffer
        if (buffer.trim()) {
          try {
            const event = JSON.parse(buffer);
            handleStreamEvent(event);
          } catch (e) {
            console.warn('Failed to parse final buffer:', buffer, e);
          }
        }
        
        finalizeResults();
      } catch (error) {
        console.error('Error:', error);
        showError(`Failed to generate campaign: ${error.message}`);
      } finally {
        setLoading(false);
      }
    });

    // Allow Ctrl+Enter to submit
    promptTextarea.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        sendBtn.click();
      }
    });

    function setLoading(loading) {
      sendBtn.disabled = loading;
      sendBtn.classList.toggle('loading', loading);
      sendBtn.textContent = loading ? 'Generating...' : 'Generate Campaign';
    }

    // Streaming state
    let streamResults = [];
    let completedCount = 0;
    let totalNodes = 0;

    function initStreamingResults() {
      streamResults = [];
      completedCount = 0;
      totalNodes = 0;
      resultsContainer.innerHTML = `<ul class="results-list" id="streamingList"></ul>`;
      resultsCount.textContent = 'Streaming...';
      resultsCount.style.display = 'block';
    }

    function handleStreamEvent(event) {
      const { nodeId, nodeName, status, result, output, error, duration } = event;
      
      // Use output field if result is not provided (server sends 'output', not 'result')
      const resultData = result !== undefined ? result : output;
      
      // Find existing item or create new one
      let existingIndex = streamResults.findIndex(r => r.nodeId === nodeId);
      
      // IF node status is execution_completed, skip
      if (status === 'execution_completed') {
        return;
      }
      if (existingIndex === -1) {
        totalNodes++;
        streamResults.push({
          nodeId,
          nodeName: nodeName || nodeId,
          status: status || 'pending',
          result: null,
          error: null,
          duration: null
        });
        existingIndex = streamResults.length - 1;
      }
      
      // Update the item
      const item = streamResults[existingIndex];
      item.status = status || item.status;
      item.nodeName = nodeName || item.nodeName;
      
      if (status === 'completed') {
        completedCount++;
        item.result = resultData;
        item.duration = duration;
      } else if (status === 'failed') {
        completedCount++;
        item.error = error;
        item.duration = duration;
      }
      
      // Update display
      updateStreamingDisplay();
    }

    function updateStreamingDisplay() {
      const list = document.getElementById('streamingList');
      if (!list) return;
      
      resultsCount.textContent = `${completedCount}/${totalNodes} nodes completed`;
      
      list.innerHTML = streamResults.map((item, index) => {
        const statusClass = getStatusClass(item.status);
        const statusIcon = getStatusIcon(item.status);
        const content = formatStreamContent(item);
        const itemId = `result-item-${index}`;
        
        return `
          <li class="result-item ${statusClass}" id="${itemId}">
            <div class="result-item-header" onclick="toggleResultItem('${itemId}')">
              <span class="result-index">${String(index + 1).padStart(2, '0')}</span>
              <span class="result-type">${escapeHtml(item.nodeName)}</span>
              <span class="status-badge ${statusClass}">${statusIcon} ${item.status}</span>
              ${item.duration ? `<span class="duration-badge">${item.duration}ms</span>` : ''}
              <span class="expand-icon">▼</span>
            </div>
            <div class="result-content"><div class="result-content-inner">${content}</div></div>
          </li>
        `;
      }).join('');
    }

    function toggleResultItem(itemId) {
      const item = document.getElementById(itemId);
      if (item) {
        item.classList.toggle('expanded');
      }
    }

    function getStatusClass(status) {
      switch (status) {
        case 'completed': return 'status-completed';
        case 'failed': return 'status-failed';
        case 'running': return 'status-running';
        default: return 'status-pending';
      }
    }

    function getStatusIcon(status) {
      switch (status) {
        case 'completed': return '✓';
        case 'failed': return '✗';
        case 'running': return '◎';
        default: return '○';
      }
    }

    function formatStreamContent(item) {
      if (item.status === 'running' || item.status === 'pending') {
        return '<div class="skeleton" style="height: 40px;"></div>';
      }
      
      if (item.error) {
        return `<div class="error-inline">${escapeHtml(item.error)}</div>`;
      }
      
      if (item.result !== null && item.result !== undefined) {
        return formatContent(item.result);
      }
      
      return '<span style="opacity: 0.5;">No output</span>';
    }

    function finalizeResults() {
      resultsCount.textContent = `${completedCount} item${completedCount !== 1 ? 's' : ''} completed`;
    }

    function showLoading() {
      resultsContainer.innerHTML = `
        <ul class="results-list">
          ${Array(3).fill('<li class="skeleton"></li>').join('')}
        </ul>
      `;
      resultsCount.style.display = 'none';
    }

    function showError(message) {
      resultsContainer.innerHTML = `
        <div class="error-message">${message}</div>
      `;
      resultsCount.style.display = 'none';
    }

    function displayResults(data) {
      // Handle different response formats
      let results = [];
      
      if (Array.isArray(data)) {
        results = data;
      } else if (data.results && Array.isArray(data.results)) {
        results = data.results;
      } else if (data.outputs && Array.isArray(data.outputs)) {
        results = data.outputs;
      } else if (typeof data === 'object') {
        // Convert object properties to array of results
        results = Object.entries(data).map(([key, value]) => ({
          type: key,
          content: value
        }));
      }

      if (results.length === 0) {
        resultsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">◇</div>
            <div class="empty-state-text">No results returned from the workflow</div>
          </div>
        `;
        resultsCount.style.display = 'none';
        return;
      }

      resultsCount.textContent = `${results.length} item${results.length !== 1 ? 's' : ''}`;
      resultsCount.style.display = 'block';

      const listHTML = results.map((result, index) => {
        const type = result.type || result.node || result.step || 'Output';
        const content = formatContent(result.content || result.data || result.output || result.value || result);
        const itemId = `display-result-item-${index}`;
        
        return `
          <li class="result-item" id="${itemId}">
            <div class="result-item-header" onclick="toggleResultItem('${itemId}')">
              <span class="result-index">${String(index + 1).padStart(2, '0')}</span>
              <span class="result-type">${escapeHtml(String(type))}</span>
              <span class="expand-icon">▼</span>
            </div>
            <div class="result-content"><div class="result-content-inner">${content}</div></div>
          </li>
        `;
      }).join('');

      resultsContainer.innerHTML = `<ul class="results-list">${listHTML}</ul>`;
    }

    function formatContent(content) {
      if (typeof content === 'string') {
        // Check if it's an image URL
        if (content.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i) || content.startsWith('data:image')) {
          return `<img src="${escapeHtml(content)}" alt="Generated image" class="result-image" />`;
        }
        // Check if it's HTML
        if (content.trim().startsWith('<') && content.trim().endsWith('>')) {
          return `<pre><code>${escapeHtml(content)}</code></pre>`;
        }
        // Check if it's a URL
        if (content.match(/^https?:\/\//)) {
          return `<a href="${escapeHtml(content)}" target="_blank" style="color: var(--primary);">${escapeHtml(content)}</a>`;
        }
        return escapeHtml(content).replace(/\n/g, '<br>');
      }
      
      if (typeof content === 'object' && content !== null) {
        let output = '';
        
        // Check for base64 image data (e.g., from image generator)
        const base64Image = extractBase64Image(content);
        if (base64Image) {
          output += `<img src="data:image/png;base64,${base64Image}" alt="Generated image" class="result-image" />`;
        }
        
        // Check for URL in various nested locations
        const url = extractUrl(content);
        if (url) {
          output += `<div style="margin: 10px 0;">
            <span style="color: var(--secondary); font-weight: 600;">🔗 Link: </span>
            <a href="${escapeHtml(url)}" target="_blank" style="color: var(--primary); word-break: break-all;">${escapeHtml(url)}</a>
          </div>`;
        }
        
        // If we extracted special content, show it along with collapsed raw data
        if (output) {
          output += `<details style="margin-top: 15px;">
            <summary style="cursor: pointer; color: var(--secondary); font-size: 0.85rem;">View raw data</summary>
            <pre style="margin-top: 10px;"><code>${escapeHtml(JSON.stringify(content, null, 2))}</code></pre>
          </details>`;
          return output;
        }
        
        return `<pre><code>${escapeHtml(JSON.stringify(content, null, 2))}</code></pre>`;
      }
      
      return escapeHtml(String(content));
    }

    function extractBase64Image(obj) {
      if (!obj || typeof obj !== 'object') return null;
      
      // Check for data array with b64_json (OpenAI image format)
      if (obj.data && Array.isArray(obj.data)) {
        for (const item of obj.data) {
          if (item.b64_json && item.b64_json.length > 0) {
            return item.b64_json;
          }
        }
      }
      
      // Check for nested output.data
      if (obj.output && obj.output.data && Array.isArray(obj.output.data)) {
        for (const item of obj.output.data) {
          if (item.b64_json && item.b64_json.length > 0) {
            return item.b64_json;
          }
        }
      }
      
      // Check for direct b64_json property
      if (obj.b64_json && obj.b64_json.length > 0) {
        return obj.b64_json;
      }
      
      // Check for base64 or image_base64 property
      if (obj.base64 && obj.base64.length > 0) {
        return obj.base64;
      }
      if (obj.image_base64 && obj.image_base64.length > 0) {
        return obj.image_base64;
      }
      
      return null;
    }

    function extractUrl(obj) {
      if (!obj || typeof obj !== 'object') return null;
      
      // Direct url property
      if (obj.url && typeof obj.url === 'string' && obj.url.match(/^https?:\/\//)) {
        return obj.url;
      }
      
      // Nested output.url
      if (obj.output && typeof obj.output === 'object' && obj.output.url && typeof obj.output.url === 'string' && obj.output.url.match(/^https?:\/\//)) {
        return obj.output.url;
      }
      
      // rawResponse.url
      if (obj.rawResponse && typeof obj.rawResponse === 'object' && obj.rawResponse.url && typeof obj.rawResponse.url === 'string' && obj.rawResponse.url.match(/^https?:\/\//)) {
        return obj.rawResponse.url;
      }
      
      // link property
      if (obj.link && typeof obj.link === 'string' && obj.link.match(/^https?:\/\//)) {
        return obj.link;
      }
      
      return null;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
