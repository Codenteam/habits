id: list-analyses
name: List Analyses
description: Get all resume analyses from SQL database

input:
  - id: limit
    type: number
    required: false
    default: 100

nodes:
  - id: query-analyses
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database-sql"
      operation: query
      params:
        collection: "resume_analyses"
        limit: "{{habits.input.limit}}"

edges: []

output:
  analyses: "{{query-analyses.results}}"
