id: list-analyses
name: List Analyses
description: Get all resume analyses

input:
  - id: limit
    type: number
    required: false

nodes:
  - id: query-analyses
    type: bits
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-pouch"
      operation: query
      params:
        collection: "resume_analyses"
        limit: "{{habits.input.limit}}"

edges: []

output:
  analyses: "{{query-analyses.results}}"
  count: "{{query-analyses.count}}"
