<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="icon" type="image/png" href="/Icon.png">
    <title>Resume Analyzer</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --primary: #f97316;
            --primary-dark: #ea580c;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #1a1a1a;
            --bg-card: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.5;
        }
        
        /* App Container */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        
        /* App Header */
        .app-header {
            flex-shrink: 0;
            padding: 16px 20px;
            background: #222222;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 100;
        }
        
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }
        
        .header-back {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1rem;
            padding: 8px;
            cursor: pointer;
            display: none;
        }
        
        .header-back.visible { display: block; }
        
        .header-action {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.2rem;
            padding: 8px;
            cursor: pointer;
            display: none;
        }
        
        .header-action.visible { display: block; }
        
        /* App Content */
        .app-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        
        /* Screens */
        .screen {
            display: none;
            min-height: 100%;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .screen.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-input::placeholder { color: var(--text-muted); }
        
        textarea.form-input {
            resize: none;
            min-height: 120px;
        }
        
        /* File Upload */
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-zone.active {
            border-color: var(--primary);
            background: rgba(249, 115, 22, 0.1);
        }
        
        .upload-zone.has-file {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }
        
        .upload-zone input { display: none; }
        
        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
        }
        
        .upload-text {
            font-size: 1rem;
            color: var(--text-secondary);
        }
        
        .upload-filename {
            margin-top: 12px;
            font-weight: 600;
            color: var(--success);
            word-break: break-all;
        }
        
        /* Primary Button */
        .btn-primary {
            width: 100%;
            padding: 18px 24px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Score Ring */
        .score-ring {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .score-item {
            text-align: center;
            flex: 1;
            min-width: 70px;
            padding: 16px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }
        
        .score-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .score-value.high { color: var(--success); }
        .score-value.medium { color: var(--warning); }
        .score-value.low { color: var(--danger); }
        
        .score-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* Segment Control (Tabs) */
        .segment-control {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .segment-control::-webkit-scrollbar { display: none; }
        
        .segment-btn {
            flex: 1;
            min-width: max-content;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .segment-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Tab Content */
        .tab-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-panel.active { display: block; }
        
        /* Content Section */
        .content-section {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }
        
        .section-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
        }
        
        /* Skills Tags */
        .skills-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .skill-chip {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .skill-chip.match {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .skill-chip.missing {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        /* History List */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .history-item:active {
            background: rgba(255,255,255,0.1);
        }
        
        .history-icon {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-right: 14px;
            flex-shrink: 0;
        }
        
        .history-info { flex: 1; }
        
        .history-title {
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .history-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .history-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 26, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.active { display: flex; }
        
        .loading-spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
        
        /* Bottom Nav */
        .bottom-nav {
            flex-shrink: 0;
            display: flex;
            background: #222222;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-bottom));
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .nav-item.active { color: var(--primary); }
        
        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        
        /* Action Button */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .action-btn:active { background: rgba(255,255,255,0.15); }
        
        .action-btn.success {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        
        /* Copy Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="app-header">
            <button class="header-back" id="headerBack" onclick="goBack()">← Back</button>
            <h1 id="headerTitle">Resume Analyzer</h1>
            <button class="header-action" id="headerAction" onclick="downloadPdf()">📥</button>
        </header>
        
        <!-- Content -->
        <main class="app-content">
            <!-- Home Screen -->
            <div class="screen active" id="homeScreen">
                <div class="card">
                    <div class="card-title">Upload Resume</div>
                    <form id="analyzeForm">
                        <div class="form-group">
                            <div class="upload-zone" id="uploadZone">
                                <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp">
                                <div class="upload-icon"><img src="Icon.png" width="50" alt="Upload Icon"></div>
                                <div class="upload-text">Tap to upload resume image (PNG, JPG, WebP)</div>
                                <div class="upload-filename" id="fileName"></div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Target Role</label>
                            <input type="text" class="form-input" id="targetRole" placeholder="e.g., Senior Software Engineer">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Job Description (optional)</label>
                            <textarea class="form-input" id="jobDescription" placeholder="Paste the job description for better analysis..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="analyzeBtn">
                            🔍 Analyze Resume
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Results Screen -->
            <div class="screen" id="resultsScreen">
                <div class="score-ring" id="scoreRing"></div>
                
                <div class="segment-control" id="tabControl">
                    <button class="segment-btn active" data-tab="ats">📊 ATS</button>
                    <button class="segment-btn" data-tab="exp">💼 Experience</button>
                    <button class="segment-btn" data-tab="match">🎯 Match</button>
                    <button class="segment-btn" data-tab="summary">✍️ Summary</button>
                    <button class="segment-btn" data-tab="interview">🎤 Interview</button>
                </div>
                
                <div class="tab-panel active" id="atsPanel">
                    <div class="content-section">
                        <div class="section-title">ATS Compatibility</div>
                        <div class="section-text" id="atsContent"></div>
                    </div>
                </div>
                
                <div class="tab-panel" id="expPanel">
                    <div class="content-section">
                        <div class="section-title">Experience Analysis</div>
                        <div class="section-text" id="expContent"></div>
                    </div>
                </div>
                
                <div class="tab-panel" id="matchPanel">
                    <div class="content-section">
                        <div class="section-title">✅ Matching Skills</div>
                        <div class="skills-row" id="matchingSkills"></div>
                        
                        <div class="section-title">❌ Missing Skills</div>
                        <div class="skills-row" id="missingSkills"></div>
                    </div>
                    <div class="content-section">
                        <div class="section-title">Job Match Details</div>
                        <div class="section-text" id="matchContent"></div>
                    </div>
                </div>
                
                <div class="tab-panel" id="summaryPanel">
                    <div class="content-section">
                        <div class="section-title">Improved Summary</div>
                        <div class="section-text" id="summaryContent"></div>
                        <div style="margin-top: 16px;">
                            <button class="action-btn" onclick="copyText('summaryContent')">📋 Copy to Clipboard</button>
                        </div>
                    </div>
                </div>
                
                <div class="tab-panel" id="interviewPanel">
                    <div class="content-section">
                        <div class="section-title">Interview Prep</div>
                        <div class="section-text" id="interviewContent"></div>
                    </div>
                </div>
            </div>
            
            <!-- History Screen -->
            <div class="screen" id="historyScreen">
                <div class="history-list" id="historyList">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div>Loading history...</div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="home" onclick="showScreen('home')">
                <span class="nav-icon">➕</span>
                <span>New</span>
            </button>
            <button class="nav-item" data-screen="history" onclick="showScreen('history')">
                <span class="nav-icon">📋</span>
                <span>History</span>
            </button>
        </nav>
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Analyzing resume...</div>
        </div>
        
        <!-- Toast -->
        <div class="toast" id="toast">Copied!</div>
    </div>

    <script>
        // State
        let fileBase64 = null;
        let currentPdfData = null;
        let currentScreen = 'home';
        
        // Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const analyzeForm = document.getElementById('analyzeForm');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const headerBack = document.getElementById('headerBack');
        const headerAction = document.getElementById('headerAction');
        const headerTitle = document.getElementById('headerTitle');
        
        // File Upload
        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('active');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('active');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file?.type.startsWith('image/')) {
                handleFile(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        function handleFile(file) {
            fileName.textContent = file.name;
            uploadZone.classList.add('has-file');
            
            const reader = new FileReader();
            reader.onload = () => {
                fileBase64 = reader.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
        
        // Form Submit
        analyzeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!fileBase64) {
                showToast('Please upload an image first');
                return;
            }
            
            loadingOverlay.classList.add('active');
            
            try {
                const response = await fetch('/api/analyze-resume', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        resumeImage: fileBase64,
                        targetRole: document.getElementById('targetRole').value || undefined,
                        jobDescription: document.getElementById('jobDescription').value || undefined
                    })
                });
                
                const data = await response.json();
                displayResults(data);
                showScreen('results');
                loadHistory();
            } catch (error) {
                showToast('Error: ' + error.message);
            } finally {
                loadingOverlay.classList.remove('active');
            }
        });
        
        // Tab Control
        document.getElementById('tabControl').addEventListener('click', (e) => {
            const btn = e.target.closest('.segment-btn');
            if (!btn) return;
            
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab + 'Panel').classList.add('active');
        });
        
        // Screen Navigation
        function showScreen(screen) {
            currentScreen = screen;
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            if (screen === 'home') {
                document.getElementById('homeScreen').classList.add('active');
                document.querySelector('[data-screen="home"]').classList.add('active');
                headerTitle.textContent = 'Resume Analyzer';
                headerBack.classList.remove('visible');
                headerAction.classList.remove('visible');
            } else if (screen === 'history') {
                document.getElementById('historyScreen').classList.add('active');
                document.querySelector('[data-screen="history"]').classList.add('active');
                headerTitle.textContent = 'History';
                headerBack.classList.remove('visible');
                headerAction.classList.remove('visible');
                loadHistory();
            } else if (screen === 'results') {
                document.getElementById('resultsScreen').classList.add('active');
                headerTitle.textContent = 'Analysis';
                headerBack.classList.add('visible');
                if (currentPdfData) {
                    headerAction.classList.add('visible');
                }
            }
        }
        
        function goBack() {
            showScreen('home');
            currentPdfData = null;
        }
        
        // Display Results
        function displayResults(data) {
            const ats = parseJSON(data.atsScore);
            const match = parseJSON(data.jobMatch);
            
            // Scores
            const scores = [
                { label: 'ATS', value: ats?.overallScore },
                { label: 'Keywords', value: ats?.keywordScore },
                { label: 'Format', value: ats?.formatScore },
                { label: 'Match', value: match?.matchScore }
            ];
            
            document.getElementById('scoreRing').innerHTML = scores.map(s => {
                const val = s.value ?? '-';
                const cls = typeof val === 'number' ? (val >= 70 ? 'high' : val >= 50 ? 'medium' : 'low') : '';
                return `
                    <div class="score-item">
                        <div class="score-value ${cls}">${val}${typeof val === 'number' ? '%' : ''}</div>
                        <div class="score-label">${s.label}</div>
                    </div>
                `;
            }).join('');
            
            // ATS Tab
            let atsText = '';
            if (ats) {
                atsText += `Missing Keywords:\n${(ats.missingKeywords || []).join(', ') || 'None detected'}\n\n`;
                atsText += `Format Issues:\n${(ats.formatIssues || []).join(', ') || 'None detected'}\n\n`;
                atsText += `Suggestions:\n${(ats.suggestions || []).map(s => '• ' + s).join('\n')}`;
            }
            document.getElementById('atsContent').textContent = atsText || data.atsScore || '';
            
            // Experience Tab
            document.getElementById('expContent').textContent = data.experienceAnalysis || '';
            
            // Match Tab
            if (match) {
                document.getElementById('matchingSkills').innerHTML = 
                    (match.matchingSkills || []).map(s => `<span class="skill-chip match">${s}</span>`).join('') || 
                    '<span style="color: var(--text-muted)">None detected</span>';
                    
                document.getElementById('missingSkills').innerHTML = 
                    (match.missingSkills || []).map(s => `<span class="skill-chip missing">${s}</span>`).join('') || 
                    '<span style="color: var(--text-muted)">None detected</span>';
                
                let matchText = `Outcome: ${match.likelyOutcome || 'Unknown'}\n\n`;
                matchText += `Strengths:\n${(match.strengthsForRole || []).map(s => '• ' + s).join('\n')}\n\n`;
                matchText += `Gaps:\n${(match.experienceGaps || []).map(s => '• ' + s).join('\n')}\n\n`;
                matchText += `Recommendations:\n${(match.recommendations || []).map(s => '• ' + s).join('\n')}`;
                document.getElementById('matchContent').textContent = matchText;
            }
            
            // Summary Tab
            document.getElementById('summaryContent').textContent = data.improvedSummary || '';
            
            // Interview Tab
            document.getElementById('interviewContent').textContent = data.interviewPrep || '';
        }
        
        // History
        async function loadHistory() {
            const list = document.getElementById('historyList');
            
            try {
                const response = await fetch('/api/list-analyses?limit=10');
                const data = await response.json();
                
                if (data.analyses?.length > 0) {
                    list.innerHTML = data.analyses.map(a => {
                        const ats = parseJSON(a.atsScore);
                        return `
                            <div class="history-item" onclick="viewAnalysis('${a.customId || a._id}')">
                                <div class="history-icon">📄</div>
                                <div class="history-info">
                                    <div class="history-title">${a.targetRole || 'Resume Analysis'}</div>
                                    <div class="history-meta">ATS Score: ${ats?.overallScore ?? '-'}%</div>
                                </div>
                                <div class="history-arrow">›</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <div>No analyses yet</div>
                        </div>
                    `;
                }
            } catch (error) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div>Error loading history</div>
                    </div>
                `;
            }
        }
        
        async function viewAnalysis(id) {
            loadingOverlay.classList.add('active');
            
            try {
                const response = await fetch(`/api/get-analysis?id=${id}&includeAttachment=true`);
                const data = await response.json();
                
                if (data.analysis) {
                    displayResults(data.analysis);
                    currentPdfData = data.attachment?.data || null;
                    showScreen('results');
                }
            } catch (error) {
                showToast('Error loading analysis');
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }
        
        // Utils
        function parseJSON(data) {
            if (typeof data === 'object') return data;
            try {
                return JSON.parse(data.replace(/```json\n?/g, '').replace(/```\n?/g, ''));
            } catch { return null; }
        }
        
        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text);
            showToast('Copied to clipboard!');
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }
        
        function downloadPdf() {
            if (currentPdfData) {
                const link = document.createElement('a');
                link.href = 'data:image/webp;base64,' + currentPdfData;
                link.download = 'resume.webp';
                link.click();
            } else {
                showToast('No image attached');
            }
        }
        
        // Init
        loadHistory();
    </script>
</body>
</html>
