version: "1.0"
name: "Local AI (No UI)"

# Local AI Showcase - Auto-generated forms version
# Uses no frontend - Cortex app will auto-generate UI from input/output schemas

workflows:
  - id: ask-local-ai
    path: ./habits/ask-local-ai.yaml
    enabled: true

  - id: generate-image
    path: ./habits/generate-image.yaml
    enabled: true

  - id: caption-image
    path: ./habits/caption-image.yaml
    enabled: true

  - id: transcribe-audio
    path: ./habits/transcribe-audio.yaml
    enabled: true

  - id: text-to-speech
    path: ./habits/text-to-speech.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  # No frontend - Cortex app will auto-generate UI from workflow input/output schemas
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true

# Tauri app configuration for desktop/mobile
application:
  scheme: localai
  name: Local AI (No UI)
  identifier: com.habits.localai.noui
