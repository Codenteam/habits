version: "1.0"

# Local AI Showcase
# Demonstrates running AI models locally using bit-local-ai

workflows:
  - id: ask-local-ai
    path: ./habits/ask-local-ai.yaml
    enabled: true

  - id: list-models
    path: ./habits/list-models.yaml
    enabled: true

  - id: install-model
    path: ./habits/install-model.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true

# Tauri app configuration for desktop/mobile
application:
  scheme: localai
  name: Local AI
  identifier: com.habits.localai
