# Local AI E2E Tests
# Tests all local AI models: text generation, image generation, image captioning, TTS, STT
# These tests run against REAL models - no mocks
#
# Run with: npx tsx scripts/e2e/e2e-test.cts --example local-ai --workflow <workflow-id>
# Or use workflow-specific tests with the workflow runner

workflow: ./stack.yaml

tests:
  # ═══════════════════════════════════════════════════════════════════════════
  # TEXT GENERATION TESTS
  # Uses local LLM (qwen2-0.5b or similar)
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "text-gen: basic math calculation (12+12=24)"
    workflow: ask-local-ai
    context:
      habits:
        input:
          prompt: "What is 12 + 12? Respond with just the number, nothing else."
          model: "qwen2-0.5b"
          temperature: 0.1
          maxTokens: 10
    expect:
      # Output should contain "24" somewhere in the message
      # Since partialMatch doesn't do string contains, we verify structure
      # The actual assertion for "24" should be done by checking output.message
      message: {} # Verify message field exists
    expectContains:
      field: message
      value: "24"
    tags: [text-gen, math, quick]

  - name: "text-gen: simple reasoning question"
    workflow: ask-local-ai
    context:
      habits:
        input:
          prompt: "5 minus 3 equals what number? Just write the number."
          model: "qwen2-0.5b"
          temperature: 0.1
          maxTokens: 10
    expect:
      message: {}
    expectContains:
      field: message
      value: "2"
    tags: [text-gen, math, quick]

  - name: "text-gen: multiplication (7x8=56)"
    workflow: ask-local-ai
    context:
      habits:
        input:
          prompt: "Calculate: 7 times 8. Reply with only the number."
          model: "qwen2-0.5b"
          temperature: 0.1
          maxTokens: 10
    expect:
      message: {}
    expectContains:
      field: message
      value: "56"
    tags: [text-gen, math, quick]

  # ═══════════════════════════════════════════════════════════════════════════
  # LIST MODELS TEST
  # Verifies model discovery works
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "list-models: returns available models"
    workflow: list-models
    context:
      habits:
        input: {}
    expect:
      models: [] # Array of models should exist
      count: {} # Count field should exist
    tags: [models, setup, quick]

  # ═══════════════════════════════════════════════════════════════════════════
  # IMAGE GENERATION + CAPTIONING PIPELINE
  # Generate image with specific objects, then verify via captioning
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "image-gen: generate image with computer and robot"
    workflow: generate-image
    context:
      habits:
        input:
          prompt: "A computer workstation with a small robot sitting next to it, digital art style"
          model: "sd-1.5"
          resolution: "512x512"
          steps: 20
          seed: 42  # Fixed seed for reproducibility
    expect:
      imageUrl: {} # Should return image URL
      imagePath: {} # Should return file path
      width: 512
      height: 512
    tags: [image-gen, slow]
    # After running this test, use the imagePath output as input to caption-image

  - name: "caption-image: verify generated image contains expected objects"
    workflow: caption-image
    context:
      habits:
        input:
          # Use a test image of a computer/robot scene
          # In E2E, chain output from image-gen test
          image: "{{GENERATED_IMAGE_PATH}}"  # Placeholder - set from previous test
          model: "blip-large"
    expect:
      caption: {}
    expectContainsAny:
      field: caption
      values: ["computer", "robot", "machine", "digital", "monitor", "screen", "technology"]
    tags: [image-caption, slow]

  # Combined test: generate then caption
  - name: "image-pipeline: generate and caption (computer+robot verification)"
    description: |
      This is a multi-step test:
      1. Generate image with prompt "computer and robot"
      2. Caption the generated image
      3. Verify caption mentions computer-related or robot-related terms
    workflow: generate-image
    context:
      habits:
        input:
          prompt: "A desktop computer with keyboard and mouse next to a friendly robot helper"
          model: "sd-1.5"
          resolution: "512x512"
          steps: 25
          seed: 12345
    expect:
      imageUrl: {}
      imagePath: {}
    followUp:
      workflow: caption-image
      inputMapping:
        image: "{{output.imagePath}}"
        model: "blip-large"
      expectContainsAny:
        field: caption
        values: ["computer", "robot", "keyboard", "machine", "desk", "monitor"]
    tags: [pipeline, image, slow]

  # ═══════════════════════════════════════════════════════════════════════════
  # TEXT-TO-SPEECH + SPEECH-TO-TEXT PIPELINE
  # Generate speech, then transcribe it back and verify
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "tts: generate speech from text"
    workflow: text-to-speech
    context:
      habits:
        input:
          text: "Hello world, this is a test of the text to speech system."
          voice: "default"
          speed: 1.0
          format: "wav"
    expect:
      audioUrl: {}
      audioPath: {}
      durationSeconds: {} # Should have some duration
    tags: [tts, slow]

  - name: "stt: transcribe audio to text"
    workflow: transcribe-audio
    context:
      habits:
        input:
          # Use audio from TTS test or a pre-recorded test file
          audioUrl: "{{TTS_OUTPUT_PATH}}"  # Placeholder - set from TTS test
          model: "small"
          task: "Transcribe"
    expect:
      text: {}
      language: {}
    expectContainsAny:
      field: text
      values: ["hello", "world", "test", "speech"]
    tags: [stt, slow]

  # Combined TTS + STT round-trip test
  - name: "speech-pipeline: TTS then STT round-trip verification"
    description: |
      This is a round-trip test:
      1. Convert text "The quick brown fox" to speech
      2. Transcribe the generated audio back to text
      3. Verify transcription contains key words from original
      NOTE: Currently skipped - TTS outputs 24kHz but Whisper expects 16kHz.
      Need to add audio resampling support to bit-local-ai.
    workflow: text-to-speech
    context:
      habits:
        input:
          text: "The quick brown fox jumps over the lazy dog"
          voice: "default"
          speed: 1.0
          format: "wav"
    expect:
      audioPath: {}
    followUp:
      workflow: transcribe-audio
      inputMapping:
        audioUrl: "{{output.audioPath}}"
        model: "small"
        task: "Transcribe"
      expectContainsAny:
        field: text
        values: ["quick", "brown", "fox", "jumps", "lazy", "dog"]
    tags: [pipeline, speech, slow, skip]  # Skip - sample rate mismatch (TTS=24kHz, Whisper=16kHz)

  # ═══════════════════════════════════════════════════════════════════════════
  # VISION / IMAGE-TO-TEXT TESTS
  # Test image understanding capabilities
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "vision: describe test image"
    workflow: caption-image
    context:
      habits:
        input:
          # Use a well-known test image path
          image: "/path/to/test/image.jpg"  # Should be replaced with actual test image
          model: "blip-large"
    expect:
      caption: {}
      tokensGenerated: {}
    tags: [vision, slow, skip]  # Skip - requires real test image

  # ═══════════════════════════════════════════════════════════════════════════
  # DATA EXTRACTION TEST
  # Test structured data extraction from text
  # ═══════════════════════════════════════════════════════════════════════════
  
  - name: "extract-data: extract name and email from text"
    workflow: extract-data
    context:
      habits:
        input:
          content: "My name is John Smith and you can reach me at john.smith@example.com"
          schema:
            type: object
            properties:
              name:
                type: string
              email:
                type: string
            required: [name, email]
    expect:
      data:
        name: "John Smith"
        email: "john.smith@example.com"
    tags: [extraction, quick]

# ═══════════════════════════════════════════════════════════════════════════
# Test Runner Configuration
# ═══════════════════════════════════════════════════════════════════════════
config:
  # Skip mocking - run against real models
  useMocks: false
  
  # Timeout for each test (AI inference can be slow)
  timeout: 300000  # 5 minutes per test
  
  # Run tests in sequence (not parallel) to avoid GPU memory issues
  parallel: false
  
  # Tags for filtering tests
  tagGroups:
    quick: [text-gen, models, extraction]
    slow: [image-gen, image-caption, tts, stt, pipeline, vision]
    pipeline: [image-pipeline, speech-pipeline]
    all: [text-gen, models, image-gen, image-caption, tts, stt, pipeline, vision, extraction]

# ═══════════════════════════════════════════════════════════════════════════
# Assertion Helpers (for E2E test script)
# ═══════════════════════════════════════════════════════════════════════════
#
# Since the workflow runner's partialMatch doesn't do string containment,
# use these custom assertion patterns in the E2E test runner:
#
# expectContains: { field: "message", value: "24" }
#   -> Check: output[field].toLowerCase().includes(value.toLowerCase())
#
# expectContainsAny: { field: "caption", values: ["dog", "cat"] }
#   -> Check: values.some(v => output[field].toLowerCase().includes(v.toLowerCase()))
#
# followUp: { workflow: "...", inputMapping: {...}, expect/expectContains/... }
#   -> Chain workflows: use output from first as input to second
# ═══════════════════════════════════════════════════════════════════════════
