# Text to Speech Workflow
# Convert text to speech using local MetaVoice models

id: text-to-speech
name: Text to Speech
description: Convert text to speech using local voice synthesis models

input:
  type: object
  properties:
    text:
      type: string
      description: The text to convert to speech
    voice:
      type: string
      enum: [default, male-1, male-2, female-1, female-2]
      description: Voice preset to use (optional, default voice)
    speed:
      type: number
      description: Speech speed 0.5-2.0 (optional, default 1.0)
    format:
      type: string
      enum: [wav, mp3, flac, ogg]
      description: Output audio format (optional, default wav)
    fileName:
      type: string
      description: Output file name (optional, default speech)
  required:
    - text

nodes:
  - id: speak
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: text_to_speech
      label: Voice Synthesis
      isTrigger: false
      params:
        text: "{{habits.input.text}}"
        voice: "{{habits.input.voice || 'default'}}"
        speed: "{{habits.input.speed || 1.0}}"
        format: "{{habits.input.format || 'wav'}}"
        fileName: "{{habits.input.fileName || 'speech'}}"

edges: []

output:
  audioUrl: "{{speak.audioUrl}}"
  audioPath: "{{speak.audioPath}}"
  sampleRate: "{{speak.sampleRate}}"
  durationSeconds: "{{speak.durationSeconds}}"
  voice: "{{speak.voice}}"
  format: "{{speak.format}}"
