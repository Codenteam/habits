# Install Model Workflow
# Download and install a GGUF model

id: install-model
name: Install Model
description: Download and install an AI model from HuggingFace or direct URL

input:
  type: object
  properties:
    modelName:
      type: string
      description: Known model name (e.g., qwen2-0.5b, blip, sd-1.5) or custom name when URL is provided
    modelUrl:
      type: string
      description: URL to download from. Not needed for known models.
    modelType:
      type: string
      enum: [text-gen, diffusion, whisper, tts, caption, other]
      description: Type of model (auto-detected for known models)
    overwrite:
      type: boolean
      description: Overwrite if model already exists
  required:
    - modelName

nodes:
  - id: install
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: install_model
      label: Install Model
      isTrigger: false
      params:
        modelName: "{{habits.input.modelName}}"
        modelUrl: "{{habits.input.modelUrl || ''}}"
        modelType: "{{habits.input.modelType || 'text-gen'}}"
        overwrite: "{{habits.input.overwrite || false}}"

edges: []

output:
  success: "{{install.success}}"
  path: "{{install.path}}"
  size: "{{install.size}}"
  error: "{{install.error}}"
