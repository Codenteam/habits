# Generate Image Workflow
# Create images from text prompts using local Stable Diffusion

id: generate-image
name: Generate Image
description: Generate an image from a text prompt using a local Stable Diffusion model

input:
  type: object
  properties:
    prompt:
      type: string
      description: Text description of the image to generate
    model:
      type: string
      description: Model preset (sd-1.5, sd-2.1, sdxl-base, sdxl-turbo, custom)
    negativePrompt:
      type: string
      description: What to avoid in the image (optional)
    resolution:
      type: string
      enum: [256x256, 512x512, 768x768, 1024x1024, 1024x768, 768x1024]
      description: Image resolution (optional, default 512x512)
    steps:
      type: number
      description: Number of inference steps (optional, default 30)
    guidanceScale:
      type: number
      description: How closely to follow the prompt (optional, default 7.5)
    seed:
      type: number
      description: Random seed for reproducibility (optional)
  required:
    - prompt

nodes:
  - id: generate
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: generate_image
      label: Image Generation
      isTrigger: false
      params:
        model: "{{habits.input.model || 'sd-1.5'}}"
        prompt: "{{habits.input.prompt}}"
        negativePrompt: "{{habits.input.negativePrompt || 'blurry, low quality, distorted'}}"
        resolution: "{{habits.input.resolution || '512x512'}}"
        steps: "{{habits.input.steps || 30}}"
        guidanceScale: "{{habits.input.guidanceScale || 7.5}}"
        seed: "{{habits.input.seed}}"

edges: []

output:
  imageUrl: "{{generate.imageUrl}}"
  imagePath: "{{generate.imagePath}}"
  width: "{{generate.width}}"
  height: "{{generate.height}}"
  steps: "{{generate.steps}}"
  model: "{{generate.model}}"
