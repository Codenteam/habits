# List Models Workflow
# List locally installed AI models

id: list-models
name: List Local Models
description: List all GGUF models installed locally

input:
  type: object
  properties:
    category:
      type: string
      description: Filter by model category (text-gen, image-gen, whisper, tts, caption, vision)

nodes:
  - id: list
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-local-ai"
      operation: list_models
      label: List Models
      isTrigger: false
      params:
        category: "{{habits.input.category}}"

edges: []

output:
  models: "{{list.models}}"
  count: "{{list.totalCount}}"
