# Ask Local AI Workflow
# Chat with a locally running LLM

id: ask-local-ai
name: Ask Local AI
description: Send a message to a local AI model and get a response

input:
  type: object
  properties:
    prompt:
      type: string
      description: Your message or question
    model:
      type: string
      description: Path to the GGUF model file (optional, uses default if not provided)
    systemPrompt:
      type: string
      description: System instructions for the AI (optional)
    memoryKey:
      type: string
      description: Key for conversation persistence (optional)
    temperature:
      type: number
      description: Randomness control 0-1 (optional)
    maxTokens:
      type: number
      description: Maximum response tokens (optional)
  required:
    - prompt

nodes:
  - id: chat
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: ask_ai
      label: Local AI Chat
      isTrigger: false
      params:
        model: "{{habits.input.model || 'qwen2.5-0.5b'}}"
        prompt: "{{habits.input.prompt}}"
        systemPrompt: "{{habits.input.systemPrompt || 'You are a helpful assistant.'}}"
        temperature: "{{habits.input.temperature || 0.7}}"
        maxTokens: "{{habits.input.maxTokens || 2048}}"
        memoryKey: "{{habits.input.memoryKey}}"

edges: []

output:
  message: "{{chat.content}}"
  usage: "{{chat.usage}}"
  model: "{{chat.model}}"
