# Caption Image Workflow
# Generate captions/descriptions for images using local BLIP models

id: caption-image
name: Caption Image
description: Generate descriptions for images using local BLIP models

input:
  type: object
  properties:
    image:
      type: string
      description: Image as base64, data URL, URL, or file path
    model:
      type: string
      enum: [blip-base, blip-large, custom]
      description: BLIP model (optional, default blip-base)
    prompt:
      type: string
      description: Optional prompt to guide caption (e.g., "a photo of")
  required:
    - image

nodes:
  - id: caption
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: caption_image
      label: Image Captioning
      isTrigger: false
      params:
        model: "{{habits.input.model || 'blip-base'}}"
        imagePath: "{{habits.input.image}}"
        prompt: "{{habits.input.prompt}}"

edges: []

output:
  caption: "{{caption.caption}}"
  tokensGenerated: "{{caption.tokensGenerated}}"
  model: "{{caption.model}}"
