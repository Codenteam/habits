# Vision Prompt Workflow
# Analyze images with vision-capable models

id: vision-prompt
name: Vision Prompt
description: Ask a vision-capable model to analyze an image and answer questions about it

input:
  type: object
  properties:
    image:
      type: string
      description: Image as base64 string, data URL, URL, or file path
    prompt:
      type: string
      description: Question or instruction about the image
    model:
      type: string
      description: Path to a vision-capable model (optional)
    detail:
      type: string
      enum: [low, high, auto]
      description: Image detail level (optional, default auto)
    temperature:
      type: number
      description: Randomness control 0-1 (optional)
    maxTokens:
      type: number
      description: Maximum response tokens (optional)
  required:
    - image
    - prompt

nodes:
  - id: vision
    type: action
    data:
      framework: bits
      source: local
      module: "@ha-bits/bit-local-ai"
      operation: vision_prompt
      label: Vision Analysis
      isTrigger: false
      params:
        model: "{{habits.input.model || 'qwen3.5-vision-0.8b'}}"
        imageUrl: "{{habits.input.image}}"
        prompt: "{{habits.input.prompt}}"
        detail: "{{habits.input.detail || 'auto'}}"
        temperature: "{{habits.input.temperature || 0.7}}"
        maxTokens: "{{habits.input.maxTokens || 1024}}"

edges: []

output:
  content: "{{vision.content}}"
  usage: "{{vision.usage}}"
  model: "{{vision.model}}"
