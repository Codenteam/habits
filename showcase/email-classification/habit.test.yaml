# Tests for Email Classification Workflow
# Workflow: habit.yaml - Email classification and routing pipeline
#
# These tests mock the underlying HTTP calls within each bit, NOT the entire bit.
# This allows testing the actual bit logic while isolating external dependencies.
#
# The workflow supports two input methods:
# - IMAP: Receives email via IMAP polling (receive-email-imap node)
# - HTTP Submission: Direct submission via habits.input.submission
#
# Both paths merge at the any-input node (bit-any-of) before classification.
workflow: ./habit.yaml

tests:
  # === Test 1: Important Email via IMAP → Telegram ===
  - name: "important email via IMAP routes to telegram"
    trigger:
      body: {}
    context:
      habits:
        env:
          IMAP_HOST: "imap.gmail.com"
          IMAP_USER: "test@example.com"
          IMAP_PASSWORD: "test-password"
          OPENAI_API_KEY: "sk-test-key"
          TELEGRAM_BOT_TOKEN: "123456789:ABCDEF"
          TELEGRAM_CHAT_ID: "987654321"
          SMTP_HOST: "smtp.gmail.com"
          SMTP_USER: "smtp@example.com"
          SMTP_PASSWORD: "smtp-password"
          BACKUP_EMAIL: "backup@example.com"
          WHATSAPP_ACCESS_TOKEN: "EAABsbCS..."
          WHATSAPP_PHONE_NUMBER_ID: "123456789"
          WHATSAPP_PHONE: "14155238886"
    mocks:
    # Mock entire bits for workflow-level mocking (alternative approach)
    # Since you asked to mock modules within bits, we use fetch mocks above
    # But for workflow testing, sometimes bit-level mocking is cleaner
      bits:
        # Mock bit-if check-submission (submission is null in IMAP test)
        - bit: "@ha-bits/bit-if"
          action: branch
          nodeId: check-submission
          response:
            mode: "if"
            output: null
            matched: false
        # Mock bit-any-of race - passes through IMAP data
        - bit: "@ha-bits/bit-any-of"
          action: race
          response:
            output:
              emails:
                - id: "email_001"
                  from: "security@bank.com"
                  to: "user@example.com"
                  subject: "URGENT: Suspicious login detected"
                  body: "We detected a login from an unknown device. Please verify immediately."
                  date: "2024-01-15T10:30:00Z"
              count: 1
              folder: "INBOX"
            label: "email-input"
            triggeredBy: "receive-email-imap"
            passedThrough: true
        # Mock bit-email newEmail action
        - bit: "@ha-bits/bit-email"
          action: newEmail
          response:
            emails:
              - id: "email_001"
                from: "security@bank.com"
                to: "user@example.com"
                subject: "URGENT: Suspicious login detected"
                body: "We detected a login from an unknown device. Please verify immediately."
                date: "2024-01-15T10:30:00Z"
            count: 1
            folder: "INBOX"
            timestamp: "2024-01-15T10:30:00Z"
        # Mock bit-openai classification
        - bit: "@ha-bits/bit-openai"
          action: chatCompletion
          response:
            content: "important"
            message:
              content: "important"
              role: "assistant"
            model: "gpt-4o-mini"
            finishReason: "stop"
        # Mock bit-if branch action (route-email node)
        - bit: "@ha-bits/bit-if"
          action: branch
          nodeId: route-email
          response:
            mode: "switch"
            executedBranchIndex: 0
            executedBranchLabel: "Important"
            output: "important"
            matched: true
            elseExecuted: false
        # Mock bit-telegram sendMessage
        - bit: "@ha-bits/bit-telegram"
          action: sendMessage
          response:
            success: true
            messageId: 12345
            chatId: 987654321
            text: "Important email notification"
        # Mock bit-email sendEmail (SMTP) - needed even if branch not taken
        - bit: "@ha-bits/bit-email"
          action: sendEmail
          response:
            success: true
            messageId: "<skipped>"
            accepted: []
        # Mock bit-whatsapp - needed even if branch not taken
        - bit: "@ha-bits/bit-whatsapp"
          action: sendTextMessage
          response:
            success: true
            messageId: "skipped"

