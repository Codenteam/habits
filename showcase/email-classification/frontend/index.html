<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Classification API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="max-w-xl mx-auto p-8 text-center">
    <div class="mb-6">
      <svg class="w-16 h-16 mx-auto text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-white mb-4">Email Classification API</h1>
    <p class="text-gray-400 mb-6">This is an API-only habit for classifying emails using AI. Send POST requests to the workflow endpoint with email content to get classifications.</p>
    <div class="bg-gray-800 rounded-lg p-4 text-left">
      <code class="text-green-400 text-sm">
        POST /workflows/email-classification-test/run<br>
        Content-Type: application/json<br><br>
        {"email": "Your email content here..."}
      </code>
    </div>
  </div>
</body>
</html>
