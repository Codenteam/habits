id: schedule-trigger-test
name: Simple Schedule Trigger Test


nodes:
  - id: schedule-trigger
    type: activepieces
    data:
      framework: activepieces
      source: npm
      module: "@activepieces/piece-schedule"
      operation: cron_expression
      triggerType: polling
      params:
        cronExpression: "*/1 * * * *"  # Run every 1 minute for testing
        timezone: "UTC"

  - id: log-execution
    type: script
    data:
      framework: script
      source: inline
      label: Log Trigger Execution
      params:
        triggerData: "{{schedule-trigger}}"
        type: script
        language: deno
        script: |
          export async function main(triggerData: unknown) {
            const timestamp = new Date().toISOString();
            console.log("========================================");
            console.log("🎯 Schedule trigger fired at:", timestamp);
            console.log("========================================");
            console.log("Trigger data:", JSON.stringify(triggerData, null, 2));
            return { 
              success: true, 
              executedAt: timestamp,
              triggerData 
            };
          }

edges:
  - source: schedule-trigger
    target: log-execution
