version: "1.0"
name: "Vector DB Demo"
workflows:
  - id: vector-insert
    path: ./habits/insert.yaml
    enabled: true
  - id: vector-search
    path: ./habits/search.yaml
    enabled: true
  - id: vector-delete
    path: ./habits/delete.yaml
    enabled: true
  - id: seed-words
    path: ./habits/seed-words.yaml
    enabled: true
  - id: find-word
    path: ./habits/find-word.yaml
    enabled: true
  - id: vector-search-with-extract
    path: ./habits/vector-search-with-extract.yaml
    enabled: true
server:
  port: 13100
  host: "0.0.0.0"

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
