version: "1.0"
workflows:
  - id: cloud-file-upload
    path: ./habit.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend

# OAuth deep link configuration for desktop/mobile apps
application:
  scheme: cloudupload
  name: Cloud File Upload
  identifier: com.habits.cloudfileupload

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
