<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Personal Finance Advisor</title>
 <style>
 :root {
 /* ha-bits Design Tokens — shared palette */
 --ha-bg-base: #0f172a;
 --ha-bg-surface: #1e293b;
 --ha-bg-elevated: #334155;
 --ha-bg-hover: #475569;
 --ha-border: #334155;
 --ha-border-subtle: #1e293b;
 --ha-text-primary: #ffffff;
 --ha-text-body: #cbd5e1;
 --ha-text-muted: #94a3b8;
 --ha-text-disabled: #64748b;
 --ha-accent-blue: #3b82f6;
 --ha-accent-blue-hover: #2563eb;
 --ha-accent-sky: #38bdf8;
 --ha-accent-emerald: #34d399;
 --ha-accent-emerald-dim: rgba(52, 211, 153, 0.15);
 --ha-accent-cyan: #22d3ee;
 --ha-accent-cyan-dim: rgba(34, 211, 238, 0.15);
 --ha-accent-purple: #c084fc;
 --ha-accent-purple-dim: rgba(192, 132, 252, 0.15);
 --ha-status-running: #fbbf24;
 --ha-status-success: #4ade80;
 --ha-status-success-dim: rgba(74, 222, 128, 0.15);
 --ha-status-error: #f87171;
 --ha-status-error-dim: rgba(248, 113, 113, 0.15);
 --ha-status-pending: #60a5fa;
 --ha-status-skipped: #a78bfa;
 --ha-warn: #f59e0b;
 --ha-danger: #ef4444;
 --ha-danger-hover: #dc2626;
 --ha-danger-surface: #7f1d1d;
 --ha-radius-sm: 4px;
 --ha-radius-md: 6px;
 --ha-radius-lg: 8px;
 --ha-radius-xl: 12px;
 --ha-radius-pill: 9999px;
 }
 </style>
 <style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--ha-bg-elevated);
 min-height: 100vh;
 color: white;
 }
 .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
 
 .header { text-align: center; margin-bottom: 40px; }
 .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
 .header p { color: rgba(255,255,255,0.8); }
 
 .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
 .tab {
 padding: 12px 25px;
 background: rgba(255,255,255,0.1);
 border: none;
 border-radius: 30px;
 color: white;
 cursor: pointer;
 transition: all 0.2s;
 }
 .tab:hover { background: rgba(255,255,255,0.2); }
 .tab.active { background: var(--ha-accent-sky); }
 
 .card {
 background: rgba(255,255,255,0.1);
 backdrop-filter: blur(10px);
 border: 1px solid rgba(255,255,255,0.2);
 border-radius: 20px;
 padding: 30px;
 margin-bottom: 20px;
 }
 .card h2 { margin-bottom: 25px; font-size: 1.3rem; }
 
 .form-group { margin-bottom: 20px; }
 label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); }
 input, select, textarea {
 width: 100%;
 padding: 14px 18px;
 background: rgba(255,255,255,0.1);
 border: 1px solid rgba(255,255,255,0.3);
 border-radius: 12px;
 color: white;
 font-size: 1rem;
 }
 input::placeholder { color: rgba(255,255,255,0.5); }
 input:focus, textarea:focus { outline: none; border-color: var(--ha-accent-sky); }
 
 .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
 .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
 
 button.submit {
 background: var(--ha-accent-cyan);
 color: white;
 border: none;
 padding: 16px 32px;
 border-radius: 12px;
 font-size: 1rem;
 font-weight: 600;
 cursor: pointer;
 width: 100%;
 transition: all 0.2s;
 }
 button.submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(50, 130, 184, 0.4); }
 button.submit:disabled { opacity: 0.6; transform: none; }
 
 .tab-content { display: none; }
 .tab-content.active { display: block; }
 
 .health-score {
 text-align: center;
 padding: 40px;
 background: var(--ha-bg-surface);
 border-radius: 20px;
 margin-bottom: 25px;
 }
 .score-circle {
 width: 150px;
 height: 150px;
 border-radius: 50%;
 background: conic-gradient(var(--ha-accent-cyan) 0%, var(--ha-accent-sky) 50%, rgba(255,255,255,0.2) 50%);
 display: flex;
 align-items: center;
 justify-content: center;
 margin: 0 auto 15px;
 }
 .score-inner {
 width: 120px;
 height: 120px;
 border-radius: 50%;
 background: var(--ha-bg-surface);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 2.5rem;
 font-weight: 700;
 }
 .score-label { color: rgba(255,255,255,0.8); }
 
 .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
 .metric-card {
 background: rgba(255,255,255,0.1);
 border-radius: 12px;
 padding: 20px;
 text-align: center;
 }
 .metric-value { font-size: 1.8rem; font-weight: 700; color: var(--ha-accent-cyan); }
 .metric-label { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
 
 .recommendation-card {
 background: rgba(255,255,255,0.05);
 border-left: 4px solid var(--ha-accent-cyan);
 border-radius: 0 12px 12px 0;
 padding: 20px;
 margin-bottom: 15px;
 }
 .recommendation-card h4 { margin-bottom: 10px; }
 .recommendation-card .impact { color: var(--ha-accent-cyan); font-size: 0.9rem; }
 
 .expense-row {
 display: grid;
 grid-template-columns: 150px 1fr 80px;
 gap: 15px;
 align-items: center;
 margin-bottom: 15px;
 }
 .expense-row .bar-container {
 height: 25px;
 background: rgba(255,255,255,0.1);
 border-radius: 12px;
 overflow: hidden;
 }
 .expense-row .bar {
 height: 100%;
 background: var(--ha-accent-cyan);
 border-radius: 12px;
 transition: width 0.5s;
 }
 
 .alert-card {
 padding: 15px 20px;
 border-radius: 12px;
 margin-bottom: 10px;
 display: flex;
 align-items: center;
 gap: 15px;
 }
 .alert-card.warning { background: rgba(245, 158, 11, 0.2); }
 .alert-card.opportunity { background: rgba(34, 197, 94, 0.2); }
 .alert-card.critical { background: rgba(239, 68, 68, 0.2); }
 
 .chat-container {
 height: 400px;
 overflow-y: auto;
 border: 1px solid rgba(255,255,255,0.2);
 border-radius: 12px;
 padding: 20px;
 margin-bottom: 20px;
 }
 .message {
 max-width: 80%;
 padding: 15px 20px;
 border-radius: 12px;
 margin-bottom: 15px;
 }
 .message.user {
 background: var(--ha-accent-sky);
 margin-left: auto;
 }
 .message.advisor {
 background: rgba(255,255,255,0.1);
 }
 
 @media (max-width: 768px) {
 .row, .row-3, .metric-grid { grid-template-columns: 1fr; }
 }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1> Finance Advisor</h1>
 <p>AI-powered personal finance guidance</p>
 </div>

 <div class="tabs">
 <button class="tab active" onclick="switchTab('analyze')"> Analyze</button>
 <button class="tab" onclick="switchTab('budget')"> Budget</button>
 <button class="tab" onclick="switchTab('advice')"> Advice</button>
 </div>

 <!-- Analyze Tab -->
 <div id="analyze-tab" class="tab-content active">
 <div class="card">
 <h2>Financial Analysis</h2>
 <form id="analyze-form">
 <div class="form-group">
 <label>Monthly Income ($)</label>
 <input type="number" id="income" placeholder="5000" required>
 </div>

 <label style="margin-bottom: 15px;">Monthly Expenses</label>
 <div class="row-3">
 <div class="form-group">
 <label>Housing</label>
 <input type="number" id="exp-housing" placeholder="1500">
 </div>
 <div class="form-group">
 <label>Food</label>
 <input type="number" id="exp-food" placeholder="500">
 </div>
 <div class="form-group">
 <label>Transportation</label>
 <input type="number" id="exp-transport" placeholder="300">
 </div>
 <div class="form-group">
 <label>Utilities</label>
 <input type="number" id="exp-utilities" placeholder="200">
 </div>
 <div class="form-group">
 <label>Entertainment</label>
 <input type="number" id="exp-entertainment" placeholder="200">
 </div>
 <div class="form-group">
 <label>Other</label>
 <input type="number" id="exp-other" placeholder="300">
 </div>
 </div>

 <div class="row">
 <div class="form-group">
 <label>Current Savings ($)</label>
 <input type="number" id="savings" placeholder="10000">
 </div>
 <div class="form-group">
 <label>Total Debt ($)</label>
 <input type="number" id="debt" placeholder="5000">
 </div>
 </div>

 <button type="submit" class="submit" id="analyze-btn"> Analyze Finances</button>
 </form>
 </div>

 <div id="analysis-results" style="display: none;"></div>
 </div>

 <!-- Budget Tab -->
 <div id="budget-tab" class="tab-content">
 <div class="card">
 <h2>Create Budget</h2>
 <form id="budget-form">
 <div class="row">
 <div class="form-group">
 <label>Monthly Income ($)</label>
 <input type="number" id="budget-income" placeholder="5000" required>
 </div>
 <div class="form-group">
 <label>Budget Style</label>
 <select id="budget-style">
 <option value="balanced">Balanced (50/30/20)</option>
 <option value="aggressive-saving">Aggressive Saving</option>
 <option value="flexible">Flexible Lifestyle</option>
 </select>
 </div>
 </div>

 <div class="form-group">
 <label>Financial Goals (comma-separated)</label>
 <input type="text" id="budget-goals" placeholder="Emergency fund, Vacation, Pay off debt...">
 </div>

 <button type="submit" class="submit" id="budget-btn"> Generate Budget</button>
 </form>
 </div>

 <div id="budget-results" style="display: none;"></div>
 </div>

 <!-- Advice Tab -->
 <div id="advice-tab" class="tab-content">
 <div class="card">
 <h2>Financial Advisor</h2>
 <div class="chat-container" id="chat-container">
 <div class="message advisor">
 <p> Hello! I'm your AI financial advisor. Ask me anything about:</p>
 <ul style="margin: 10px 0 0 20px;">
 <li>Budgeting and saving</li>
 <li>Debt management</li>
 <li>Investment basics</li>
 <li>Financial planning</li>
 </ul>
 </div>
 </div>
 <form id="advice-form" style="display: flex; gap: 10px;">
 <input type="text" id="question" placeholder="Ask a financial question..." style="flex: 1;">
 <button type="submit" class="submit" style="width: auto; padding: 14px 25px;">Ask</button>
 </form>
 </div>
 </div>
 </div>

 <script>
 function switchTab(tab) {
 document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
 document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
 document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
 document.getElementById(`${tab}-tab`).classList.add('active');
 }

 function parseJSON(data) {
 if (typeof data === 'object') return data;
 try { return JSON.parse(data.replace(/```json\n?/g, '').replace(/```\n?/g, '')); }
 catch { return null; }
 }

 function formatCurrency(num) {
 return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num || 0);
 }

 // Analyze form
 document.getElementById('analyze-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 const btn = document.getElementById('analyze-btn');
 btn.disabled = true;
 btn.textContent = ' Analyzing...';

 const expenses = {
 housing: parseInt(document.getElementById('exp-housing').value) || 0,
 food: parseInt(document.getElementById('exp-food').value) || 0,
 transportation: parseInt(document.getElementById('exp-transport').value) || 0,
 utilities: parseInt(document.getElementById('exp-utilities').value) || 0,
 entertainment: parseInt(document.getElementById('exp-entertainment').value) || 0,
 other: parseInt(document.getElementById('exp-other').value) || 0
 };

 try {
 const response = await fetch('/api/analyze-finances', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 income: parseInt(document.getElementById('income').value),
 expenses: expenses,
 savings: parseInt(document.getElementById('savings').value) || 0,
 debt: { total: parseInt(document.getElementById('debt').value) || 0 }
 })
 });
 const data = await response.json();
 displayAnalysis(data);
 } catch (error) {
 alert('Error: ' + error.message);
 } finally {
 btn.disabled = false;
 btn.textContent = ' Analyze Finances';
 }
 });

 function displayAnalysis(data) {
 const container = document.getElementById('analysis-results');
 container.style.display = 'block';

 const analysis = parseJSON(data.analysis);
 const recommendations = parseJSON(data.recommendations);

 if (!analysis) {
 container.innerHTML = '<div class="card"><p>Error parsing analysis</p></div>';
 return;
 }

 const scorePercent = (analysis.healthScore || 50);

 container.innerHTML = `
 <div class="health-score">
 <div class="score-circle" style="background: conic-gradient(var(--ha-accent-cyan) 0%, var(--ha-accent-sky) ${scorePercent}%, rgba(255,255,255,0.2) ${scorePercent}%);">
 <div class="score-inner">${analysis.healthScore || 0}</div>
 </div>
 <div class="score-label">Financial Health Score - ${analysis.healthStatus || 'Unknown'}</div>
 </div>

 <div class="metric-grid">
 <div class="metric-card">
 <div class="metric-value">${formatCurrency(analysis.incomeVsExpense?.netIncome)}</div>
 <div class="metric-label">Monthly Net Income</div>
 </div>
 <div class="metric-card">
 <div class="metric-value">${analysis.incomeVsExpense?.savingsRate || '0%'}</div>
 <div class="metric-label">Savings Rate</div>
 </div>
 <div class="metric-card">
 <div class="metric-value">${analysis.debtAnalysis?.debtToIncomeRatio || '0%'}</div>
 <div class="metric-label">Debt-to-Income</div>
 </div>
 </div>

 ${analysis.alerts?.length > 0 ? `
 <div class="card">
 <h2> Alerts</h2>
 ${analysis.alerts.map(a => `
 <div class="alert-card ${a.type}">
 <span>${a.type === 'critical' ? '' : a.type === 'warning' ? '' : ''}</span>
 <span>${a.message}</span>
 </div>
 `).join('')}
 </div>
 ` : ''}

 ${recommendations?.immediateActions ? `
 <div class="card">
 <h2> Recommendations</h2>
 ${recommendations.immediateActions.map(a => `
 <div class="recommendation-card">
 <h4>${a.action}</h4>
 <div class="impact"> Impact: ${a.impact}</div>
 </div>
 `).join('')}
 </div>
 ` : ''}
 `;
 }

 // Budget form
 document.getElementById('budget-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 const btn = document.getElementById('budget-btn');
 btn.disabled = true;
 btn.textContent = ' Generating...';

 try {
 const response = await fetch('/api/create-budget', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 income: parseInt(document.getElementById('budget-income').value),
 budgetStyle: document.getElementById('budget-style').value,
 goals: document.getElementById('budget-goals').value.split(',').map(g => g.trim())
 })
 });
 const data = await response.json();
 const budget = parseJSON(data.budget);
 
 document.getElementById('budget-results').style.display = 'block';
 
 if (budget?.categories) {
 document.getElementById('budget-results').innerHTML = `
 <div class="card">
 <h2>${budget.budgetName || 'Your Budget'}</h2>
 <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">${budget.methodology || ''}</p>
 ${budget.categories.map(c => `
 <div class="expense-row">
 <span>${c.category}</span>
 <div class="bar-container">
 <div class="bar" style="width: ${c.percentage}"></div>
 </div>
 <span>${formatCurrency(c.budgetAmount)}</span>
 </div>
 `).join('')}
 </div>
 `;
 } else {
 document.getElementById('budget-results').innerHTML = `
 <div class="card"><pre style="white-space: pre-wrap;">${JSON.stringify(budget, null, 2)}</pre></div>
 `;
 }
 } catch (error) {
 alert('Error: ' + error.message);
 } finally {
 btn.disabled = false;
 btn.textContent = ' Generate Budget';
 }
 });

 // Advice chat
 document.getElementById('advice-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 const question = document.getElementById('question').value.trim();
 if (!question) return;

 const chatContainer = document.getElementById('chat-container');
 chatContainer.innerHTML += `<div class="message user">${question}</div>`;
 document.getElementById('question').value = '';
 chatContainer.scrollTop = chatContainer.scrollHeight;

 try {
 const response = await fetch('/api/get-advice', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ question })
 });
 const data = await response.json();
 const advice = parseJSON(data.advice);
 
 if (advice) {
 chatContainer.innerHTML += `
 <div class="message advisor">
 <p><strong>${advice.summary}</strong></p>
 <p style="margin-top: 10px;">${advice.explanation}</p>
 ${advice.actionSteps?.length > 0 ? `
 <p style="margin-top: 15px;"><strong>Action Steps:</strong></p>
 <ol style="margin: 10px 0 0 20px;">
 ${advice.actionSteps.map(s => `<li>${s.step}</li>`).join('')}
 </ol>
 ` : ''}
 <p style="margin-top: 15px; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
 <em>${advice.disclaimer || ''}</em>
 </p>
 </div>
 `;
 } else {
 chatContainer.innerHTML += `<div class="message advisor">${data.advice}</div>`;
 }
 } catch (error) {
 chatContainer.innerHTML += `<div class="message advisor">Sorry, I had trouble processing that. Please try again.</div>`;
 }
 chatContainer.scrollTop = chatContainer.scrollHeight;
 });
 </script>
</body>
</html>
