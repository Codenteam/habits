id: wifi-work-mode
name: Enable Work Mode on Work Wi-Fi
description: Automatically enable focus mode when connecting to work Wi-Fi

# Configuration - user sets their work Wi-Fi name
config:
  work_wifi_ssid: "OfficeNetwork"  # Example work network name

nodes:
  # Step 1: (Trigger) Monitor connection to work Wi-Fi
  - id: wifi-trigger
    type: trigger
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-wifi"
      operation: onConnectTo
      params:
        ssid: "{{config.work_wifi_ssid}}"
        pollingInterval: 5000

  # Step 2: Enable focus mode (composite action)
  # This mutes media, sets vibrate, and enables DND
  - id: enable-focus
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-system-settings"
      operation: setFocusMode
      params: {}

edges:
  - source: wifi-trigger
    target: enable-focus

output:
  trigger: "{{wifi-trigger}}"
  result: "{{enable-focus}}"
  message: "Work mode enabled - focus on!"
