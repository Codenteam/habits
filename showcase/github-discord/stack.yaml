name: github-discord
description: >
  Monitor a GitHub repository for new pull requests and post rich notifications
  to a Discord channel via webhook. This is the native-bits alternative to the
  activepieces-github-discord example.

modules:
  - "@ha-bits/bit-github"
  - "@ha-bits/bit-discord"

workflows:
  - id: github-pr-to-discord
    path: ./workflow.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"

logging:
  level: info
