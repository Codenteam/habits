version: "1.0"

workflows:
  - id: repurpose-blog
    path: ./habits/repurpose-blog.yaml
    enabled: true

  - id: post-linkedin
    path: ./habits/post-linkedin.yaml
    enabled: true

  - id: post-twitter
    path: ./habits/post-twitter.yaml
    enabled: true

  - id: post-instagram
    path: ./habits/post-instagram.yaml
    enabled: true

  - id: post-all
    path: ./habits/post-all.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
