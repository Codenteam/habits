version: "1.0"
name: "Client Invoice Manager"

workflows:
  - id: save-client
    path: ./habits/save-client.yaml
    enabled: true

  - id: list-clients
    path: ./habits/list-clients.yaml
    enabled: true

  - id: generate-invoice
    path: ./habits/generate-invoice.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
