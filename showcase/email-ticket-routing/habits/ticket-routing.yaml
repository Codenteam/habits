id: ticket-routing
name: Ticket Routing
description: >
  Orchestrates the full support ticket pipeline:
  1. Fetches unread emails from Gmail via IMAP
  2. Analyzes each email as a support ticket using OpenAI
  3. Sends an AI-generated reply to each ticket sender via SMTP

nodes:
  # Node 1: Fetch all unread emails via the fetch-emails sub-habit
  # Uses bit-loop forEach with a single trigger item to invoke fetch-emails once
  - id: get-emails
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-loop"
      operation: forEach
      params:
        items: '[{}]'
        habitId: fetch-emails
        inputKey: trigger
        collectResults: true

  # Node 2: Analyze each email as a support ticket using OpenAI
  # Iterates over the fetched emails array — one analyze-ticket call per email
  - id: analyze-tickets
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-loop"
      operation: forEach
      params:
        items: "{{get-emails.results[0].output.emails}}"
        habitId: analyze-ticket
        inputKey: email
        delayMs: 300
        continueOnError: true
        collectResults: true

  # Node 3: Send an AI-generated reply to each analyzed ticket sender
  # Iterates over analyze-tickets results — one send-reply call per analyzed ticket
  - id: send-replies
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-loop"
      operation: forEach
      params:
        items: "{{analyze-tickets.results}}"
        habitId: send-reply
        inputKey: analyzedTicket
        delayMs: 500
        continueOnError: true
        collectResults: true

edges:
  - source: get-emails
    target: analyze-tickets
  - source: analyze-tickets
    target: send-replies

output:
  emailsFetched: "{{get-emails.results[0].output.count}}"
  ticketsAnalyzed: "{{analyze-tickets.successCount}}"
  repliesSent: "{{send-replies.successCount}}"
  results: "{{send-replies.results}}"
