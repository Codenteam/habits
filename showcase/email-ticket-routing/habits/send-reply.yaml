id: send-reply
name: Send Reply
description: Send an AI-generated reply email to a support ticket sender via SMTP

input:
  - id: analyzedTicket
    type: object
    required: true
    description: The analyzed ticket result object containing original sender info and AI-generated reply

nodes:
  # Node 1: Send the AI-generated reply to the original ticket sender
  - id: send
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-email"
      operation: sendEmail
      params:
        to: "{{habits.env.HABITS_GMAIL_SMTP_USER}}"
        from: "{{habits.input.analyzedTicket.output.from}}"
        subject: "Re: {{habits.input.analyzedTicket.output.subject}}"
        body: "{{habits.input.analyzedTicket.output.suggestedReply}}"
      credentials:
        auth:
          host: "{{habits.env.HABITS_GMAIL_SMTP_HOST}}"
          port: "{{habits.env.HABITS_GMAIL_SMTP_PORT}}"
          user: "{{habits.env.HABITS_GMAIL_SMTP_USER}}"
          password: "{{habits.env.HABITS_GMAIL_SMTP_APP_PASSWORD}}"

edges: []

output:
  success: true
  sentTo: "{{habits.input.analyzedTicket.output.from}}"
  subject: "Re: {{habits.input.analyzedTicket.output.subject}}"
  category: "{{habits.input.analyzedTicket.output.category}}"
  priority: "{{habits.input.analyzedTicket.output.priority}}"
  result: "{{send}}"
