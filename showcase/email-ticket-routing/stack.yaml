version: "1.0"
name: "Email Ticket Routing"
description: "Fetch support emails from Gmail, analyze each with AI, and auto-reply with a suggested response"

workflows:
  - id: fetch-emails
    path: ./habits/fetch-emails.yaml
    enabled: true

  - id: analyze-ticket
    path: ./habits/analyze-ticket.yaml
    enabled: true

  - id: send-reply
    path: ./habits/send-reply.yaml
    enabled: true

  - id: ticket-routing
    path: ./habits/ticket-routing.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  openapi: true
  frontend: ./frontend

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
