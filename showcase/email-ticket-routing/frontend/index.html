<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Ticket Routing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
    }

    .pipeline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .step .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
    }

    .step.active .dot { background: #22d3ee; }
    .step.done .dot { background: #4ade80; }
    .step.error .dot { background: #f87171; }

    .arrow {
      color: #475569;
      font-size: 1.2rem;
    }

    button#run-btn {
      width: 100%;
      padding: 16px 28px;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button#run-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(14, 165, 233, 0.35);
    }

    button#run-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stats {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .stats.visible { display: grid; }

    .stat-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #38bdf8;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .results-detail {
      display: none;
      margin-top: 20px;
    }

    .results-detail.visible { display: block; }

    .results-detail h3 {
      font-size: 0.9rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ticket-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .ticket-item .ticket-from {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .ticket-item .ticket-subject {
      font-size: 0.95rem;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 6px;
    }

    .ticket-item .ticket-category {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #1e3a4a;
      color: #38bdf8;
      font-weight: 500;
    }

    .status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 12px 16px;
      background: #0f172a;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .status-bar.visible { display: flex; }
    .status-bar.error { color: #f87171; border: 1px solid #7f1d1d; }
    .status-bar.success { color: #4ade80; }

    @media (max-width: 500px) {
      .stats.visible { grid-template-columns: 1fr; }
      .pipeline { flex-direction: column; align-items: center; gap: 6px; }
      .pipeline .arrow { transform: rotate(90deg); display: inline-block; }
      .step { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="icon">📬</span>
      <h1>Email Ticket Routing</h1>
      <p class="subtitle">Fetch support emails, analyze each with AI, and route tickets to the right team.</p>
    </div>

    <div class="card">
      <div class="pipeline">
        <div class="step" id="step-analyze">
          <span class="dot"></span>
          Analyze Emails
        </div>
        <span class="arrow">→</span>
        <div class="step" id="step-assign">
          <span class="dot"></span>
          Assign Tickets
        </div>
      </div>

      <button id="run-btn" onclick="runPipeline()">
        <span id="btn-icon">▶</span>
        <span id="btn-label">Run Ticket Routing</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="status-bar" id="status-bar">
        <span id="status-text"></span>
      </div>

      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-analyzed">0</div>
          <div class="stat-label">Emails Analyzed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-assigned">0</div>
          <div class="stat-label">Assign Tickets</div>
        </div>
      </div>

      <div class="results-detail" id="results-detail">
        <h3>Processed Tickets</h3>
        <div class="ticket-list" id="ticket-list"></div>
      </div>
    </div>
  </div>

  <script>
    const steps = {
      analyze: document.getElementById('step-analyze'),
      assign: document.getElementById('step-assign'),
    };

    function setStep(name, state) {
      const el = steps[name];
      el.classList.remove('active', 'done', 'error');
      if (state) el.classList.add(state);
    }

    function resetSteps() {
      Object.keys(steps).forEach(k => setStep(k, null));
    }

    function setStatus(text, type = '') {
      const bar = document.getElementById('status-bar');
      bar.className = 'status-bar visible ' + type;
      document.getElementById('status-text').textContent = text;
    }

    function hideStatus() {
      document.getElementById('status-bar').className = 'status-bar';
    }

    async function runPipeline() {
      const btn = document.getElementById('run-btn');
      const spinner = document.getElementById('spinner');
      const btnIcon = document.getElementById('btn-icon');
      const btnLabel = document.getElementById('btn-label');

      btn.disabled = true;
      spinner.style.display = 'block';
      btnIcon.style.display = 'none';
      btnLabel.textContent = 'Running…';

      document.getElementById('stats').className = 'stats';
      document.getElementById('results-detail').className = 'results-detail';
      document.getElementById('ticket-list').innerHTML = '';
      hideStatus();
      resetSteps();

      setStep('analyze', 'active');
      setStatus('Fetching and analyzing support emails…');

      try {
        const res = await fetch('/api/ticket-routing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data?.message || data?.error || `Server error ${res.status}`);
        }

        setStep('analyze', 'done');
        setStep('assign', 'done');

        const analyzed = data?.ticketsAnalyzed ?? data?.output?.ticketsAnalyzed ?? data?.emailsFetched ?? data?.output?.emailsFetched ?? 0;
        const assigned = data?.ticketsAssigned ?? data?.output?.ticketsAssigned ?? data?.repliesSent ?? data?.output?.repliesSent ?? 0;

        document.getElementById('stat-analyzed').textContent = analyzed;
        document.getElementById('stat-assigned').textContent = assigned;
        document.getElementById('stats').className = 'stats visible';

        const results = data?.results ?? data?.output?.results ?? [];
        if (results.length > 0) {
          const list = document.getElementById('ticket-list');
          results.forEach(item => {
            const out = item?.output ?? item ?? {};
            const from = out.from ?? out.email?.from ?? '';
            const subject = out.subject ?? out.email?.subject ?? '(no subject)';
            const category = out.category ?? out.analysis?.category ?? '';

            const el = document.createElement('div');
            el.className = 'ticket-item';
            el.innerHTML = `
              ${from ? `<div class="ticket-from">From: ${escapeHtml(from)}</div>` : ''}
              <div class="ticket-subject">${escapeHtml(subject)}</div>
              ${category ? `<span class="ticket-category">${escapeHtml(category)}</span>` : ''}
            `;
            list.appendChild(el);
          });
          document.getElementById('results-detail').className = 'results-detail visible';
        }

        setStatus(`Done — ${analyzed} email(s) analyzed, ${assigned} ticket${assigned === 1 ? '' : 's'} assigned.`, 'success');

      } catch (err) {
        setStep('analyze', 'error');
        setStep('assign', 'error');
        setStatus('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnIcon.style.display = '';
        btnLabel.textContent = 'Run Ticket Routing';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
