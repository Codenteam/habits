version: "1.0"
name: Calories Manager
description: Upload image to count calories, or provide calories limit and ingredients to get the best plate. 

workflows:
  - id: count-calories
    path: ./habits/count-calories.yaml
    enabled: true

  - id: recipe-by-calories
    path: ./habits/recipe-by-calories.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
