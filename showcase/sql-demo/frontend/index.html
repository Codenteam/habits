<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>SQLite/Drizzle Demo</title>
 <style>
 :root {
 /* ha-bits Design Tokens — shared palette */
 --ha-bg-base: #0f172a;
 --ha-bg-surface: #1e293b;
 --ha-bg-elevated: #334155;
 --ha-bg-hover: #475569;
 --ha-border: #334155;
 --ha-border-subtle: #1e293b;
 --ha-text-primary: #ffffff;
 --ha-text-body: #cbd5e1;
 --ha-text-muted: #94a3b8;
 --ha-text-disabled: #64748b;
 --ha-accent-blue: #3b82f6;
 --ha-accent-blue-hover: #2563eb;
 --ha-accent-sky: #38bdf8;
 --ha-accent-emerald: #34d399;
 --ha-accent-emerald-dim: rgba(52, 211, 153, 0.15);
 --ha-accent-cyan: #22d3ee;
 --ha-accent-cyan-dim: rgba(34, 211, 238, 0.15);
 --ha-accent-purple: #c084fc;
 --ha-accent-purple-dim: rgba(192, 132, 252, 0.15);
 --ha-status-running: #fbbf24;
 --ha-status-success: #4ade80;
 --ha-status-success-dim: rgba(74, 222, 128, 0.15);
 --ha-status-error: #f87171;
 --ha-status-error-dim: rgba(248, 113, 113, 0.15);
 --ha-status-pending: #60a5fa;
 --ha-status-skipped: #a78bfa;
 --ha-warn: #f59e0b;
 --ha-danger: #ef4444;
 --ha-danger-hover: #dc2626;
 --ha-danger-surface: #7f1d1d;
 --ha-radius-sm: 4px;
 --ha-radius-md: 6px;
 --ha-radius-lg: 8px;
 --ha-radius-xl: 12px;
 --ha-radius-pill: 9999px;
 }
 </style>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--ha-bg-base);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }
 .container {
 background: rgba(255, 255, 255, 0.05);
 backdrop-filter: blur(10px);
 border-radius: 20px;
 padding: 40px;
 max-width: 700px;
 width: 100%;
 box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 h1 {
 color: var(--ha-bg-base);
 font-size: 28px;
 margin-bottom: 10px;
 text-align: center;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 }
 h1 .icon {
 font-size: 32px;
 }
 .subtitle {
 color: rgba(255, 255, 255, 0.6);
 text-align: center;
 margin-bottom: 30px;
 font-size: 14px;
 }
 .hint {
 background: rgba(59, 130, 246, 0.2);
 border: 1px solid rgba(59, 130, 246, 0.3);
 border-radius: 10px;
 padding: 15px;
 margin-bottom: 25px;
 color: rgba(255, 255, 255, 0.8);
 font-size: 13px;
 text-align: center;
 }
 .hint strong {
 color: var(--ha-status-pending);
 }
 .form-group {
 margin-bottom: 20px;
 }
 label {
 display: block;
 color: rgba(255, 255, 255, 0.8);
 font-size: 14px;
 margin-bottom: 8px;
 }
 input {
 width: 100%;
 padding: 12px 16px;
 font-size: 16px;
 color: var(--ha-bg-base);
 background: rgba(255, 255, 255, 0.1);
 border: 1px solid rgba(255, 255, 255, 0.2);
 border-radius: 10px;
 outline: none;
 transition: all 0.3s ease;
 }
 input:focus {
 border-color: var(--ha-accent-blue);
 background: rgba(255, 255, 255, 0.15);
 }
 input::placeholder {
 color: rgba(255, 255, 255, 0.4);
 }
 .btn {
 width: 100%;
 padding: 15px 30px;
 font-size: 16px;
 font-weight: 600;
 color: var(--ha-bg-base);
 background: var(--ha-accent-blue);
 border: none;
 border-radius: 12px;
 cursor: pointer;
 transition: all 0.3s ease;
 }
 .btn:hover {
 transform: translateY(-2px);
 box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
 }
 .btn:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 transform: none;
 }
 .operations {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 10px;
 margin-bottom: 20px;
 }
 .operation {
 text-align: center;
 padding: 15px 10px;
 background: rgba(255, 255, 255, 0.05);
 border-radius: 10px;
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 .operation .badge {
 display: inline-block;
 padding: 4px 10px;
 border-radius: 20px;
 font-size: 11px;
 font-weight: 600;
 text-transform: uppercase;
 margin-bottom: 8px;
 }
 .operation.create .badge { background: var(--ha-status-success); color: var(--ha-bg-base); }
 .operation.read .badge { background: var(--ha-accent-blue); color: var(--ha-bg-base); }
 .operation.update .badge { background: var(--ha-warn); color: #000; }
 .operation.delete .badge { background: var(--ha-danger); color: var(--ha-bg-base); }
 .operation .label {
 color: rgba(255, 255, 255, 0.7);
 font-size: 12px;
 }
 .result {
 margin-top: 25px;
 padding: 20px;
 background: rgba(0, 0, 0, 0.3);
 border-radius: 12px;
 display: none;
 }
 .result.show {
 display: block;
 }
 .result-title {
 color: var(--ha-accent-blue);
 font-size: 14px;
 font-weight: 600;
 margin-bottom: 10px;
 }
 .result-content {
 color: rgba(255, 255, 255, 0.9);
 font-family: 'Monaco', 'Menlo', monospace;
 font-size: 11px;
 white-space: pre-wrap;
 word-break: break-all;
 max-height: 400px;
 overflow-y: auto;
 }
 .result-summary {
 margin-top: 15px;
 padding-top: 15px;
 border-top: 1px solid rgba(255, 255, 255, 0.1);
 }
 .result-summary h4 {
 color: var(--ha-status-success);
 font-size: 13px;
 margin-bottom: 10px;
 }
 .summary-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 10px;
 }
 .summary-item {
 background: rgba(255, 255, 255, 0.05);
 padding: 10px;
 border-radius: 8px;
 text-align: center;
 }
 .summary-item .label {
 color: rgba(255, 255, 255, 0.5);
 font-size: 10px;
 text-transform: uppercase;
 margin-bottom: 5px;
 }
 .summary-item .value {
 color: var(--ha-bg-base);
 font-size: 14px;
 font-weight: 600;
 }
 .loading {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 8px;
 color: rgba(255, 255, 255, 0.8);
 }
 .spinner {
 width: 20px;
 height: 20px;
 border: 2px solid rgba(255, 255, 255, 0.3);
 border-top-color: var(--ha-accent-blue);
 border-radius: 50%;
 animation: spin 1s linear infinite;
 }
 @keyframes spin {
 to { transform: rotate(360deg); }
 }
 .tech-badge {
 display: inline-flex;
 align-items: center;
 gap: 6px;
 padding: 6px 12px;
 background: rgba(255, 255, 255, 0.1);
 border-radius: 20px;
 font-size: 12px;
 color: rgba(255, 255, 255, 0.8);
 margin: 0 5px 10px;
 }
 .tech-badges {
 text-align: center;
 margin-bottom: 20px;
 }
 </style>
</head>
<body>
 <div class="container">
 <h1><span class="icon"></span> SQLite Demo</h1>
 <p class="subtitle">CRUD Operations with Drizzle ORM</p>
 
 <div class="tech-badges">
 <span class="tech-badge"> SQLite</span>
 <span class="tech-badge"> Drizzle ORM</span>
 <span class="tech-badge"> Type-safe</span>
 </div>

 <div class="hint">
 This demo performs a full <strong>CRUD cycle</strong>: Create → Read → Update → Delete<br>
 Plus key-value storage and counter increment operations
 </div>

 <div class="operations">
 <div class="operation create">
 <span class="badge">Create</span>
 <div class="label">Insert Document</div>
 </div>
 <div class="operation read">
 <span class="badge">Read</span>
 <div class="label">Query Data</div>
 </div>
 <div class="operation update">
 <span class="badge">Update</span>
 <div class="label">Modify Record</div>
 </div>
 <div class="operation delete">
 <span class="badge">Delete</span>
 <div class="label">Remove Data</div>
 </div>
 </div>

 <form id="demoForm">
 <div class="form-group">
 <label for="name">Name</label>
 <input type="text" id="name" name="name" placeholder="Enter a name" required>
 </div>
 <div class="form-group">
 <label for="email">Email</label>
 <input type="email" id="email" name="email" placeholder="Enter an email" required>
 </div>
 <button type="submit" class="btn" id="submitBtn">
 Run CRUD Demo
 </button>
 </form>

 <div class="result" id="result">
 <div class="result-title">Results</div>
 <div class="result-content" id="resultContent"></div>
 <div class="result-summary" id="resultSummary"></div>
 </div>
 </div>

 <script>
 const form = document.getElementById('demoForm');
 const submitBtn = document.getElementById('submitBtn');
 const resultDiv = document.getElementById('result');
 const resultContent = document.getElementById('resultContent');
 const resultSummary = document.getElementById('resultSummary');

 form.addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const name = document.getElementById('name').value;
 const email = document.getElementById('email').value;
 
 submitBtn.disabled = true;
 submitBtn.innerHTML = '<span class="loading"><span class="spinner"></span> Running CRUD operations...</span>';
 resultDiv.classList.remove('show');
 
 try {
 const response = await fetch('/api/sql-demo', {
 method: 'POST',
 headers: {
 'Content-Type': 'application/json',
 },
 body: JSON.stringify({ name, email }),
 });
 
 const data = await response.json();
 
 resultDiv.classList.add('show');
 resultContent.textContent = JSON.stringify(data, null, 2);
 
 // Show summary if available
 if (data.output?.summary) {
 const summary = data.output.summary;
 resultSummary.innerHTML = `
 <h4> Demo Complete</h4>
 <div class="summary-grid">
 <div class="summary-item">
 <div class="label">User ID</div>
 <div class="value">${summary.userId || 'N/A'}</div>
 </div>
 <div class="summary-item">
 <div class="label">Final Status</div>
 <div class="value">${summary.finalStatus || 'N/A'}</div>
 </div>
 <div class="summary-item">
 <div class="label">Total Operations</div>
 <div class="value">${summary.operationsCount || 'N/A'}</div>
 </div>
 </div>
 `;
 } else {
 resultSummary.innerHTML = '';
 }
 
 } catch (error) {
 resultDiv.classList.add('show');
 resultContent.textContent = `Error: ${error.message}`;
 resultSummary.innerHTML = '';
 } finally {
 submitBtn.disabled = false;
 submitBtn.textContent = 'Run CRUD Demo';
 }
 });
 </script>
</body>
</html>
