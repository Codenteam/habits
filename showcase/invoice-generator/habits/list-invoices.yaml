id: list-invoices
name: List Invoices
description: Get all invoices

input:
  - id: limit
    type: number
    required: false
  - id: status
    type: string
    required: false

nodes:
  - id: query-invoices
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      operation: query
      params:
        collection: "invoices"
        limit: "{{habits.input.limit}}"
        sort: '{"createdAt": -1}'

edges: []

output:
  invoices: "{{query-invoices.results}}"
  count: "{{query-invoices.count}}"
