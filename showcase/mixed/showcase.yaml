# Showcase metadata for Mixed Frameworks example
# This example demonstrates combining multiple AI frameworks

name: Mixing Activepieces and n8n
description: Multi-framework demo showcasing OpenAI (Activepieces) to ElevenLabs (n8n) pipelines with local storage (Script) for voice synthesis and AI-generated content.

longDescription: |
  The Mixed Frameworks example demonstrates how Habits can seamlessly orchestrate
  multiple AI services and frameworks in a single workflow.

  ## What It Does

  - **OpenAI Integration**: Generate text content using GPT models
  - **ElevenLabs Voice**: Convert text to natural-sounding speech
  - **Local Storage**: Save generated assets locally for reuse
  - **Pipeline Architecture**: Chain services together elegantly

  This example is perfect for understanding how to combine different AI providers
  into cohesive workflows using Habits.

type: automation

