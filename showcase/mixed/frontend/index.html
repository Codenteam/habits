<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habits - Text to Speech</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      font-size: 14px;
    }
    textarea {
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 16px;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    button {
      width: 100%;
      padding: 15px 30px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      display: none;
    }
    .status.loading {
      display: block;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }
    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }
    .result {
      margin-top: 20px;
      display: none;
    }
    .result.show {
      display: block;
    }
    .result-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .result-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .generated-text {
      color: #fff;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
    }
    audio {
      width: 100%;
      margin-top: 10px;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Text to Quote to Speech</h1>
    <p class="subtitle">Generate motivational quotes and convert them to audio</p>
    
    <form id="ttsForm">
      <div class="form-group">
        <label for="prompt">Some inspirations for our AI (optional)</label>
        <textarea 
          id="prompt" 
          name="prompt" 
          placeholder="Leave empty to generate a random motivational quote, or enter your own text for AI to focus on..."
        ></textarea>
      </div>
      
      <button type="submit" id="submitBtn">
        Generate Speech
      </button>
    </form>
    
    <div id="status" class="status"></div>
    
    <div id="result" class="result">
      <div class="result-card">
        <div class="result-label">Generated Text</div>
        <p id="generatedText" class="generated-text"></p>
        
        <div class="result-label">Audio</div>
        <audio id="audioPlayer" controls></audio>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const WORKFLOW_ID = 'text-to-voice-to-s3';
    
    const form = document.getElementById('ttsForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const generatedText = document.getElementById('generatedText');
    const audioPlayer = document.getElementById('audioPlayer');
    
    function showStatus(message, type) {
      statusDiv.className = `status ${type}`;
      statusDiv.innerHTML = type === 'loading' 
        ? `<span class="spinner"></span>${message}` 
        : message;
    }
    
    function hideStatus() {
      statusDiv.className = 'status';
    }
    
    async function executeWorkflow() {
      const prompt = document.getElementById('prompt').value.trim();
      
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Generating...';
        showStatus('Starting workflow execution...', 'loading');
        resultDiv.classList.remove('show');
        
        // Execute the workflow
        const response = await fetch(`${API_BASE}/api/${WORKFLOW_ID}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(prompt ? { prompt } : {})
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        
        if (result.status !== 'completed') {
          throw new Error(`Workflow ${result.status}: Check server logs for details`);
        }
        
        // Extract results from nodes
        const textResult = result.nodeResults?.find(n => n.nodeId === 'generate-text');
        const audioResult = result.nodeResults?.find(n => n.nodeId === 'text-to-speech');
        
        if (!textResult || !audioResult) {
          throw new Error('Missing node results');
        }
        
        // Display the generated text
        const text = typeof textResult.output === 'string' 
          ? textResult.output.replace(/^"|"$/g, '') 
          : textResult.output;
        generatedText.textContent = text;
        
        // Get audio base64 and play it
        const audioData = audioResult.output?.result?.[0]?.base64;
        if (audioData) {
          audioPlayer.src = `data:audio/mpeg;base64,${audioData}`;
          audioPlayer.load();
        }
        
        hideStatus();
        resultDiv.classList.add('show');
        showStatus('✓ Speech generated successfully!', 'success');
        
      } catch (error) {
        showStatus(`Error: ${error.message}`, 'error');
        console.error('Workflow error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate Speech';
      }
    }
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      executeWorkflow();
    });
  </script>
</body>
</html>
