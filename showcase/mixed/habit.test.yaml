# Tests for Mixed Framework Workflow (Activepieces + N8N + Script)
# Workflow: habit.yaml - Text to Voice pipeline
workflow: ./habit.yaml

tests:
  # === Text-to-Voice Pipeline Tests ===
  - name: "generates text and converts to speech"
    trigger:
      body: {}
    context:
      habits:
        env:
          OPENAI_API_KEY: "sk-mock-key"
          ELEVENLABS_API_KEY: "el-mock-key"
    mocks:
      bits:
        # Mock OpenAI text generation
        - bit: "@activepieces/piece-openai"
          action: ask_chatgpt
          response: "Believe in yourself. Every step forward is progress."
        # Mock ElevenLabs text-to-speech
        - bit: "n8n-nodes-elevenlabs"
          action: text-to-speech
          response:
            result:
              - base64: "bW9ja19hdWRpb19kYXRh"
                mimeType: "audio/mpeg"
    expectSteps:
      generate-text: "Believe in yourself. Every step forward is progress."
      echo-text:
        text: "Believe in yourself. Every step forward is progress."

  - name: "handles OpenAI API error"
    trigger:
      body: {}
    context:
      habits:
        env:
          OPENAI_API_KEY: "invalid-key"
          ELEVENLABS_API_KEY: "el-mock-key"
    mocks:
      bits:
        - bit: "@activepieces/piece-openai"
          action: ask_chatgpt
          error: "OpenAI API error: Invalid API key"
    expectError: "OpenAI API error: Invalid API key"

  - name: "handles ElevenLabs API error"
    trigger:
      body: {}
    context:
      habits:
        env:
          OPENAI_API_KEY: "sk-mock-key"
          ELEVENLABS_API_KEY: "invalid-key"
    mocks:
      bits:
        - bit: "@activepieces/piece-openai"
          action: ask_chatgpt
          response: "Stay positive and work hard."
        - bit: "n8n-nodes-elevenlabs"
          action: text-to-speech
          error: "ElevenLabs API error: Quota exceeded"
    expectError: "ElevenLabs API error: Quota exceeded"
