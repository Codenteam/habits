version: "1.0"
name: "Mobile Automation Suite"
description: "Combined mobile automation habits: WiFi context switching, geofence SMS alerts, and smart home control"

workflows:
  # WiFi Context Switcher workflows
  - id: wifi-work-mode
    path: ./workflows/wifi-work-mode.yaml
    enabled: true
  - id: wifi-home-mode
    path: ./workflows/wifi-home-mode.yaml
    enabled: true

  # Geofence SMS Alert workflows
  - id: geofence-arrival-sms
    path: ./workflows/geofence-arrival-sms.yaml
    enabled: true
  - id: geofence-departure-sms
    path: ./workflows/geofence-departure-sms.yaml
    enabled: true

  # Smart Home Commander workflows
  - id: smart-home-process-command
    path: ./workflows/smart-home-process-command.yaml
    enabled: true
  - id: smart-home-create-routine
    path: ./workflows/smart-home-create-routine.yaml
    enabled: true
  - id: smart-home-list-routines
    path: ./workflows/smart-home-list-routines.yaml
    enabled: true
  - id: smart-home-list-commands
    path: ./workflows/smart-home-list-commands.yaml
    enabled: true

server:
  port: 13010
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
