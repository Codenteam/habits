# Test Install Model Workflow
id: test-install-model
name: Test Install Model
description: Test the install-model action

input:
  type: object
  properties:
    modelId:
      type: string
      description: Model ID to install
      default: qwen2-0.5b
  required:
    - modelId

nodes:
  - id: install
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-local-ai-new"
      operation: install-model
      label: Install Model
      isTrigger: false
      params:
        modelId: "{{habits.input.modelId}}"

edges: []

output:
  success: "{{install.success}}"
  modelId: "{{install.modelId}}"
  files: "{{install.files}}"
  modelsDir: "{{install.modelsDir}}"
