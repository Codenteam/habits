# Tests for AI Cookbook Recipe Generator
# Workflow: habits/generate-recipe.yaml - Generates recipes from ingredients
workflow: ./habits/generate-recipe.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully generates recipe from ingredients"
    trigger:
      body:
        ingredients: "chicken, garlic, lemon, olive oil"
        restrictions: "gluten-free"
        cuisine: "Mediterranean"
        mealType: "dinner"
        servings: 4
    context:
      habits:
        input:
          ingredients: "chicken, garlic, lemon, olive oil"
          restrictions: "gluten-free"
          cuisine: "Mediterranean"
          mealType: "dinner"
          servings: 4
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock recipe generation
        - bit: "openai"
          action: chat
          response:
            title: "Mediterranean Lemon Garlic Chicken"
            description: "Tender chicken with aromatic garlic and fresh lemon"
            prepTime: "15 minutes"
            cookTime: "25 minutes"
            totalTime: "40 minutes"
            servings: 4
            difficulty: "easy"
            cuisine: "Mediterranean"
            tags: ["healthy", "quick", "gluten-free"]
            ingredients:
              - item: "chicken breast"
                amount: "4 pieces"
                notes: "boneless"
            instructions:
              - step: 1
                instruction: "Season chicken with salt and pepper"
                tip: "Room temperature chicken cooks more evenly"
        # Mock image generation
        - bit: "openai"
          action: images
          response:
            url: "https://images.intersect.ai/generated/chicken-dish.png"
            revised_prompt: "Professional food photography of Mediterranean Lemon Garlic Chicken"
        # Mock database save
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "recipe-123"
            success: true
