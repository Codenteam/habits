id: list-recipes
name: List Recipes
description: Get all saved recipes

input:
  - id: limit
    type: number
    required: false

nodes:
  - id: query-recipes
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      operation: query
      params:
        collection: "recipes"
        limit: "{{habits.input.limit}}"
        sort: '{"createdAt": -1}'

edges: []

output:
  recipes: "{{query-recipes.results}}"
  count: "{{query-recipes.count}}"
