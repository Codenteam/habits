# Tests for Meeting Summarizer
# Workflow: habits/summarize.yaml - Transcribes and summarizes meetings
workflow: ./habits/summarize.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully transcribes and summarizes meeting"
    trigger:
      body:
        audioUrl: "https://example.com/meeting.mp3"
        meetingTitle: "Product Roadmap Q1"
        attendees: "Alice, Bob, Carol"
    context:
      habits:
        input:
          audioUrl: "https://example.com/meeting.mp3"
          meetingTitle: "Product Roadmap Q1"
          attendees: "Alice, Bob, Carol"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock transcription
        - bit: "@ha-bits/bit-intersect"
          action: transcribe
          response: "Alice: Let's discuss Q1 priorities. Bob: We should focus on feature X. Carol: I agree, let's assign tasks."
        # Mock summary extraction
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response: "- Discussed Q1 priorities\n- Decided to focus on feature X\n- Team agreed on task assignments"
        # Mock action items extraction
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            - task: "Implement feature X"
              assignee: "Bob"
              deadline: "TBD"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
