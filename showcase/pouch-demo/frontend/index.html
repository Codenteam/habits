<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>PouchDB Demo</title>
 <style>
 :root {
 /* ha-bits Design Tokens — shared palette */
 --ha-bg-base: #0f172a;
 --ha-bg-surface: #1e293b;
 --ha-bg-elevated: #334155;
 --ha-bg-hover: #475569;
 --ha-border: #334155;
 --ha-border-subtle: #1e293b;
 --ha-text-primary: #ffffff;
 --ha-text-body: #cbd5e1;
 --ha-text-muted: #94a3b8;
 --ha-text-disabled: #64748b;
 --ha-accent-blue: #3b82f6;
 --ha-accent-blue-hover: #2563eb;
 --ha-accent-sky: #38bdf8;
 --ha-accent-emerald: #34d399;
 --ha-accent-emerald-dim: rgba(52, 211, 153, 0.15);
 --ha-accent-cyan: #22d3ee;
 --ha-accent-cyan-dim: rgba(34, 211, 238, 0.15);
 --ha-accent-purple: #c084fc;
 --ha-accent-purple-dim: rgba(192, 132, 252, 0.15);
 --ha-status-running: #fbbf24;
 --ha-status-success: #4ade80;
 --ha-status-success-dim: rgba(74, 222, 128, 0.15);
 --ha-status-error: #f87171;
 --ha-status-error-dim: rgba(248, 113, 113, 0.15);
 --ha-status-pending: #60a5fa;
 --ha-status-skipped: #a78bfa;
 --ha-warn: #f59e0b;
 --ha-danger: #ef4444;
 --ha-danger-hover: #dc2626;
 --ha-danger-surface: #7f1d1d;
 --ha-radius-sm: 4px;
 --ha-radius-md: 6px;
 --ha-radius-lg: 8px;
 --ha-radius-xl: 12px;
 --ha-radius-pill: 9999px;
 }
 </style>
 <style>
 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--ha-bg-base);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }
 .container {
 background: rgba(255, 255, 255, 0.05);
 backdrop-filter: blur(10px);
 border-radius: 20px;
 padding: 40px;
 max-width: 600px;
 width: 100%;
 box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
 border: 1px solid rgba(255, 255, 255, 0.1);
 }
 h1 {
 color: var(--ha-bg-base);
 font-size: 28px;
 margin-bottom: 10px;
 text-align: center;
 }
 .subtitle {
 color: rgba(255, 255, 255, 0.6);
 text-align: center;
 margin-bottom: 30px;
 font-size: 14px;
 }
 .hint {
 background: rgba(102, 126, 234, 0.2);
 border: 1px solid rgba(102, 126, 234, 0.3);
 border-radius: 10px;
 padding: 15px;
 margin-bottom: 25px;
 color: rgba(255, 255, 255, 0.8);
 font-size: 13px;
 text-align: center;
 }
 .form-group {
 margin-bottom: 20px;
 }
 label {
 display: block;
 color: rgba(255, 255, 255, 0.8);
 font-size: 14px;
 margin-bottom: 8px;
 }
 input {
 width: 100%;
 padding: 12px 16px;
 font-size: 16px;
 color: var(--ha-bg-base);
 background: rgba(255, 255, 255, 0.1);
 border: 1px solid rgba(255, 255, 255, 0.2);
 border-radius: 10px;
 outline: none;
 transition: all 0.3s ease;
 }
 input:focus {
 border-color: var(--ha-accent-blue);
 background: rgba(255, 255, 255, 0.15);
 }
 input::placeholder {
 color: rgba(255, 255, 255, 0.4);
 }
 .btn {
 width: 100%;
 padding: 15px 30px;
 font-size: 16px;
 font-weight: 600;
 color: var(--ha-bg-base);
 background: var(--ha-accent-blue);
 border: none;
 border-radius: 12px;
 cursor: pointer;
 transition: all 0.3s ease;
 }
 .btn:hover {
 transform: translateY(-2px);
 box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
 }
 .btn:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 transform: none;
 }
 .result {
 margin-top: 25px;
 padding: 20px;
 background: rgba(0, 0, 0, 0.3);
 border-radius: 12px;
 display: none;
 }
 .result.show {
 display: block;
 }
 .result-title {
 color: var(--ha-accent-blue);
 font-size: 14px;
 font-weight: 600;
 margin-bottom: 10px;
 }
 .result-content {
 color: rgba(255, 255, 255, 0.9);
 font-family: 'Monaco', 'Menlo', monospace;
 font-size: 12px;
 white-space: pre-wrap;
 word-break: break-all;
 max-height: 300px;
 overflow-y: auto;
 }
 .loading {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 8px;
 color: rgba(255, 255, 255, 0.8);
 }
 .spinner {
 width: 20px;
 height: 20px;
 border: 2px solid rgba(255, 255, 255, 0.3);
 border-top-color: var(--ha-accent-blue);
 border-radius: 50%;
 animation: spin 1s linear infinite;
 }
 @keyframes spin {
 to { transform: rotate(360deg); }
 }
 </style>
</head>
<body>
 <div class="container">
 <h1>PouchDB Demo</h1>
 <p class="subtitle">Test insert, update, and query operations</p>
 
 <div class="hint">
 Enter a name and email to test the PouchDB workflow.<br>
 The workflow will: Insert → Update → Query the document.
 </div>
 
 <form id="demoForm">
 <div class="form-group">
 <label for="name">Name</label>
 <input type="text" id="name" placeholder="John Doe" value="John Doe" required>
 </div>
 <div class="form-group">
 <label for="email">Email</label>
 <input type="email" id="email" placeholder="john@example.com" value="john@example.com" required>
 </div>
 <button type="submit" class="btn" id="submitBtn">Run Demo</button>
 </form>
 
 <div class="result" id="result">
 <div class="result-title">Result</div>
 <div class="result-content" id="resultContent"></div>
 </div>
 </div>

 <script>
 const form = document.getElementById('demoForm');
 const submitBtn = document.getElementById('submitBtn');
 const result = document.getElementById('result');
 const resultContent = document.getElementById('resultContent');

 form.addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const name = document.getElementById('name').value.trim();
 const email = document.getElementById('email').value.trim();
 
 submitBtn.disabled = true;
 submitBtn.innerHTML = '<div class="loading"><div class="spinner"></div>Running...</div>';
 result.classList.remove('show');
 
 try {
 const response = await fetch('/api/pouch-demo', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ name, email })
 });
 
 const data = await response.json();
 resultContent.textContent = JSON.stringify(data, null, 2);
 result.classList.add('show');
 } catch (error) {
 resultContent.textContent = 'Error: ' + error.message;
 result.classList.add('show');
 } finally {
 submitBtn.disabled = false;
 submitBtn.textContent = 'Run Demo';
 }
 });
 </script>
</body>
</html>
