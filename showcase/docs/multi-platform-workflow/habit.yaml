id: multi-platform-workflow
name: Multi-Platform Workflow
nodes:
  - id: generate-content
    type: activepieces
    data:
      framework: activepieces
      module: "@activepieces/piece-openai"
      label: OpenAI Chat (MIT)
  - id: process-result
    type: bit
    data:
      framework: bits
      module: "@your-org/custom-processor"
      label: Custom Processor
  - id: send-to-legacy-system
    type: n8n
    data:
      framework: n8n
      module: n8n-nodes-base
      label: Legacy System (n8n)
edges:
  - id: e1
    source: generate-content
    target: process-result
  - id: e2
    source: process-result
    target: send-to-legacy-system
