id: sync-events
name: Sync Calendar Events (Orchestrator)
description: >-
  Scheduled workflow that fetches all users and invokes
  sync-user sub-habit for each one.
version: "1.0"

nodes:
  # Schedule trigger - runs every 3 hours
  - id: schedule-trigger
    type: bits
    data:
      framework: bits
      source: npm
      module: "bit-schedule"
      operation: cron_expression
      triggerType: polling
      params:
        cronExpression: "0 */3 * * *"
        timezone: "UTC"

  # Get all users from database
  - id: get-users
    type: bits
    data:
      label: Get All Users
      framework: bits
      source: npm
      module: "@ha-bits/bit-database-sql"
      operation: list
      params:
        collection: users
        limit: 1000
        database: "{{habits.env.DATABASE_FILE}}"

  # Iterate over users and sync each one
  - id: sync-all-users
    type: bits
    data:
      label: Sync Each User
      framework: bits
      source: npm
      module: "@ha-bits/bit-loop"
      operation: forEach
      params:
        items: "{{get-users.keys}}"
        habitId: sync-user
        inputKey: userEmail
        delayMs: 1000
        continueOnError: true
        collectResults: true

  # Log completion
  - id: log-completion
    type: script
    data:
      framework: script
      source: inline
      label: Log Sync Results
      params:
        results: "{{sync-all-users}}"
        type: script
        language: deno
        script: |
          export async function main(results: any) {
            console.log("📅 Calendar sync completed:");
            console.log(`   Total users: ${results.totalItems}`);
            console.log(`   Successful: ${results.successCount}`);
            console.log(`   Failed: ${results.errorCount}`);
            return results;
          }

edges:
  - source: schedule-trigger
    target: get-users
  - source: get-users
    target: sync-all-users
  - source: sync-all-users
    target: log-completion

output:
  - log-completion
