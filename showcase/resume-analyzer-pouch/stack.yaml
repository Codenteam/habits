version: "1.0"
name: "Resume Analyzer Pouch"

workflows:
  - id: analyze-resume
    path: ./habits/analyze-resume.yaml
    enabled: true

  - id: generate-cover-letter
    path: ./habits/generate-cover-letter.yaml
    enabled: true

  - id: list-analyses
    path: ./habits/list-analyses.yaml
    enabled: true

  - id: get-analysis
    path: ./habits/get-analysis.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
