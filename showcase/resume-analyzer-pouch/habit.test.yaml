# Tests for Resume Analyzer
# Workflow: habits/analyze-resume.yaml - Analyzes resumes and provides feedback
workflow: ./habits/analyze-resume.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully analyzes resume"
    trigger:
      body:
        resumeImage: "UklGRlYAAABXRUJQVlA4IEoAAADQAQCdASoBAAEAAUAmJYgCdAEO/h2EAD/v6AAAAAAAAAA="
        jobDescription: "Senior Frontend Developer"
        targetRole: "Senior Frontend Developer"
    context:
      habits:
        input:
          resumeImage: "UklGRlYAAABXRUJQVlA4IEoAAADQAQCdASoBAAEAAUAmJYgCdAEO/h2EAD/v6AAAAAAAAAA="
          jobDescription: "Senior Frontend Developer"
          targetRole: "Senior Frontend Developer"
        env:
          OPENAI_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock image text extraction with vision_prompt
        - bit: "@ha-bits/bit-openai"
          action: vision_prompt
          response: "John Doe\nSoftware Engineer\n5 years experience in JavaScript, React, Node.js"
        # Mock resume parsing
        - bit: "@ha-bits/bit-openai"
          action: ask_chatgpt
          response:
            name: "John Doe"
            skills: ["JavaScript", "React", "Node.js"]
            yearsExperience: 5
        # Mock ATS scoring
        - bit: "@ha-bits/bit-openai"
          action: ask_chatgpt
          response:
            overallScore: 75
            keywordScore: 80
            formatScore: 70
            contentScore: 75
            missingKeywords: ["TypeScript"]
            formatIssues: []
            suggestions: ["Add TypeScript experience"]
        - bit: "@ha-bits/bit-pouch"
          action: insert
          response:
            id: "test-123"
            success: true
        - bit: "@ha-bits/bit-pouch"
          action: putAttachment
          response:
            success: true
