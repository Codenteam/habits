id: get-review
name: Get Review
description: Get a specific code review

input:
  - id: id
    type: string
    required: true

nodes:
  - id: fetch-review
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      operation: findOne
      params:
        collection: "code_reviews"
        filter: '{"_id": "{{habits.input.id}}"}'

edges: []

output:
  review: "{{fetch-review.document}}"
  found: "{{fetch-review.found}}"
