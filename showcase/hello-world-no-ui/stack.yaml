version: "1.0"
name: hello-world-no-ui

workflows:
  - id: hello-world-no-ui
    name: Hello World (Two Inputs)
    path: ./habit.yaml
    enabled: true
  - id: hello-world-env
    name:  Hello World (One Input, One Env)
    path: ./habit-env.yaml
    enabled: true
  - id: hello-world-hardcoded-world
    name:  Hello World (One Input, One HardCoded)
    path: ./habit-hardcoded-world.yaml
    enabled: true
  - id: hello-world-all-hardcoded
    name:  Hello World (Two Hardcoded)
    path: ./habit-all-hardcoded.yaml
    enabled: true

server:
  port: 13001
  host: "0.0.0.0"

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
