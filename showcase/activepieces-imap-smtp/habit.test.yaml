# Tests for Activepieces IMAP to SMTP Email Forward
# Workflow: habit.yaml - Forwards emails from IMAP to SMTP
workflow: ./habit.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully forwards email from IMAP to SMTP"
    trigger:
      body:
        subject: "Test Email"
        from: "sender@example.com"
        text: "This is a test email body"
    context:
      habits:
        env:
          IMAP_HOST: "localhost"
          IMAP_USERNAME: "test@localhost"
          IMAP_PASSWORD: "password"
          SMTP_HOST: "localhost"
          SMTP_EMAIL: "forwarder@localhost"
          SMTP_PASSWORD: "password"
    mocks:
      bits:
        # Mock IMAP new email trigger (activepieces piece)
        - bit: "@activepieces/piece-imap"
          action: new_email
          response:
            - id: "email123"
              from: "sender@example.com"
              to: "test@localhost"
              subject: "Test Email"
              text: "This is a test email body"
              date: "2024-01-15T10:30:00Z"
        # Mock SMTP send email (activepieces piece)
        - bit: "@activepieces/piece-smtp"
          action: send-email
          response:
            success: true
            messageId: "msg123@localhost"
