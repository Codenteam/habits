id: list-papers
name: List Papers
description: List analyzed papers

input:
  - id: limit
    type: number
    required: false

nodes:
  - id: query-papers
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-database"
      operation: query
      params:
        collection: "paper_analyses"
        limit: "{{habits.input.limit}}"
        sort: '{"createdAt": -1}'

edges: []

output:
  papers: "{{query-papers.results}}"
  count: "{{query-papers.count}}"
