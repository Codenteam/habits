version: "1.0"
name: "Research Paper Assistant"

workflows:
  - id: analyze-paper
    path: ./habits/analyze-paper.yaml
    enabled: true

  - id: summarize-paper
    path: ./habits/summarize-paper.yaml
    enabled: true

  - id: generate-outline
    path: ./habits/generate-outline.yaml
    enabled: true

  - id: list-papers
    path: ./habits/list-papers.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
