id: translate-explain
name: Translate and Explain
description: Translate text and explain grammar/vocabulary

input:
  - id: text
    type: string
    required: true
    description: Text to translate
  - id: sourceLanguage
    type: string
    required: false
    description: Source language (auto-detect if not provided)
  - id: targetLanguage
    type: string
    required: true
    description: Target language

nodes:
  - id: translate-analyze
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-intersect"
      operation: ask_chatgpt
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
      params:
        model: gpt-4o
        temperature: 0.3
        maxTokens: 1000
        prompt: |
          Translate and analyze this text:
          
          Text: {{habits.input.text}}
          From: {{habits.input.sourceLanguage}}
          To: {{habits.input.targetLanguage}}
          
          Return JSON:
          {
            "translation": "Translated text",
            "literal": "Word-for-word literal translation",
            "breakdown": [
              {
                "original": "word/phrase",
                "translation": "meaning",
                "partOfSpeech": "noun/verb/etc",
                "notes": "pronunciation, usage notes"
              }
            ],
            "grammarPoints": [
              {
                "pattern": "grammar pattern used",
                "explanation": "how it works",
                "example": "another example"
              }
            ],
            "culturalContext": "Any cultural notes about usage",
            "alternatives": ["Alternative ways to say this"]
          }

edges: []

output:
  analysis: "{{translate-analyze}}"
