version: "1.0"
name: "Language Learning"

workflows:
  - id: practice-conversation
    path: ./habits/practice-conversation.yaml
    enabled: true

  - id: generate-lesson
    path: ./habits/generate-lesson.yaml
    enabled: true

  - id: translate-explain
    path: ./habits/translate-explain.yaml
    enabled: true

  - id: list-sessions
    path: ./habits/list-sessions.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
