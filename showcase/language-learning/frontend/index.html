<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Language Learning Assistant</title>
 <style>
 :root {
 /* ha-bits Design Tokens — shared palette */
 --ha-bg-base: #0f172a;
 --ha-bg-surface: #1e293b;
 --ha-bg-elevated: #334155;
 --ha-bg-hover: #475569;
 --ha-border: #334155;
 --ha-border-subtle: #1e293b;
 --ha-text-primary: #ffffff;
 --ha-text-body: #cbd5e1;
 --ha-text-muted: #94a3b8;
 --ha-text-disabled: #64748b;
 --ha-accent-blue: #3b82f6;
 --ha-accent-blue-hover: #2563eb;
 --ha-accent-sky: #38bdf8;
 --ha-accent-emerald: #34d399;
 --ha-accent-emerald-dim: rgba(52, 211, 153, 0.15);
 --ha-accent-cyan: #22d3ee;
 --ha-accent-cyan-dim: rgba(34, 211, 238, 0.15);
 --ha-accent-purple: #c084fc;
 --ha-accent-purple-dim: rgba(192, 132, 252, 0.15);
 --ha-status-running: #fbbf24;
 --ha-status-success: #4ade80;
 --ha-status-success-dim: rgba(74, 222, 128, 0.15);
 --ha-status-error: #f87171;
 --ha-status-error-dim: rgba(248, 113, 113, 0.15);
 --ha-status-pending: #60a5fa;
 --ha-status-skipped: #a78bfa;
 --ha-warn: #f59e0b;
 --ha-danger: #ef4444;
 --ha-danger-hover: #dc2626;
 --ha-danger-surface: #7f1d1d;
 --ha-radius-sm: 4px;
 --ha-radius-md: 6px;
 --ha-radius-lg: 8px;
 --ha-radius-xl: 12px;
 --ha-radius-pill: 9999px;
 }
 </style>
 <style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: var(--ha-accent-purple);
 min-height: 100vh;
 padding: 20px;
 }
 .container { max-width: 900px; margin: 0 auto; }
 h1 { color: white; text-align: center; margin-bottom: 10px; font-size: 2.5rem; }
 .subtitle { color: rgba(255,255,255,0.9); text-align: center; margin-bottom: 30px; }
 
 .mode-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
 .mode-tab {
 padding: 12px 24px;
 background: rgba(255,255,255,0.2);
 border: none;
 border-radius: 25px;
 color: white;
 cursor: pointer;
 font-size: 1rem;
 transition: all 0.2s;
 }
 .mode-tab:hover { background: rgba(255,255,255,0.3); }
 .mode-tab.active { background: white; color: var(--ha-accent-purple); font-weight: 600; }
 
 .card {
 background: white;
 border-radius: 20px;
 padding: 30px;
 margin-bottom: 20px;
 box-shadow: 0 20px 60px rgba(0,0,0,0.2);
 }
 .card h2 { color: var(--ha-accent-purple); margin-bottom: 25px; }
 
 .mode-content { display: none; }
 .mode-content.active { display: block; }
 
 .form-group { margin-bottom: 20px; }
 label { display: block; margin-bottom: 8px; color: var(--ha-text-disabled); font-weight: 500; }
 input, select, textarea {
 width: 100%;
 padding: 14px 18px;
 border: 2px solid var(--ha-bg-elevated);
 border-radius: 12px;
 font-size: 1rem;
 }
 input:focus, select:focus, textarea:focus { outline: none; border-color: var(--ha-accent-purple); }
 textarea { resize: vertical; min-height: 100px; }
 
 .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
 
 .language-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
 .lang-btn {
 padding: 12px;
 border: 2px solid var(--ha-bg-elevated);
 background: white;
 border-radius: 10px;
 cursor: pointer;
 transition: all 0.2s;
 text-align: center;
 }
 .lang-btn:hover { border-color: var(--ha-accent-purple); }
 .lang-btn.active { border-color: var(--ha-accent-purple); background: var(--ha-accent-purple-dim); }
 .lang-btn .flag { font-size: 1.5rem; }
 .lang-btn .name { font-size: 0.8rem; color: var(--ha-text-disabled); }
 
 button.submit {
 background: var(--ha-accent-purple);
 color: white;
 border: none;
 padding: 14px 28px;
 border-radius: 12px;
 font-size: 1rem;
 font-weight: 600;
 cursor: pointer;
 width: 100%;
 transition: all 0.2s;
 }
 button.submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
 button.submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
 
 .loading { display: none; text-align: center; padding: 40px; }
 .loading.active { display: block; }
 
 .chat-container {
 height: 400px;
 overflow-y: auto;
 border: 2px solid var(--ha-bg-elevated);
 border-radius: 12px;
 padding: 20px;
 margin-bottom: 20px;
 background: var(--ha-text-primary);
 }
 .message {
 margin-bottom: 20px;
 padding: 15px;
 border-radius: 12px;
 max-width: 80%;
 }
 .message.user {
 background: var(--ha-accent-purple);
 color: white;
 margin-left: auto;
 }
 .message.tutor {
 background: white;
 border: 1px solid var(--ha-bg-elevated);
 }
 .message .main-text { font-size: 1.1rem; margin-bottom: 10px; }
 .message .translation { font-size: 0.9rem; color: var(--ha-text-muted); font-style: italic; }
 .correction {
 background: var(--ha-status-running-dim, rgba(251,191,36,0.15));
 border-radius: 8px;
 padding: 10px;
 margin-top: 10px;
 }
 .correction-label { font-size: 0.8rem; color: var(--ha-warn); font-weight: 600; }
 .vocabulary {
 background: rgba(59, 130, 246, 0.15);
 border-radius: 8px;
 padding: 10px;
 margin-top: 10px;
 }
 .vocab-word { font-weight: 600; color: var(--ha-accent-blue-hover); }
 
 .lesson-content { line-height: 1.8; }
 .lesson-content h3 { color: var(--ha-accent-purple); margin: 20px 0 10px; }
 .lesson-content pre { white-space: pre-wrap; }
 
 .quiz-section { background: var(--ha-accent-purple-dim); border-radius: 12px; padding: 20px; margin-top: 20px; }
 .quiz-question { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
 .quiz-options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
 .quiz-option {
 padding: 8px 16px;
 border: 2px solid var(--ha-bg-elevated);
 border-radius: 8px;
 cursor: pointer;
 transition: all 0.2s;
 }
 .quiz-option:hover { border-color: var(--ha-accent-purple); }
 
 @media (max-width: 768px) {
 .row { grid-template-columns: 1fr; }
 .language-grid { grid-template-columns: repeat(2, 1fr); }
 }
 </style>
</head>
<body>
 <div class="container">
 <h1> Language Learning</h1>
 <p class="subtitle">Your AI-powered language tutor</p>

 <div class="mode-tabs">
 <button class="mode-tab active" onclick="switchMode('conversation')"> Conversation</button>
 <button class="mode-tab" onclick="switchMode('lesson')"> Lessons</button>
 <button class="mode-tab" onclick="switchMode('translate')"> Translate</button>
 </div>

 <!-- Conversation Mode -->
 <div id="conversation-mode" class="mode-content active">
 <div class="card">
 <h2>Practice Conversation</h2>
 
 <div class="form-group">
 <label>Language</label>
 <div class="language-grid">
 <div class="lang-btn active" data-lang="Spanish"><div class="flag"></div><div class="name">Spanish</div></div>
 <div class="lang-btn" data-lang="French"><div class="flag"></div><div class="name">French</div></div>
 <div class="lang-btn" data-lang="German"><div class="flag"></div><div class="name">German</div></div>
 <div class="lang-btn" data-lang="Italian"><div class="flag"></div><div class="name">Italian</div></div>
 <div class="lang-btn" data-lang="Portuguese"><div class="flag"></div><div class="name">Portuguese</div></div>
 <div class="lang-btn" data-lang="Japanese"><div class="flag"></div><div class="name">Japanese</div></div>
 <div class="lang-btn" data-lang="Korean"><div class="flag"></div><div class="name">Korean</div></div>
 <div class="lang-btn" data-lang="Mandarin"><div class="flag"></div><div class="name">Mandarin</div></div>
 </div>
 </div>

 <div class="row">
 <div class="form-group">
 <label>Level</label>
 <select id="conv-level">
 <option value="beginner">Beginner</option>
 <option value="intermediate" selected>Intermediate</option>
 <option value="advanced">Advanced</option>
 </select>
 </div>
 <div class="form-group">
 <label>Scenario</label>
 <select id="conv-scenario">
 <option value="casual">Casual Chat</option>
 <option value="restaurant">At a Restaurant</option>
 <option value="travel">Travel & Directions</option>
 <option value="shopping">Shopping</option>
 <option value="business">Business Meeting</option>
 </select>
 </div>
 </div>

 <div class="chat-container" id="chat-container">
 <div class="message tutor">
 <div class="main-text">¡Hola! I'm your language tutor. Start typing in your target language and I'll help you practice!</div>
 </div>
 </div>

 <form id="chat-form" style="display: flex; gap: 10px;">
 <input type="text" id="user-message" placeholder="Type in your target language..." style="flex: 1;">
 <button type="submit" class="submit" style="width: auto; padding: 14px 24px;">Send</button>
 </form>
 </div>
 </div>

 <!-- Lesson Mode -->
 <div id="lesson-mode" class="mode-content">
 <div class="card">
 <h2>Generate Lesson</h2>
 <form id="lesson-form">
 <div class="row">
 <div class="form-group">
 <label>Language</label>
 <select id="lesson-lang">
 <option value="Spanish">Spanish</option>
 <option value="French">French</option>
 <option value="German">German</option>
 <option value="Italian">Italian</option>
 <option value="Japanese">Japanese</option>
 <option value="Korean">Korean</option>
 <option value="Mandarin">Mandarin</option>
 </select>
 </div>
 <div class="form-group">
 <label>Level</label>
 <select id="lesson-level">
 <option value="beginner">Beginner</option>
 <option value="intermediate">Intermediate</option>
 <option value="advanced">Advanced</option>
 </select>
 </div>
 </div>

 <div class="form-group">
 <label>Topic</label>
 <input type="text" id="lesson-topic" placeholder="e.g., Past tense, Food vocabulary, Greetings...">
 </div>

 <button type="submit" class="submit" id="lesson-btn"> Generate Lesson</button>
 </form>
 </div>

 <div class="card" id="lesson-results" style="display: none;">
 <div class="lesson-content" id="lesson-content"></div>
 <div class="quiz-section" id="quiz-section"></div>
 </div>
 </div>

 <!-- Translate Mode -->
 <div id="translate-mode" class="mode-content">
 <div class="card">
 <h2>Translate & Explain</h2>
 <form id="translate-form">
 <div class="form-group">
 <label>Text to Translate</label>
 <textarea id="translate-text" placeholder="Enter text in any language..."></textarea>
 </div>

 <div class="form-group">
 <label>Translate to</label>
 <select id="translate-target">
 <option value="English">English</option>
 <option value="Spanish">Spanish</option>
 <option value="French">French</option>
 <option value="German">German</option>
 <option value="Japanese">Japanese</option>
 </select>
 </div>

 <button type="submit" class="submit" id="translate-btn"> Translate & Explain</button>
 </form>
 </div>

 <div class="card" id="translate-results" style="display: none;">
 <div id="translation-content"></div>
 </div>
 </div>

 <div class="loading" id="loading">
 <p style="color: var(--ha-accent-purple); font-size: 1.2rem;">Procesando... </p>
 </div>
 </div>

 <script>
 let selectedLanguage = 'Spanish';

 // Language selection
 document.querySelectorAll('.lang-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 selectedLanguage = btn.dataset.lang;
 });
 });

 // Mode switching
 function switchMode(mode) {
 document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
 document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
 document.querySelector(`[onclick="switchMode('${mode}')"]`).classList.add('active');
 document.getElementById(`${mode}-mode`).classList.add('active');
 }

 // Conversation form
 document.getElementById('chat-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const message = document.getElementById('user-message').value.trim();
 if (!message) return;

 const chatContainer = document.getElementById('chat-container');
 
 // Add user message
 chatContainer.innerHTML += `
 <div class="message user">
 <div class="main-text">${message}</div>
 </div>
 `;
 
 document.getElementById('user-message').value = '';
 chatContainer.scrollTop = chatContainer.scrollHeight;

 try {
 const response = await fetch('/api/practice-conversation', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 targetLanguage: selectedLanguage,
 nativeLanguage: 'English',
 level: document.getElementById('conv-level').value,
 scenario: document.getElementById('conv-scenario').value,
 userMessage: message
 })
 });

 const data = await response.json();
 displayConversationResponse(data.response, chatContainer);
 } catch (error) {
 chatContainer.innerHTML += `
 <div class="message tutor">
 <div class="main-text">Sorry, I had trouble responding. Please try again!</div>
 </div>
 `;
 }
 });

 function parseJSON(data) {
 if (typeof data === 'object') return data;
 try {
 return JSON.parse(data.replace(/```json\n?/g, '').replace(/```\n?/g, ''));
 } catch { return null; }
 }

 function displayConversationResponse(responseData, container) {
 const response = parseJSON(responseData);
 if (!response) {
 container.innerHTML += `
 <div class="message tutor">
 <div class="main-text">${responseData}</div>
 </div>
 `;
 return;
 }

 let html = `
 <div class="message tutor">
 <div class="main-text">${response.response || ''}</div>
 ${response.translation ? `<div class="translation">${response.translation}</div>` : ''}
 `;

 if (response.corrections?.length > 0) {
 html += `<div class="correction">
 <div class="correction-label"> Corrections:</div>
 ${response.corrections.map(c => `
 <p><s>${c.original}</s> → <strong>${c.corrected}</strong></p>
 <p style="font-size: 0.85rem; color: var(--ha-text-disabled);">${c.explanation}</p>
 `).join('')}
 </div>`;
 }

 if (response.newVocabulary?.length > 0) {
 html += `<div class="vocabulary">
 <div style="font-size: 0.8rem; color: var(--ha-accent-blue-hover); font-weight: 600;"> New Vocabulary:</div>
 ${response.newVocabulary.map(v => `
 <p><span class="vocab-word">${v.word}</span> - ${v.translation}</p>
 `).join('')}
 </div>`;
 }

 if (response.encouragement) {
 html += `<p style="margin-top: 10px; color: var(--ha-accent-emerald);"> ${response.encouragement}</p>`;
 }

 html += `</div>`;
 container.innerHTML += html;
 container.scrollTop = container.scrollHeight;
 }

 // Lesson form
 document.getElementById('lesson-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const btn = document.getElementById('lesson-btn');
 const loading = document.getElementById('loading');
 
 btn.disabled = true;
 loading.classList.add('active');

 try {
 const response = await fetch('/api/generate-lesson', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 targetLanguage: document.getElementById('lesson-lang').value,
 level: document.getElementById('lesson-level').value,
 topic: document.getElementById('lesson-topic').value || 'General vocabulary'
 })
 });

 const data = await response.json();
 displayLesson(data);
 } catch (error) {
 alert('Error: ' + error.message);
 } finally {
 btn.disabled = false;
 loading.classList.remove('active');
 }
 });

 function displayLesson(data) {
 document.getElementById('lesson-results').style.display = 'block';
 document.getElementById('lesson-content').innerHTML = `<pre>${data.lesson || ''}</pre>`;
 
 const quiz = parseJSON(data.quiz);
 if (quiz) {
 let quizHtml = '<h3> Quiz</h3>';
 quiz.multipleChoice?.forEach((q, i) => {
 quizHtml += `
 <div class="quiz-question">
 <strong>${i + 1}. ${q.question}</strong>
 <div class="quiz-options">
 ${q.options.map(opt => `<div class="quiz-option">${opt}</div>`).join('')}
 </div>
 </div>
 `;
 });
 document.getElementById('quiz-section').innerHTML = quizHtml;
 }
 }

 // Translate form
 document.getElementById('translate-form').addEventListener('submit', async (e) => {
 e.preventDefault();
 
 const btn = document.getElementById('translate-btn');
 const loading = document.getElementById('loading');
 
 btn.disabled = true;
 loading.classList.add('active');

 try {
 const response = await fetch('/api/translate-explain', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 text: document.getElementById('translate-text').value,
 targetLanguage: document.getElementById('translate-target').value
 })
 });

 const data = await response.json();
 displayTranslation(data);
 } catch (error) {
 alert('Error: ' + error.message);
 } finally {
 btn.disabled = false;
 loading.classList.remove('active');
 }
 });

 function displayTranslation(data) {
 document.getElementById('translate-results').style.display = 'block';
 const analysis = parseJSON(data.analysis);
 
 if (analysis) {
 document.getElementById('translation-content').innerHTML = `
 <h3>Translation</h3>
 <p style="font-size: 1.2rem; margin-bottom: 20px;">${analysis.translation}</p>
 
 <h4>Literal Translation</h4>
 <p style="font-style: italic; margin-bottom: 20px;">${analysis.literal}</p>
 
 <h4>Word Breakdown</h4>
 ${(analysis.breakdown || []).map(b => `
 <p><strong>${b.original}</strong> (${b.partOfSpeech}) - ${b.translation}</p>
 `).join('')}
 
 ${analysis.grammarPoints?.length > 0 ? `
 <h4>Grammar Points</h4>
 ${analysis.grammarPoints.map(g => `
 <p><strong>${g.pattern}</strong>: ${g.explanation}</p>
 `).join('')}
 ` : ''}
 `;
 } else {
 document.getElementById('translation-content').innerHTML = `<pre>${data.analysis}</pre>`;
 }
 }
 </script>
</body>
</html>
