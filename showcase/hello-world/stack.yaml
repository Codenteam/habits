version: "1.0"
workflows:
  - id: hello-world
    path: ./habit.yaml
    enabled: true
  - id: hello-world-env
    path: ./habit-env.yaml
    enabled: true
  - id: hello-world-file-watcher
    path: ./file-watcher.yaml
    enabled: true
server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
