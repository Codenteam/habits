<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4 font-sans">
  <div class="bg-gray-800 rounded-lg p-8 max-w-md w-full shadow-lg border border-gray-700">
    <h1 class="text-white text-2xl font-bold text-center mb-2">Hello World</h1>
    <p class="text-gray-400 text-center mb-6 text-sm">A simple greeting demo using @ha-bits/bit-hello-world</p>
    
    <div class="bg-blue-900/20 border border-blue-500/30 rounded-lg p-4 mb-6">
      <p class="text-gray-300 text-sm text-center">💡 Try entering "hello" and "world" to get a special greeting!</p>
    </div>
    
    <div class="mb-4">
      <label for="param1" class="block text-gray-300 text-sm mb-2">Parameter 1</label>
      <input type="text" id="param1" placeholder="Enter first parameter" value="hello" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors">
    </div>
    
    <div class="mb-6">
      <label for="param2" class="block text-gray-300 text-sm mb-2">Parameter 2</label>
      <input type="text" id="param2" placeholder="Enter second parameter" value="world" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors">
    </div>
    
    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800" id="runBtn" onclick="runWorkflow()">
      Say Hello
    </button>
    
    <div class="mt-4 p-4 rounded-lg bg-gray-700/50 text-gray-300 text-sm text-center hidden" id="status"></div>
    
    <div class="mt-4 p-6 rounded-lg bg-gray-700/50 hidden" id="result">
      <div class="text-white text-xl font-semibold text-center" id="resultMessage"></div>
    </div>
  </div>

  <script>
    async function runWorkflow() {
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const resultMessage = document.getElementById('resultMessage');
      
      const param1 = document.getElementById('param1').value;
      const param2 = document.getElementById('param2').value;
      
      btn.disabled = true;
      btn.textContent = 'Running...';
      status.className = 'mt-4 p-4 rounded-lg bg-gray-700/50 text-gray-300 text-sm text-center block';
      status.textContent = 'Sending greeting...';
      result.className = 'mt-4 p-6 rounded-lg bg-gray-700/50 hidden';
      
      try {
        const response = await fetch('/api/hello-world', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ param1, param2 })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          status.className = 'mt-4 p-4 rounded-lg bg-green-900/20 border border-green-500/30 text-green-300 text-sm text-center block';
          status.textContent = '✓ Request completed successfully!';
          
          result.className = 'mt-4 p-6 rounded-lg bg-gray-700/50 block';
          // Extract the message from the response
          const message = data.output?.message || data.message || data.output || JSON.stringify(data);
          // IF array get [0]

          resultMessage.textContent = message['greeting'];
        } else {
          throw new Error(data.message || 'Request failed');
        }
      } catch (error) {
        status.className = 'mt-4 p-4 rounded-lg bg-red-900/20 border border-red-500/30 text-red-300 text-sm text-center block';
        status.textContent = '✗ Error: ' + error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Say Hello';
      }
    }
  </script>
</body>
</html>
