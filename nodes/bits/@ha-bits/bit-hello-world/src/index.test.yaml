# bit-hello-world tests - YAML format
bit: ./index.ts
tests:
  - name: "hello + world returns greeting"
    action: greet
    input:
      param1: "hello"
      param2: "world"
    expect: "hello there"

  - name: "wrong param1 returns Nah"
    action: greet
    input:
      param1: "hi"
      param2: "world"
    expect: "Nah!"

  - name: "wrong param2 returns Nah"
    action: greet
    input:
      param1: "hello"
      param2: "universe"
    expect: "Nah!"

  - name: "both wrong returns Nah"
    action: greet
    input:
      param1: "foo"
      param2: "bar"
    expect: "Nah!"

  - name: "empty strings return Nah"
    action: greet
    input:
      param1: ""
      param2: ""
    expect: "Nah!"

  - name: "case sensitive - Hello != hello"
    action: greet
    input:
      param1: "Hello"
      param2: "World"
    expect: "Nah!"
