# bit-openai send-prompt tests - module mocking
bit: ./send-prompt.ts
action: ask_chatgpt
tests:
  - name: "basic prompt"
    auth:
      apiKey: "sk-test"
      host: "api.openai.com"
    input:
      model: gpt-5
      prompt: "What is 2+2?"
      maxTokens: 100
      temperature: 0.7
      topP: 1
      frequencyPenalty: 0
      presencePenalty: 0
      roles:
        - role: system
          content: "You are a helpful assistant."
    mocks:
      modules:
        openai:
          chat.completions.create:
            choices:
              - message: { content: "4", role: "assistant" }
    expect: "4"

  - name: "with memory key stores conversation"
    auth:
      apiKey: "sk-test"
      host: "api.openai.com"
    input:
      model: gpt-5
      prompt: "Remember my name is Alice"
      maxTokens: 100
      memoryKey: "session-1"
    mocks:
      modules:
        openai:
          chat.completions.create:
            choices:
              - message: { content: "I'll remember that, Alice!", role: "assistant" }
      store:
        initial: {}
    expect: "I'll remember that, Alice!"
    expectStore:
      "session-1":
        - role: user
          content: "Remember my name is Alice"
        - role: assistant
          content: "I'll remember that, Alice!"
