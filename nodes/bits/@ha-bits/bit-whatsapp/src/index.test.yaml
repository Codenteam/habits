# bit-whatsapp tests - WhatsApp Business Cloud API
bit: ./index.ts
tests:
  - name: "sendTextMessage - basic message"
    action: sendTextMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "+14155238886"
      message: "Hello from Habits!"
      previewUrl: false
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.HBgLMTQx..."
    expect:
      success: true
      messageId: "wamid.HBgLMTQx..."
      to: "14155238886"
      waId: "14155238886"

  - name: "sendTextMessage - with link preview"
    action: sendTextMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      message: "Check out https://example.com"
      previewUrl: true
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.2345..."
    expect:
      success: true
      messageId: "wamid.2345..."

  - name: "sendTemplateMessage - hello_world template"
    action: sendTemplateMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      templateName: "hello_world"
      languageCode: "en_US"
      components: "[]"
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.template123..."
    expect:
      success: true
      messageId: "wamid.template123..."
      templateName: "hello_world"

  - name: "sendTemplateMessage - with parameters"
    action: sendTemplateMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      templateName: "order_confirmation"
      languageCode: "en_US"
      components: '[{"type": "body", "parameters": [{"type": "text", "text": "ORDER-12345"}]}]'
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.order..."
    expect:
      success: true
      messageId: "wamid.order..."

  - name: "sendMediaMessage - send image"
    action: sendMediaMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      mediaType: "image"
      mediaUrl: "https://example.com/image.jpg"
      caption: "Product photo"
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.image..."
    expect:
      success: true
      messageId: "wamid.image..."
      mediaType: "image"

  - name: "sendMediaMessage - send document"
    action: sendMediaMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      mediaType: "document"
      mediaUrl: "https://example.com/invoice.pdf"
      caption: "Your invoice"
      filename: "invoice-2024.pdf"
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.doc..."
    expect:
      success: true
      messageId: "wamid.doc..."
      mediaType: "document"

  - name: "sendLocationMessage - send location pin"
    action: sendLocationMessage
    auth: 
      accessToken: "EAABsbCS1iWoBO..."
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      latitude: 37.4847
      longitude: -122.1477
      name: "Meta HQ"
      address: "1 Hacker Way, Menlo Park, CA"
    mocks:
      fetch:
        - url: "*/messages"
          response:
            messaging_product: "whatsapp"
            contacts:
              - input: "14155238886"
                wa_id: "14155238886"
            messages:
              - id: "wamid.loc..."
    expect:
      success: true
      messageId: "wamid.loc..."
      location:
        latitude: 37.4847
        longitude: -122.1477
        name: "Meta HQ"
        address: "1 Hacker Way, Menlo Park, CA"

  - name: "sendTextMessage - API error handling"
    action: sendTextMessage
    auth: 
      accessToken: "invalid_token"
      phoneNumberId: "123456789012345"
    input:
      to: "14155238886"
      message: "Test"
    mocks:
      fetch:
        - url: "*/messages"
          response:
            error:
              message: "Invalid OAuth access token"
              type: "OAuthException"
              code: 190
    expectError: "WhatsApp API Error: Invalid OAuth access token"
