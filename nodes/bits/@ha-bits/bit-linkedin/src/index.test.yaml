# bit-linkedin tests - LinkedIn API
bit: ./index.ts
tests:
  - name: "createPost - basic text post"
    action: createPost
    input:
      accessToken: "test-access-token"
      text: "Hello LinkedIn! This is a test post."
      visibility: "PUBLIC"
    mocks:
      fetch:
        - url: "*/me"
          response:
            id: "abc123"
            localizedFirstName: "Test"
            localizedLastName: "User"
        - url: "*/ugcPosts"
          response:
            id: "urn:li:ugcPost:123456789"
    expect:
      success: true
      postUrn: "urn:li:ugcPost:123456789"
      author: "urn:li:person:abc123"

  - name: "createPost - with custom author URN"
    action: createPost
    input:
      accessToken: "test-access-token"
      text: "Company post content"
      visibility: "PUBLIC"
      authorUrn: "urn:li:organization:12345"
    mocks:
      fetch:
        - url: "*/ugcPosts"
          response:
            id: "urn:li:ugcPost:987654321"
    expect:
      success: true
      postUrn: "urn:li:ugcPost:987654321"
      author: "urn:li:organization:12345"

  - name: "createArticlePost - share article"
    action: createArticlePost
    input:
      accessToken: "test-access-token"
      text: "Check out this article!"
      articleUrl: "https://example.com/article"
      articleTitle: "Great Article"
      articleDescription: "This is a great article description."
      visibility: "PUBLIC"
    mocks:
      fetch:
        - url: "*/me"
          response:
            id: "abc123"
        - url: "*/ugcPosts"
          response:
            id: "urn:li:ugcPost:article123"
    expect:
      success: true
      postUrn: "urn:li:ugcPost:article123"
      articleUrl: "https://example.com/article"

  - name: "getProfile - get authenticated user profile"
    action: getProfile
    input:
      accessToken: "test-access-token"
    mocks:
      fetch:
        - url: "*/me"
          response:
            id: "abc123"
            localizedFirstName: "John"
            localizedLastName: "Doe"
    expect:
      success: true
      id: "abc123"
      firstName: "John"
      lastName: "Doe"
      urn: "urn:li:person:abc123"

  - name: "deletePost - delete a post"
    action: deletePost
    input:
      accessToken: "test-access-token"
      postUrn: "urn:li:ugcPost:123456789"
    mocks:
      fetch:
        - url: "*/ugcPosts/*"
          response: {}
    expect:
      success: true
      deletedPostUrn: "urn:li:ugcPost:123456789"
