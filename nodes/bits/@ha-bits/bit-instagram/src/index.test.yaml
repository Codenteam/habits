# bit-instagram tests - Instagram Graph API
bit: ./index.ts
tests:
  - name: "createPost - create image post"
    action: createPost
    input:
      accessToken: "test-access-token"
      instagramAccountId: "17841234567890"
      imageUrl: "https://example.com/image.jpg"
      caption: "Test post #habits #automation"
    mocks:
      fetch:
        - url: "*/17841234567890/media?*"
          response:
            id: "container123"
        - url: "*/container123?*"
          response:
            status_code: "FINISHED"
        - url: "*/17841234567890/media_publish?*"
          response:
            id: "media123456"
    expect:
      success: true
      mediaId: "media123456"
      containerId: "container123"

  - name: "createCarousel - create carousel post"
    action: createCarousel
    input:
      accessToken: "test-access-token"
      instagramAccountId: "17841234567890"
      mediaUrls: '["https://example.com/img1.jpg", "https://example.com/img2.jpg"]'
      caption: "Carousel test"
    mocks:
      fetch:
        - url: "*/17841234567890/media?*is_carousel_item*"
          response:
            id: "child1"
        - url: "*/child1?*"
          response:
            status_code: "FINISHED"
        - url: "*/17841234567890/media?*is_carousel_item*"
          response:
            id: "child2"
        - url: "*/child2?*"
          response:
            status_code: "FINISHED"
        - url: "*/17841234567890/media?*CAROUSEL*"
          response:
            id: "carousel123"
        - url: "*/17841234567890/media_publish?*"
          response:
            id: "published123"
    expect:
      success: true
      mediaId: "published123"
      itemCount: 2

  - name: "replyToComment - reply to comment"
    action: replyToComment
    input:
      accessToken: "test-access-token"
      commentId: "comment123"
      message: "Thanks for your comment!"
    mocks:
      fetch:
        - url: "*/comment123/replies?*"
          response:
            id: "reply456"
    expect:
      success: true
      replyId: "reply456"
      commentId: "comment123"

  - name: "getProfile - get account profile"
    action: getProfile
    input:
      accessToken: "test-access-token"
      instagramAccountId: "17841234567890"
    mocks:
      fetch:
        - url: "*/17841234567890?*"
          response:
            id: "17841234567890"
            username: "testaccount"
            name: "Test Account"
            followers_count: 10000
            follows_count: 500
            media_count: 200
    expect:
      success: true
      id: "17841234567890"
      username: "testaccount"
      followers: 10000

  - name: "getMediaInsights - get post insights"
    action: getMediaInsights
    input:
      accessToken: "test-access-token"
      mediaId: "media123"
    mocks:
      fetch:
        - url: "*/media123/insights?*"
          response:
            data:
              - name: "impressions"
                values: [{ value: 5000 }]
              - name: "reach"
                values: [{ value: 3000 }]
              - name: "engagement"
                values: [{ value: 500 }]
    expect:
      success: true
      mediaId: "media123"

  - name: "getAccountInsights - get account insights"
    action: getAccountInsights
    input:
      accessToken: "test-access-token"
      instagramAccountId: "17841234567890"
      period: "day"
    mocks:
      fetch:
        - url: "*/17841234567890/insights?*"
          response:
            data:
              - name: "impressions"
                values: [{ value: 10000 }]
              - name: "reach"
                values: [{ value: 7500 }]
    expect:
      success: true
      instagramAccountId: "17841234567890"
      period: "day"
