    <path d="M55 20L35 60h20L45 95l20-45H45L55 20z" fill="url(#accent)" stroke="url(#accent)" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <!-- Label -->
  <text x="400" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">Automation</text>
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.5">Workflow automation and task orchestration</text>
</svg>