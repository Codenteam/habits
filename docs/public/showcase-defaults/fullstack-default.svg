<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0 50h800M0 100h800M0 150h800M0 200h800M0 250h800M0 300h800M0 350h800M0 400h800"/>
    <path d="M50 0v450M100 0v450M150 0v450M200 0v450M250 0v450M300 0v450M350 0v450M400 0v450M450 0v450M500 0v450M550 0v450M600 0v450M650 0v450M700 0v450M750 0v450"/>
  </g>
  <!-- Layers/Fullstack icon -->
  <g transform="translate(350, 140)">
    <circle cx="50" cy="55" r="60" fill="url(#accent)" fill-opacity="0.1" stroke="url(#accent)" stroke-width="2"/>
    <!-- Stack layers -->
    <path d="M50 25L20 40l30 15 30-15L50 25z" fill="url(#accent)" fill-opacity="0.3" stroke="url(#accent)" stroke-width="2"/>
    <path d="M50 45L20 60l30 15 30-15L50 45z" fill="url(#accent)" fill-opacity="0.5" stroke="url(#accent)" stroke-width="2"/>
    <path d="M50 65L20 80l30 15 30-15L50 65z" fill="url(#accent)" fill-opacity="0.8" stroke="url(#accent)" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="400" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">Full Stack</text>
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.5">Complete frontend and backend solution</text>
</svg>