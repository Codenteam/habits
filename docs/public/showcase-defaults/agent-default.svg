<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0 50h800M0 100h800M0 150h800M0 200h800M0 250h800M0 300h800M0 350h800M0 400h800"/>
    <path d="M50 0v450M100 0v450M150 0v450M200 0v450M250 0v450M300 0v450M350 0v450M400 0v450M450 0v450M500 0v450M550 0v450M600 0v450M650 0v450M700 0v450M750 0v450"/>
  </g>
  <!-- Brain/AI icon -->
  <g transform="translate(350, 150)">
    <circle cx="50" cy="50" r="60" fill="url(#accent)" fill-opacity="0.1" stroke="url(#accent)" stroke-width="2"/>
    <path d="M30 50c0-11 9-20 20-20s20 9 20 20-9 20-20 20" stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="8" fill="url(#accent)"/>
    <path d="M50 30v-15M70 50h15M50 70v15M30 50h-15" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="15" r="4" fill="url(#accent)"/>
    <circle cx="85" cy="50" r="4" fill="url(#accent)"/>
    <circle cx="50" cy="85" r="4" fill="url(#accent)"/>
    <circle cx="15" cy="50" r="4" fill="url(#accent)"/>
  </g>
  <!-- Label -->
  <text x="400" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle" opacity="0.8">AI Agent</text>
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.5">Intelligent automation with AI capabilities</text>
</svg>