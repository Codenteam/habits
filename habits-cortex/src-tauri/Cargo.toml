[package]
name = "habits-cortex"
version = "1.0.0"
description = "Cortex - Run habit workflows locally"
authors = ["Habits"]
license = "MIT"
repository = ""
edition = "2021"

[lib]
name = "cortex_app_lib"
# staticlib required for iOS, cdylib for Android, rlib for macOS
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "habits-cortex"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-shell = "2"
tauri-plugin-http = "2"
tauri-plugin-log = "2"
openssl = { version = "0.10", features = ["vendored"] }
tauri-plugin-keyring = { path = "../tauri-plugin-keyring" }
tauri-plugin-email = { path = "../tauri-plugin-email" }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
tauri-plugin-fs = { version = "2" }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"

[features]
custom-protocol = ["tauri/custom-protocol"]

[profile.dev]
incremental = true

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
overflow-checks = false
incremental = false
