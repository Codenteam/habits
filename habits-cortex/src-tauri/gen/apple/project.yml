name: habits-cortex
options:
  bundleIdPrefix: com.codenteam-oss.habits
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Cortex
      PRODUCT_BUNDLE_IDENTIFIER: com.codenteam-oss.habits
      DEVELOPMENT_TEAM: S54SCFZ347
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  habits-cortex_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
        buildPhase: none
      - path: habits-cortex_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: habits-cortex_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        NSLocationWhenInUseUsageDescription: "This app uses your location to provide location-based automations, activated only in location-based habits."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 1.0.8
        CFBundleVersion: "202604172102"
    entitlements:
      path: habits-cortex_iOS/habits-cortex_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Accelerate.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: |
          # Workaround for Tauri CLI 2.10.1 bug with {arch} placeholder
          # The Rust library should be pre-built before running xcodebuild
          TARGET_ARCH="${NATIVE_ARCH_ACTUAL:-${CURRENT_ARCH:-arm64}}"
          RUST_ARCH="aarch64-apple-ios"
          if [ "$TARGET_ARCH" = "x86_64" ]; then
            RUST_ARCH="x86_64-apple-ios"
          fi
          
          SRC_LIB="${SRCROOT}/../../target/${RUST_ARCH}/release/libcortex_app_lib.a"
          DEST_DIR="${SRCROOT}/Externals/${TARGET_ARCH}/${CONFIGURATION}"
          DEST_LIB="${DEST_DIR}/libapp.a"
          
          mkdir -p "$DEST_DIR"
          
          if [ -f "$SRC_LIB" ]; then
            echo "Copying pre-built Rust library from $SRC_LIB to $DEST_LIB"
            cp "$SRC_LIB" "$DEST_LIB"
          else
            echo "Error: Pre-built Rust library not found at $SRC_LIB"
            echo "Please run: cargo build --release --target $RUST_ARCH"
            exit 1
          fi
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a