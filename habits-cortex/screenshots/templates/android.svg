<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Android Phone Frame - 1080 × 1920px -->
  <defs>
    <mask id="screenMask">
      <rect x="0" y="0" width="1080" height="1920" fill="white"/>
      <rect x="45" y="45" width="990" height="1830" rx="68" ry="68" fill="black"/>
    </mask>
    <clipPath id="screenshotClip">
      <rect x="45" y="45" width="990" height="1830" rx="34" ry="34"/>
    </clipPath>
  </defs>
  
  <!-- Device frame with screen cutout -->
  <rect x="0" y="0" width="1080" height="1920" rx="100" ry="100" fill="#1a1a1a" mask="url(#screenMask)"/>
  <rect x="8" y="8" width="1064" height="1904" rx="92" ry="92" fill="#333333" mask="url(#screenMask)"/>
  <rect x="16" y="16" width="1048" height="1888" rx="84" ry="84" fill="#1a1a1a" mask="url(#screenMask)"/>
  
  <!-- Camera punch hole -->
  <circle cx="540" cy="100" r="22" fill="#1a1a1a"/>
  
  <!-- Side buttons -->
  <rect x="1080" y="450" width="8" height="140" rx="3" ry="3" fill="#333333"/>
  <rect x="1080" y="650" width="8" height="220" rx="3" ry="3" fill="#333333"/>
  
  <!-- Screenshot image (top layer) -->
  <image id="screenshot" clip-path="url(#screenshotClip)" x="45" y="45" width="990" height="1830" preserveAspectRatio="xMidYMid meet" xlink:href="placeholder.png"/>
</svg>
