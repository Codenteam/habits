<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 2732 2048" width="2732" height="2048">
  <!-- iPad Frame - 2732 × 2048px (landscape) -->
  <defs>
    <mask id="screenMask">
      <rect x="0" y="0" width="2732" height="2048" fill="white"/>
      <rect x="90" y="90" width="2552" height="1868" rx="24" ry="24" fill="black"/>
    </mask>
    <clipPath id="screenshotClip">
      <rect x="90" y="90" width="2552" height="1868" rx="36" ry="36"/>
    </clipPath>
  </defs>
  
  <!-- Device frame with screen cutout -->
  <rect x="0" y="0" width="2732" height="2048" rx="72" ry="72" fill="#1a1a1a" mask="url(#screenMask)"/>
  <rect x="12" y="12" width="2708" height="2024" rx="60" ry="60" fill="#2d2d2d" mask="url(#screenMask)"/>
  <rect x="24" y="24" width="2684" height="2000" rx="48" ry="48" fill="#1a1a1a" mask="url(#screenMask)"/>
  
  <!-- Front camera -->
  <circle cx="1366" cy="45" r="12" fill="#333333"/>
  
  <!-- Screenshot image (top layer) -->
  <image id="screenshot" clip-path="url(#screenshotClip)" x="90" y="90" width="2552" height="1868" preserveAspectRatio="xMidYMid meet" xlink:href="placeholder.png"/>
</svg>
