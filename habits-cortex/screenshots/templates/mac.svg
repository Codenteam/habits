<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 2880 1800" width="2880" height="1800">
  <!-- MacBook Frame - 2880 × 1800px -->
  <defs>
    <mask id="screenMask">
      <rect x="0" y="0" width="2880" height="1800" fill="white"/>
      <rect x="120" y="60" width="2640" height="1500" rx="8" ry="8" fill="black"/>
    </mask>
    <clipPath id="screenshotClip">
      <rect x="120" y="60" width="2640" height="1500" rx="12" ry="12"/>
    </clipPath>
    <linearGradient id="bezelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Screen bezel (lid) -->
  <rect x="60" y="20" width="2760" height="1540" rx="24" ry="24" fill="url(#bezelGradient)" mask="url(#screenMask)"/>
  <rect x="72" y="32" width="2736" height="1516" rx="16" ry="16" fill="#1a1a1a" mask="url(#screenMask)"/>
  
  <!-- Notch with webcam -->
  <path d="M1340 20 h200 q20 0 20 20 v20 q0 10 -10 10 h-220 q-10 0 -10 -10 v-20 q0 -20 20 -20" fill="#1a1a1a"/>
  <circle cx="1440" cy="42" r="6" fill="#333333"/>
  <circle cx="1440" cy="42" r="3" fill="#1a1a1a"/>
  
  <!-- Base/Keyboard section -->
  <path d="M80 1560 Q80 1580 100 1590 L180 1620 Q200 1628 220 1628 H2660 Q2680 1628 2700 1620 L2780 1590 Q2800 1580 2800 1560 V1560 H80 Z" fill="url(#baseGradient)"/>
  
  <!-- Hinge line -->
  <rect x="100" y="1556" width="2680" height="8" rx="2" ry="2" fill="#222222"/>
  
  <!-- Keyboard base top surface -->
  <rect x="30" y="1628" width="2820" height="80" rx="8" ry="8" fill="#1a1a1a"/>
  
  <!-- Trackpad -->
  <rect x="1140" y="1630" width="600" height="40" rx="8" ry="8" fill="#252525" stroke="#333333" stroke-width="1"/>
  
  <!-- Screenshot image (top layer) -->
  <image id="screenshot" clip-path="url(#screenshotClip)" x="120" y="60" width="2640" height="1500" preserveAspectRatio="xMidYMid meet" xlink:href="placeholder.png"/>
</svg>