name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'showcase/**'
      - 'packages/habit-viewer/**'
      - 'packages/workflow-canvas/**'
      - 'scripts/deploy-docs.ts'
      - '.github/workflows/deploy-docs.yml'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Install expect
        run: sudo apt-get install -y expect

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCP_HOST: ${{ secrets.SCP_HOST }}
          SCP_USERNAME: ${{ secrets.SCP_USERNAME }}
          SCP_KEY: ${{ secrets.SCP_KEY }}
          SCP_PASSPHRASE: ${{ secrets.SCP_PASSPHRASE }}
          SCP_PORT: ${{ secrets.SCP_PORT }}
          SCP_PATH: ${{ secrets.SCP_PATH }}
        run: npx tsx scripts/deploy-docs.ts 2>&1 | npx tsx scripts/log-sanitizer.ts
