name: Publish Bits to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'nodes/bits/@ha-bits/**'

permissions:
  contents: read

jobs:
  publish-bits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Publish bits
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.package }}" ]; then
            ARGS="--package ${{ github.event.inputs.package }}"
          elif [ "${{ github.event.inputs.all }}" = "true" ]; then
            ARGS="--all"
          fi
          npx tsx scripts/publish-bits.ts $ARGS | npx tsx scripts/log-sanitizer.ts
