name: Build Habits Cortex App (Mobile/Desktop)

on:
  push:
    branches:
      - 'v*'
      - 'release/*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: habits-cortex
        run: npm install
      
      - name: Build macOS
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -o pipefail
          cd habits-cortex
          npx tsx build-release.ts --platform macos --output ./release 2>&1 | npx tsx ../scripts/log-sanitizer.ts
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: habits-cortex/release/macos/**/*.dmg
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: habits-cortex
        run: npm install
      
      - name: Clean generated iOS project
        run: rm -rf habits-cortex/src-tauri/gen/apple
      
      - name: Initialize iOS project
        working-directory: habits-cortex
        run: npm run tauri -- ios init
      
      - name: Build iOS
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -o pipefail
          cd habits-cortex
          npx tsx build-release.ts --platform ios --output ./release 2>&1 | npx tsx ../scripts/log-sanitizer.ts
      
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: habits-cortex/release/ios/**/*.ipa
          retention-days: 7
          
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          # Add NDK toolchain to PATH for cross-compilation
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: habits-cortex
        run: npm install
      
      - name: Clean generated Android project
        run: rm -rf habits-cortex/src-tauri/gen/android
      
      - name: Initialize Android project
        working-directory: habits-cortex
        run: npm run tauri -- android init
      
      - name: Build Android
        env:
          # Signing (optional - unsigned APK kept if not set)
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Google Play upload (optional)
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_PLAY_PACKAGE_NAME: ${{ secrets.GOOGLE_PLAY_PACKAGE_NAME }}
          GOOGLE_PLAY_TRACK: ${{ secrets.GOOGLE_PLAY_TRACK }}
        run: |
          set -o pipefail
          cd habits-cortex
          npx tsx build-release.ts --platform android --output ./release 2>&1 | npx tsx ../scripts/log-sanitizer.ts
      
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: habits-cortex/release/android/**/*.apk
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Strawberry Perl
        run: choco install strawberryperl -y
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: habits-cortex
        run: npm install
      
      - name: Build Windows (unsigned)
        shell: bash
        run: |
          set -o pipefail
          export PATH="/c/Strawberry/perl/bin:$PATH"
          cd habits-cortex
          npx tsx build-release.ts --platform windows --output ./release 2>&1 | npx tsx ../scripts/log-sanitizer.ts
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            habits-cortex/release/windows/**/*.exe
            habits-cortex/release/windows/**/*.msi
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev libssl-dev libdbus-1-dev gnome-keyring libsecret-1-dev
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: habits-cortex
        run: npm install
      
      - name: Build Linux (unsigned)
        run: |
          set -o pipefail
          cd habits-cortex
          npx tsx build-release.ts --platform linux --output ./release 2>&1 | npx tsx ../scripts/log-sanitizer.ts
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: habits-cortex/release/linux/**/*.AppImage
          retention-days: 7
  
  create-release:
    needs: [build-macos, build-ios, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from branch name (v* or release/*)
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            if [[ "$BRANCH_NAME" == v* ]]; then
              echo "version=${BRANCH_NAME#v}" >> $GITHUB_OUTPUT
            elif [[ "$BRANCH_NAME" == release/* ]]; then
              echo "version=${BRANCH_NAME#release/}" >> $GITHUB_OUTPUT
            else
              echo "version=$BRANCH_NAME" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          name: Habits Cortex v${{ steps.version.outputs.version }}.${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.ipa
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}