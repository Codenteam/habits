version: "1.0"

workflows:
  - id: review-code
    path: ./habits/review-code.yaml
    enabled: true

  - id: explain-code
    path: ./habits/explain-code.yaml
    enabled: true

  - id: list-reviews
    path: ./habits/list-reviews.yaml
    enabled: true

  - id: get-review
    path: ./habits/get-review.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
