# Tests for Personal Finance Advisor
# Workflow: habits/analyze-finances.yaml - Financial analysis and recommendations
workflow: ./habits/analyze-finances.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully analyzes finances and provides recommendations"
    trigger:
      body:
        income: 5000
        expenses: '{"rent":1500,"food":600,"transport":300,"utilities":200}'
        savings: 10000
        debt: '{"student":20000,"credit":2000}'
    context:
      habits:
        input:
          income: 5000
          expenses: '{"rent":1500,"food":600,"transport":300,"utilities":200}'
          savings: 10000
          debt: '{"student":20000,"credit":2000}'
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock spending analysis
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            healthScore: 75
            healthStatus: "Good"
            incomeVsExpense:
              totalExpenses: 2600
              netIncome: 2400
              savingsRate: "48%"
              assessment: "Healthy savings rate"
        # Mock recommendations
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            recommendations:
              - "Pay down credit card debt first"
              - "Increase emergency fund"
              - "Consider retirement contributions"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
