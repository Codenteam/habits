# Tests for Hello World Demo
# Workflow: habit.yaml - Simple hello world demonstration
workflow: ./habit.yaml

tests:
  # === Hello World Success Test ===
  - name: "says hello when params are hello and world"
    trigger:
      body:
        param1: "hello"
        param2: "world"
    context:
      habits:
        input:
          param1: "hello"
          param2: "world"
    mocks:
      bits:
        - bit: "@ha-bits/bit-hello-world"
          action: greet
          response: "hello there"
    expectSteps:
      say-hello: "hello there"
