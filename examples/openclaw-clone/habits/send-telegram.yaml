id: send-telegram
name: Send Telegram Message
description: Send a message via Telegram Bot API

input:
  - id: chatId
    type: string
    required: true
  - id: message
    type: string
    required: true
  - id: parseMode
    type: string
    required: false

nodes:
  - id: telegram-send
    type: bits
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-telegram"
      resource: sendMessage
      operation: sendMessage
      params:
        botToken: "{{habits.env.TELEGRAM_BOT_TOKEN}}"
        chatId: "{{habits.env.TELEGRAM_CHAT_ID}}"
        text: "{{habits.input.message}}"

edges: []

output:
  success: "{{telegram-send.ok}}"
  messageId: "{{telegram-send.result.message_id}}"
