id: imap-smtp-email-workflow
name: IMAP to SMTP Email Forward

nodes:
  # IMAP Trigger - Listen for new emails
  - id: new-email-trigger
    type: activepieces
    data:
      framework: activepieces
      source: npm
      module: "@activepieces/piece-imap"
      operation: new_email
      triggerType: polling
      params:
        mailbox: "INBOX"
      credentials:
        imapAuth:
          host: "localhost"
          username: "test@localhost"
          password: "password"
          port: 3143
          tls: false
          validateCertificates: false

  # Send Email via SMTP
  - id: send-email
    type: activepieces
    data:
      framework: activepieces
      source: npm
      module: "@activepieces/piece-smtp"
      operation: send-email
      params:
        from: "forwarder@localhost"
        to:
          - "recipient@localhost"
        subject: "Forwarded: {{new-email-trigger[0].subject}}"
        body: "{{new-email-trigger[0].text}}"
        body_type: plain_text
        senderName: "Email Forwarder"
        attachments: []
      credentials:
        smtpAuth:
          host: "localhost"
          email: "forwarder@localhost"
          password: "password"
          port: 2525
          TLS: false

edges:
  - source: new-email-trigger
    target: send-email
