id: github-pr-to-discord
name: Post GitHub Pull Requests to Discord
description: >
  Fetches open pull requests from a GitHub repository and posts a rich
  embed notification to a Discord channel via webhook.
version: 1.0.0

nodes:
  # ── 1. Trigger: poll GitHub for new pull requests ──
  - id: trigger
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-github"
      operation: newPullRequest
      isTrigger: true
      label: New Pull Request Trigger
      params:
        owner: "{{habits.env.GITHUB_OWNER}}"
        repo: "{{habits.env.GITHUB_REPO}}"
        perPage: 5
      credentials:
        token: "{{habits.env.GITHUB_TOKEN}}"

  # ── 2. Format: build a Discord message from PR data ──
  - id: format-message
    type: script
    data:
      framework: script
      label: Format Discord Message
      language: javascript
      code: |
        const prs = input['trigger']?.pullRequests ?? [];
        const repo = env.GITHUB_OWNER + '/' + env.GITHUB_REPO;

        if (prs.length === 0) {
          return {
            content: `No open pull requests in **${repo}**.`,
            embedTitle: null,
            embedDescription: null,
            embedColor: '#95a5a6'
          };
        }

        const lines = prs.map(pr => {
          const draft = pr.draft ? ' 📝 _draft_' : '';
          const labels = pr.labels?.length ? ` [${pr.labels.join(', ')}]` : '';
          return `• **#${pr.number}** [${pr.title}](${pr.url}) by \`${pr.user}\`${draft}${labels}`;
        });

        return {
          content: `📬 **${prs.length} open PR(s)** in **${repo}**`,
          embedTitle: `Open Pull Requests — ${repo}`,
          embedDescription: lines.join('\n'),
          embedColor: '#5865F2'
        };

  # ── 3. Notify: send the formatted message to Discord ──
  - id: discord-notify
    type: action
    data:
      framework: bits
      source: npm
      module: "@ha-bits/bit-discord"
      operation: sendWebhookMessage
      label: Post to Discord
      params:
        webhookUrl: "{{habits.env.DISCORD_WEBHOOK_URL}}"
        content: "{{format-message.content}}"
        embedTitle: "{{format-message.embedTitle}}"
        embedDescription: "{{format-message.embedDescription}}"
        embedColor: "{{format-message.embedColor}}"
        username: "GitHub Habits Bot"

edges:
  - source: trigger
    target: format-message
  - source: format-message
    target: discord-notify

output:
  pullRequests: "{{trigger.pullRequests}}"
  prCount: "{{trigger.count}}"
  discordResult: "{{discord-notify.success}}"
