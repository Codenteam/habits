version: "1.0"

workflows:
  - id: generate-newsletter
    path: ./habits/generate-newsletter.yaml
    enabled: true

  - id: curate-content
    path: ./habits/curate-content.yaml
    enabled: true

  - id: list-newsletters
    path: ./habits/list-newsletters.yaml
    enabled: true

  - id: get-newsletter
    path: ./habits/get-newsletter.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
