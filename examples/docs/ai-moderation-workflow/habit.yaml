id: ai-moderation-workflow
name: AI Moderation Workflow
nodes:
  - id: generate-content
    type: activepieces
    data:
      framework: activepieces
      label: Generate Content
      isTrigger: true
  - id: moderate-output
    type: bit
    data:
      framework: bits
      module: "@ha-bits/bit-intersect"
      operation: moderate
      label: Moderate Output
      credentials:
        intersect:
          host: "{{habits.env.HABITS_INTERSECT_HOST}}"
          apiKey: "{{habits.env.HABITS_INTERSECT_API_KEY}}"
edges:
  - id: e1
    source: generate-content
    target: moderate-output
