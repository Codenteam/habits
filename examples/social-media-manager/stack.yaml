version: "1.0"

workflows:
  - id: generate-content
    path: ./habits/generate-content.yaml
    enabled: true

  - id: generate-calendar
    path: ./habits/generate-calendar.yaml
    enabled: true

  - id: list-content
    path: ./habits/list-content.yaml
    enabled: true

  - id: get-content
    path: ./habits/get-content.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
