id: text-to-voice-to-s3
name: text-to-voice-to-s3

nodes:
  - id: generate-text
    type: activepieces
    position:
      x: 125
      'y': 50
    data:
      framework: activepieces
      module: '@activepieces/piece-openai'
      operation: ask_chatgpt
      source: npm
      credentials:
        apiKey: '{{habits.env.OPENAI_API_KEY}}'
      params:
        prompt: Write a short 2-sentence motivational quote
        model: gpt-4o-mini
  - id: echo-text
    type: script
    position:
      x: 0
      'y': 548
    data:
      label: Echo Generated Text
      framework: script
      source: inline
      params:
        text: '{{generate-text}}'
        type: script
        language: deno
        script: |
          export async function main(text: string) {
            console.log("Generated text:", text);

            // Write to file 
            await Deno.writeTextFile("/tmp/test.txt", text);
            return { text };
          }
  - id: text-to-speech
    type: n8n
    position:
      x: 125
      'y': 1168
    data:
      framework: n8n
      module: n8n-nodes-elevenlabs
      operation: text-to-speech
      source: npm
      credentials:
        elevenLabsApi:
          xiApiKey: '{{habits.env.ELEVENLABS_API_KEY}}'
      params:
        resource: speech
        text: '{{generate-text}}'
        voice_id: 21m00Tcm4TlvDq8ikWAM
  - id: save-locally
    type: script
    position:
      x: 0
      'y': 1666
    data:
      label: Save Audio Locally
      framework: script
      source: inline
      params:
        audio: '{{text-to-speech.result.0..base64}}'
        type: script
        language: deno
        script: |
          export async function main(audio: string | ArrayBuffer) {
            const outputDir = '/tmp/habits-audio';
            await Deno.mkdir(outputDir, { recursive: true });
            
            const filename = `audio-${Date.now()}.mp3`;
            const filepath = `${outputDir}/${filename}`;
            
            // Use Buffer for base64 decoding (works in Node.js environment)
            const buffer = typeof audio === 'string' 
              ? Buffer.from(audio, 'base64')
              : new Uint8Array(audio);
            
            await Deno.writeFile(filepath, buffer);
            
            const stats = await Deno.stat(filepath);
            return { 
              success: true, 
              filepath,
              filename,
              size: stats.size,
              modifiedAt: stats.mtime?.toISOString()
            };
          }
edges:
  - source: generate-text
    target: echo-text
  - source: echo-text
    target: text-to-speech
  - source: text-to-speech
    target: save-locally
