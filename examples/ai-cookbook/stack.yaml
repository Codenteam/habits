version: "1.0"

workflows:
  - id: generate-recipe
    path: ./habits/generate-recipe.yaml
    enabled: true

  - id: list-recipes
    path: ./habits/list-recipes.yaml
    enabled: true

  - id: get-recipe
    path: ./habits/get-recipe.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
