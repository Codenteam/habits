<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Habit Demo - If, Loop, String Utils</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .features {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .feature {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 20px;
      color: #fff;
      font-size: 12px;
    }
    .btn {
      width: 100%;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .status.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      display: none;
    }
    .result.show {
      display: block;
    }
    .result h3 {
      color: #fff;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .result-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .result-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .result-value {
      color: #fff;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 13px;
      word-break: break-all;
    }
    pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      color: #10b981;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Basic Habit Demo</h1>
    <p class="subtitle">Testing If Conditions, Loops, and String Utilities</p>
    
    <div class="features">
      <span class="feature">🔀 If Condition</span>
      <span class="feature">🔄 Loop/Split</span>
      <span class="feature">📝 String Utils</span>
    </div>
    
    <button class="btn" id="runBtn" onclick="runWorkflow()">
      Run Basic Habit
    </button>
    
    <div class="status" id="status"></div>
    
    <div class="result" id="result">
      <h3>Results</h3>
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    async function runWorkflow() {
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const resultContent = document.getElementById('resultContent');
      
      btn.disabled = true;
      btn.textContent = 'Running...';
      status.className = 'status show';
      status.textContent = 'Executing workflow...';
      result.className = 'result';
      
      try {
        const response = await fetch('/api/basic-habit-demo', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({})
        });
        
        const data = await response.json();
        
        if (response.ok) {
          status.className = 'status show success';
          status.textContent = '✓ Workflow completed successfully!';
          
          result.className = 'result show';
          resultContent.innerHTML = `
            <div class="result-item">
              <div class="result-label">Validation Result (If Condition)</div>
              <div class="result-value">${JSON.stringify(data.output?.validation || data.validation || 'N/A', null, 2)}</div>
            </div>
            <div class="result-item">
              <div class="result-label">String Operations</div>
              <pre>${JSON.stringify(data.output?.stringOperations || data.stringOperations || 'N/A', null, 2)}</pre>
            </div>
            <div class="result-item">
              <div class="result-label">Loop Results</div>
              <pre>${JSON.stringify(data.output?.loopResults || data.loopResults || 'N/A', null, 2)}</pre>
            </div>
            <div class="result-item">
              <div class="result-label">Summary</div>
              <pre>${JSON.stringify(data.output?.summary || data.summary || data, null, 2)}</pre>
            </div>
          `;
        } else {
          throw new Error(data.message || 'Workflow execution failed');
        }
      } catch (error) {
        status.className = 'status show error';
        status.textContent = '✗ Error: ' + error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Basic Habit';
      }
    }
  </script>
</body>
</html>
