# Tests for bit-if Single Branch Mode
# Workflow: test-if-single-branch.yaml
workflow: ./test-if-single-branch.yaml

tests:
  # === Single Branch Mode Tests ===
  - name: "singleBranch - matches first branch (apple)"
    trigger:
      body: {}
    context:
      habits:
        input:
          value: "apple"
    mocks:
      bits:
        - bit: "bit-if"
          action: branch
          response:
            mode: singleBranch
            executedBranchIndex: 0
            executedBranchLabel: "If"
            output: "You selected a fruit: Apple 🍎"
            matched: true
            elseExecuted: false
    expect:
      output: "You selected a fruit: Apple 🍎"
      matched: true

  - name: "singleBranch - matches second branch (banana)"
    trigger:
      body: {}
    context:
      habits:
        input:
          value: "banana"
    mocks:
      bits:
        - bit: "bit-if"
          action: branch
          response:
            mode: singleBranch
            executedBranchIndex: 1
            executedBranchLabel: "Else If"
            output: "You selected a fruit: Banana 🍌"
            matched: true
            elseExecuted: false
    expect:
      output: "You selected a fruit: Banana 🍌"
      matched: true

  - name: "singleBranch - matches greaterThan (number > 100)"
    trigger:
      body: {}
    context:
      habits:
        input:
          value: "150"
    mocks:
      bits:
        - bit: "bit-if"
          action: branch
          response:
            mode: singleBranch
            executedBranchIndex: 2
            executedBranchLabel: "Else If"
            output: "Number is greater than 100"
            matched: true
            elseExecuted: false
    expect:
      output: "Number is greater than 100"
      matched: true

  - name: "singleBranch - matches contains (test keyword)"
    trigger:
      body: {}
    context:
      habits:
        input:
          value: "this is a test message"
    mocks:
      bits:
        - bit: "bit-if"
          action: branch
          response:
            mode: singleBranch
            executedBranchIndex: 3
            executedBranchLabel: "Else If"
            output: "Value contains the word 'test'"
            matched: true
            elseExecuted: false
    expect:
      output: "Value contains the word 'test'"
      matched: true

  - name: "singleBranch - falls to else branch (no match)"
    trigger:
      body: {}
    context:
      habits:
        input:
          value: "xyz123"
    mocks:
      bits:
        - bit: "bit-if"
          action: branch
          response:
            mode: singleBranch
            executedBranchIndex: -1
            executedBranchLabel: "Else"
            output: "No matching condition found (Else branch)"
            matched: false
            elseExecuted: true
    expect:
      output: "No matching condition found (Else branch)"
      matched: false
      elseExecuted: true
