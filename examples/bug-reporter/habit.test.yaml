# Tests for Bug Reporter
# Workflow: habits/report-bug.yaml - AI-enhanced bug reporting
workflow: ./habits/report-bug.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully creates enhanced bug report"
    trigger:
      body:
        title: "App crashes on login"
        description: "When I click login button the app closes"
        stepsToReproduce: "1. Open app 2. Click login"
        expectedBehavior: "Should show login screen"
        actualBehavior: "App crashes"
        environment: "iOS 17, Safari"
    context:
      habits:
        input:
          title: "App crashes on login"
          description: "When I click login button the app closes"
          stepsToReproduce: "1. Open app 2. Click login"
          expectedBehavior: "Should show login screen"
          actualBehavior: "App crashes"
          environment: "iOS 17, Safari"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock bug report enhancement
        - bit: "openai"
          action: chat
          response:
            enhancedTitle: "Critical: Application crash on login button click (iOS Safari)"
            summary: "Users experience application crash when attempting to login"
            category: "Crash"
            severity: "critical"
            priority: "P0"
            stepsToReproduce: ["Open application", "Click login button", "Observe crash"]
            expectedBehavior: "Login screen should appear"
            actualBehavior: "Application terminates unexpectedly"
            possibleCause: "JavaScript error in login handler"
            suggestedArea: "Authentication module"
            acceptanceCriteria: ["User can click login without crash"]
            testCases: ["Test login flow on iOS Safari"]
            labels: ["bug", "critical", "needs-triage"]
        # Mock analysis
        - bit: "openai"
          action: chat
          response: "This may be related to recent authentication updates."
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
