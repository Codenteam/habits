# Tests for Invoice Generator
# Workflow: habits/create-invoice.yaml - Creates professional invoices
workflow: ./habits/create-invoice.yaml

tests:
  # === Happy Path Test ===
  - name: "successfully creates invoice with enhanced descriptions"
    trigger:
      body:
        clientName: "Acme Corp"
        clientEmail: "billing@acme.com"
        businessName: "My Consulting LLC"
        items: '[{"name":"Consulting","description":"Web dev","quantity":10,"unitPrice":150}]'
        taxRate: 8.5
        dueDate: "2024-02-28"
    context:
      habits:
        input:
          clientName: "Acme Corp"
          clientEmail: "billing@acme.com"
          businessName: "My Consulting LLC"
          items: '[{"name":"Consulting","description":"Web dev","quantity":10,"unitPrice":150}]'
          taxRate: 8.5
          dueDate: "2024-02-28"
        env:
          HABITS_INTERSECT_HOST: "https://api.intersect.ai"
          HABITS_INTERSECT_API_KEY: "mock-api-key"
    mocks:
      bits:
        # Mock item description enhancement
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            - name: "Consulting Services"
              description: "Professional web development consulting services including architecture design and implementation"
              quantity: 10
              unitPrice: 150
        # Mock totals calculation
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response:
            subtotal: 1500
            taxAmount: 127.50
            total: 1627.50
        # Mock invoice number generation
        - bit: "@ha-bits/bit-intersect"
          action: ask_chatgpt
          response: "INV-2024-001"
        - bit: "@ha-bits/bit-database"
          action: insert
          response:
            id: "test-123"
            success: true
