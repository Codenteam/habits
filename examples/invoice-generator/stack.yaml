version: "1.0"

workflows:
  - id: create-invoice
    path: ./habits/create-invoice.yaml
    enabled: true

  - id: generate-email
    path: ./habits/generate-email.yaml
    enabled: true

  - id: list-invoices
    path: ./habits/list-invoices.yaml
    enabled: true

  - id: get-invoice
    path: ./habits/get-invoice.yaml
    enabled: true

server:
  port: 13000
  host: "0.0.0.0"
  frontend: ./frontend
  openapi: true

logging:
  level: info
  outputs: [console]
  format: text
  colorize: true
