# Usage:
#   1. Build the package first: pnpm nx pack habits
#   2. Build bits: pnpm nx run-many -t build --projects='@ha-bits/*'
#   3. Run: docker compose -f docker-compose.local.yml up -d
#
# This mounts the local dist and local bits, linking them for testing before publishing.

services:
  habits:
    image: node:24
    working_dir: /app
    command: ["sh", "/scripts/local-entrypoint.sh"]
    ports:
      - "3000:3000"
      - "13000:13000"
    volumes:
      - ./habit:/app
      - ../dist/packages/habits:/habits-pkg
      - ../nodes/bits/@ha-bits:/bits/@ha-bits:ro
      - ./local-entrypoint.sh:/scripts/local-entrypoint.sh:ro
